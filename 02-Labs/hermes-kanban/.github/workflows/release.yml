name: Release Plugin

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: plugin/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: plugin

      - name: TypeScript check
        run: npx tsc --noEmit --skipLibCheck
        working-directory: plugin

      - name: Build plugin
        run: npm run build
        working-directory: plugin

      - name: Create release ZIP
        run: |
          mkdir -p dist
          VERSION=$(node -p "require('./plugin/package.json').version")
          cd plugin
          zip ../dist/hermes-kanban-bridge-${VERSION}.zip main.js manifest.json versions.json 2>/dev/null || zip ../dist/hermes-kanban-bridge-${VERSION}.zip main.js manifest.json versions.json

      - name: Generate updates.json (BRAT)
        run: |
          VERSION=$(node -p "require('./plugin/package.json').version")
          # Read existing updates.json from releases or create new
          if gh release view "v${VERSION}" --json assets --jq '.assets[].name' 2>/dev/null | grep -q updates.json; then
            gh release download "v${VERSION}" --pattern updates.json 2>/dev/null || true
          fi
          if [ -f updates.json ]; then
            python3 -c "
            import json, sys
            with open('updates.json') as f: data = json.load(f)
            data['${VERSION}'] = '1.4.0'
            with open('updates.json', 'w') as f: json.dump(data, f, indent=2)
            "
          else
            echo '{\"${VERSION}\": \"1.4.0\"}' | python3 -m json.tool > updates.json
          fi
          cat updates.json

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip
            plugin/updates.json
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
