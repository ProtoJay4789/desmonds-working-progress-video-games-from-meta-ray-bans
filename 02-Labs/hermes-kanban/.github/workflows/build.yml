name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: plugin/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: plugin

      - name: TypeScript check
        run: npx tsc --noEmit --skipLibCheck
        working-directory: plugin

      - name: Build plugin
        run: npm run build
        working-directory: plugin

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-build
          path: plugin/main.js

  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install pytest click textual
          pip install -e .

      - name: Run Python tests
        run: python -m pytest tests/ -v

      - name: Lint Python
        run: python -m py_compile cli/hermes_kanban_sqlite/*.py
