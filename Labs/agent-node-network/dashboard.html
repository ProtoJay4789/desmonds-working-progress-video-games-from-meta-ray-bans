<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GenTech Agent Node</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        /* Header */
        .header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 20px 0; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .header h1 { font-size: 1.5em; color: #e84142; }
        .heartbeat-pulse {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 16px; background: rgba(34,197,94,0.1);
            border: 1px solid rgba(34,197,94,0.3); border-radius: 20px;
        }
        .pulse-dot {
            width: 10px; height: 10px; background: #22c55e;
            border-radius: 50%; animation: pulse 2s ease-in-out infinite;
        }
        .pulse-dot.stale { background: #f59e0b; }
        .pulse-dot.dead { background: #ef4444; animation: none; }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.3); }
        }
        
        /* Stats Grid */
        .stats-grid {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 16px; margin: 24px 0;
        }
        .stat-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; padding: 20px; text-align: center;
        }
        .stat-value {
            font-size: 2em; font-weight: 700; color: #e84142;
        }
        .stat-label {
            font-size: 0.75em; color: #888;
            text-transform: uppercase; letter-spacing: 1px;
            margin-top: 4px;
        }
        
        /* Section titles */
        .section-title {
            font-size: 1em; color: #888;
            text-transform: uppercase; letter-spacing: 1px;
            margin: 24px 0 12px;
        }
        
        /* Activity Feed */
        .activity-feed { max-height: 400px; overflow-y: auto; }
        .activity-card {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 16px; margin-bottom: 8px;
            background: rgba(255,255,255,0.02);
            border-radius: 8px; border-left: 3px solid transparent;
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .activity-card.success { border-left-color: #22c55e; }
        .activity-card.failure { border-left-color: #ef4444; }
        .activity-card.pending { border-left-color: #f59e0b; }
        .activity-icon { font-size: 1.2em; }
        .activity-content { flex: 1; }
        .activity-type { font-weight: 600; font-size: 0.9em; }
        .activity-detail { font-size: 0.8em; color: #888; margin-top: 2px; }
        .activity-time { font-size: 0.75em; color: #666; }
        
        /* Earnings */
        .earnings-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 16px; margin-top: 12px;
        }
        .earnings-item {
            text-align: center; padding: 16px;
            background: rgba(255,255,255,0.02);
            border-radius: 8px;
        }
        .earnings-value { font-size: 1.3em; font-weight: 700; color: #22c55e; }
        .earnings-label { font-size: 0.75em; color: #888; margin-top: 4px; }
        
        /* Network */
        .network-nodes {
            display: flex; gap: 12px; flex-wrap: wrap; margin-top: 12px;
        }
        .node-pill {
            display: flex; align-items: center; gap: 6px;
            padding: 8px 14px; background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; font-size: 0.85em;
        }
        .node-dot {
            width: 8px; height: 8px; border-radius: 50%;
        }
        .node-dot.active { background: #22c55e; }
        .node-dot.idle { background: #f59e0b; }
        .node-dot.offline { background: #ef4444; }
        
        /* Uptime bar */
        .uptime-bar {
            height: 8px; background: rgba(255,255,255,0.1);
            border-radius: 4px; overflow: hidden; margin-top: 8px;
        }
        .uptime-fill {
            height: 100%; border-radius: 4px;
            background: linear-gradient(90deg, #22c55e, #16a34a);
            transition: width 0.5s ease;
        }
        
        /* Trust tier badge */
        .tier-badge {
            display: inline-block; padding: 4px 12px;
            border-radius: 12px; font-size: 0.8em; font-weight: 600;
            margin-top: 8px;
        }
        .tier-bronze { background: rgba(205,127,50,0.2); color: #cd7f32; }
        .tier-silver { background: rgba(192,192,192,0.2); color: #c0c0c0; }
        .tier-gold { background: rgba(255,215,0,0.2); color: #ffd700; }
        .tier-platinum { background: rgba(229,228,226,0.2); color: #e5e4e2; }
        
        /* Status indicator */
        .status-row {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 16px; margin-bottom: 12px;
            background: rgba(255,255,255,0.02);
            border-radius: 8px;
        }
        .status-label { font-size: 0.85em; color: #888; }
        .status-value { font-weight: 600; }
        
        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .earnings-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div style="position:fixed;top:10px;left:10px;z-index:100;"><a href="../../Profiles/hub.html" style="color:#3b82f6;text-decoration:none;font-size:0.9em;">← Back to Hub</a></div>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>⚡ Agent Node</h1>
            <div class="heartbeat-pulse" id="pulse-indicator">
                <div class="pulse-dot" id="pulse-dot"></div>
                <span style="font-size:0.85em; color:#22c55e;" id="pulse-text">LIVE</span>
            </div>
        </div>
        
        <!-- Status Row -->
        <div class="status-row" id="status-row">
            <span class="status-label">Agent:</span>
            <span class="status-value" id="agent-id">gentech-001</span>
            <span class="status-label" style="margin-left:auto;">System:</span>
            <span class="status-value" id="system-uptime" style="font-size:0.85em;">—</span>
        </div>
        
        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="uptime">—</div>
                <div class="stat-label">Uptime</div>
                <div class="uptime-bar"><div class="uptime-fill" id="uptime-bar" style="width: 0%"></div></div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="tasks">0</div>
                <div class="stat-label">Tasks Verified</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="accuracy">—</div>
                <div class="stat-label">Accuracy</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="score">0</div>
                <div class="stat-label">Reputation Score</div>
                <div id="tier-badge"></div>
            </div>
        </div>
        
        <!-- Earnings -->
        <div class="section-title">💰 Earnings</div>
        <div class="earnings-grid">
            <div class="earnings-item">
                <div class="earnings-value" id="earnings-today">$0.00</div>
                <div class="earnings-label">Today</div>
            </div>
            <div class="earnings-item">
                <div class="earnings-value" id="earnings-total">$0.00</div>
                <div class="earnings-label">Total Earned</div>
            </div>
            <div class="earnings-item">
                <div class="earnings-value" id="earnings-projected">$0.00</div>
                <div class="earnings-label">Projected Monthly</div>
            </div>
        </div>
        
        <!-- Activity Feed -->
        <div class="section-title">📋 Activity Feed</div>
        <div class="activity-feed" id="activity-feed">
            <div style="padding:20px; text-align:center; color:#666;">Loading activity...</div>
        </div>
        
        <!-- Network -->
        <div class="section-title">🌐 Network</div>
        <div class="network-nodes" id="network-nodes"></div>
        
        <!-- Footer -->
        <div style="margin-top:30px; padding:15px 0; border-top:1px solid rgba(255,255,255,0.05); text-align:center;">
            <span style="font-size:0.75em; color:#444;" id="last-updated">Last updated: —</span>
        </div>
    </div>
    
    <script>
        // Data URLs — relative paths for GitHub Pages
        const DATA_BASE = 'data';
        const HEARTBEAT_URL = `${DATA_BASE}/heartbeat-log.json`;
        const STATE_URL = `${DATA_BASE}/heartbeat-state.json`;
        const ACTIVITY_URL = `${DATA_BASE}/activity-log.json`;
        const REFRESH_MS = 30000; // 30s dashboard refresh
        
        // Score calculation (0-850 scale)
        function calculateScore(tasks, failed, uptimePct) {
            const accuracy = tasks / Math.max(tasks + failed, 1);
            const base = Math.min(tasks * 2, 400); // up to 400 from volume
            const accScore = accuracy * 250; // up to 250 from accuracy
            const uptimeScore = (uptimePct / 100) * 200; // up to 200 from uptime
            return Math.min(Math.round(base + accScore + uptimeScore), 850);
        }
        
        function getTier(score) {
            if (score >= 750) return { name: 'Platinum', class: 'tier-platinum' };
            if (score >= 600) return { name: 'Gold', class: 'tier-gold' };
            if (score >= 400) return { name: 'Silver', class: 'tier-silver' };
            return { name: 'Bronze', class: 'tier-bronze' };
        }
        
        function timeAgo(ts) {
            const diff = Date.now() - new Date(ts).getTime();
            const mins = Math.floor(diff / 60000);
            if (mins < 1) return 'just now';
            if (mins < 60) return `${mins}m ago`;
            const hours = Math.floor(mins / 60);
            if (hours < 24) return `${hours}h ago`;
            return `${Math.floor(hours / 24)}d ago`;
        }
        
        function heartbeatAge(ts) {
            if (!ts) return Infinity;
            return (Date.now() - new Date(ts).getTime()) / 1000;
        }
        
        async function fetchJSON(url) {
            try {
                const r = await fetch(url + '?t=' + Date.now());
                if (!r.ok) return null;
                return await r.json();
            } catch { return null; }
        }
        
        async function loadDashboard() {
            const [state, activities] = await Promise.all([
                fetchJSON(STATE_URL),
                fetchJSON(ACTIVITY_URL)
            ]);
            
            // Update heartbeat pulse
            const dot = document.getElementById('pulse-dot');
            const text = document.getElementById('pulse-text');
            if (state && state.last_heartbeat) {
                const age = heartbeatAge(state.last_heartbeat);
                if (age < 120) {
                    dot.className = 'pulse-dot';
                    text.style.color = '#22c55e';
                    text.textContent = 'LIVE';
                } else if (age < 600) {
                    dot.className = 'pulse-dot stale';
                    text.style.color = '#f59e0b';
                    text.textContent = 'STALE';
                } else {
                    dot.className = 'pulse-dot dead';
                    text.style.color = '#ef4444';
                    text.textContent = 'OFFLINE';
                }
            }
            
            // Agent ID
            if (state) {
                document.getElementById('agent-id').textContent = state.agent_id || 'gentech-001';
            }
            
            // Stats
            if (state) {
                const hbLog = await fetchJSON(HEARTBEAT_URL);
                let uptimePct = 100;
                let daysRunning = 0;
                
                if (hbLog && hbLog.length >= 2) {
                    const first = new Date(hbLog[0].timestamp);
                    const last = new Date(hbLog[hbLog.length - 1].timestamp);
                    const secs = (last - first) / 1000;
                    const expected = secs / 60;
                    uptimePct = Math.min((hbLog.length / Math.max(expected, 1)) * 100, 100);
                    daysRunning = secs / 86400;
                    
                    // System uptime from last heartbeat
                    const lastHb = hbLog[hbLog.length - 1];
                    if (lastHb.system_uptime) {
                        document.getElementById('system-uptime').textContent = lastHb.system_uptime;
                    }
                }
                
                const tasks = state.total_tasks || 0;
                const failed = state.failed_tasks || 0;
                const accuracy = tasks > 0 ? ((tasks / (tasks + failed)) * 100).toFixed(1) : '—';
                const score = calculateScore(tasks, failed, uptimePct);
                const tier = getTier(score);
                
                document.getElementById('uptime').textContent = uptimePct.toFixed(1) + '%';
                document.getElementById('uptime-bar').style.width = uptimePct + '%';
                document.getElementById('tasks').textContent = tasks;
                document.getElementById('accuracy').textContent = accuracy === '—' ? '—' : accuracy + '%';
                document.getElementById('score').textContent = score;
                document.getElementById('tier-badge').innerHTML = 
                    `<span class="tier-badge ${tier.class}">${tier.name}</span>`;
                
                // Earnings
                const today = state.earnings_today || 0;
                const total = state.earnings_total || 0;
                const days = Math.max(daysRunning, 1);
                const dailyAvg = total / days;
                const projected = dailyAvg * 30;
                
                document.getElementById('earnings-today').textContent = '$' + today.toFixed(2);
                document.getElementById('earnings-total').textContent = '$' + total.toFixed(2);
                document.getElementById('earnings-projected').textContent = '$' + projected.toFixed(2);
            }
            
            // Activity Feed
            if (activities && activities.length > 0) {
                const feed = document.getElementById('activity-feed');
                const recent = activities.slice(-50).reverse();
                feed.innerHTML = recent.map(a => {
                    const icon = a.status === 'success' ? '✅' : a.status === 'failure' ? '❌' : '⏳';
                    return `
                        <div class="activity-card ${a.status}">
                            <div class="activity-icon">${icon}</div>
                            <div class="activity-content">
                                <div class="activity-type">${a.type}</div>
                                <div class="activity-detail">${a.target}${a.detail ? ' — ' + a.detail : ''}</div>
                            </div>
                            <div class="activity-time">${timeAgo(a.timestamp)}</div>
                        </div>
                    `;
                }).join('');
            }
            
            // Network nodes (hardcoded for now, will be dynamic later)
            const nodes = [
                { name: 'gentech-001', status: 'active', tasks: state ? state.total_tasks : 0 },
            ];
            document.getElementById('network-nodes').innerHTML = nodes.map(n => `
                <div class="node-pill">
                    <div class="node-dot ${n.status}"></div>
                    <span>${n.name}</span>
                    <span style="color:#666; font-size:0.8em;">${n.tasks} tasks</span>
                </div>
            `).join('');
            
            // Last updated
            document.getElementById('last-updated').textContent = 
                'Last updated: ' + new Date().toLocaleString();
        }
        
        // Initial load + auto-refresh
        loadDashboard();
        setInterval(loadDashboard, REFRESH_MS);
    </script>
</body>
</html>
