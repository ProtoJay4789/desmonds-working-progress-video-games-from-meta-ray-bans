<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GenTech Dashboard — AAE DeFi Agent</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* AAE DeFi Agent specific overrides */

        /* Agent status pulse */
        .agent-status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            border-radius: 20px;
            background: rgba(0, 255, 136, 0.08);
            border: 1px solid rgba(0, 255, 136, 0.2);
            font-size: 0.8em;
            color: var(--gold);
            margin-bottom: 20px;
        }
        .agent-status .pulse {
            width: 8px;
            height: 8px;
            background: var(--gold);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        /* Token cards */
        .token-card {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: var(--radius);
            padding: 18px;
            transition: all 0.25s ease;
        }
        .token-card:hover {
            border-color: var(--gold);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 255, 136, 0.08);
        }
        .token-symbol {
            font-size: 1.4em;
            font-weight: 700;
            color: var(--gold);
        }
        .token-name {
            color: var(--text-dim);
            font-size: 0.85em;
            margin-bottom: 12px;
        }
        .token-balance {
            font-size: 1.1em;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 4px;
        }
        .token-value {
            font-size: 1.3em;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 4px;
        }
        .token-change { font-size: 0.85em; font-weight: 500; }
        .token-change[data-positive="true"] { color: var(--success); }
        .token-change[data-positive="false"] { color: var(--danger); }
        .token-chain { margin-top: 8px; }

        /* Agent action highlight in tables */
        .dashboard-table tr:hover td {
            background: rgba(0, 255, 136, 0.03) !important;
        }

        /* Milestone category headers */
        .milestone-earnings {
            display: flex;
            gap: 15px;
            margin-top: 10px;
            padding: 12px 16px;
            background: rgba(0, 255, 136, 0.05);
            border-radius: var(--radius);
            border: 1px solid rgba(0, 255, 136, 0.1);
        }
        .earnings-item {
            text-align: center;
            flex: 1;
        }
        .earnings-label {
            font-size: 0.75em;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .earnings-value {
            font-size: 1.3em;
            font-weight: 700;
            color: var(--gold);
            margin-top: 4px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.3); }
        }
    </style>
</head>
<body>
    <a href="../hub.html" style="position:fixed;top:12px;left:12px;text-decoration:none;color:var(--text-dim);font-size:0.85em;padding:6px 12px;border:1px solid var(--panel-border);border-radius:6px;transition:all 0.2s;z-index:1000;background:var(--panel-bg);" onmouseover="this.style.borderColor='var(--gold)';this.style.color='var(--gold)'" onmouseout="this.style.borderColor='var(--panel-border)';this.style.color='var(--text-dim)'">🏠 Hub</a>
    <div id="app"></div>

    <script src="../assets/dashboard-engine.js?v=1.1"></script>
    <script>
        // --- Config ---
        const POOL_ADDRESS = '0x864d4e5ee7318e97483db7eb0912e09f161516ea';
        const RANGE_LOW = 6.55;
        const RANGE_HIGH = 6.71;
        const SHAPE = 'curve';
        const AVAX_HELD = 2.19;
        const USDC_HELD = 30.88;

        function calcEfficiency(price, low, high, shape) {
            if (price < low || price > high) return 0;
            const pos = (price - low) / (high - low);
            if (shape === 'spot') return 100;
            if (shape === 'bidirectional') return Math.max(0, Math.min(100, Math.abs(pos - 0.5) * 2 * 100));
            return Math.max(0, Math.min(100, (1 - Math.abs(pos - 0.5) * 2) * 100));
        }

        function getZone(eff) {
            if (eff >= 70) return { label: 'Center', color: 'green' };
            if (eff >= 50) return { label: 'Mid', color: 'cyan' };
            if (eff >= 30) return { label: 'Low', color: 'orange' };
            return { label: 'Edge', color: 'red' };
        }

        async function fetchLiveData(data) {
            try {
                const resp = await fetch(`https://api.dexscreener.com/latest/dex/pairs/avalanche/${POOL_ADDRESS}`);
                const json = await resp.json();
                const pair = json.pairs && json.pairs[0] ? json.pairs[0] : null;
                if (!pair) return data;

                const price = parseFloat(pair.priceNative);
                const change24 = parseFloat(pair.priceChange?.h24 || 0);

                const avaxVal = AVAX_HELD * price;
                const totalVal = avaxVal + USDC_HELD;
                const eff = calcEfficiency(price, RANGE_LOW, RANGE_HIGH, SHAPE);
                const zone = getZone(eff);
                const rangeWidth = RANGE_HIGH - RANGE_LOW;

                // Update portfolio
                data.portfolio.totalValue = totalVal;
                data.portfolio.avaxPrice = price;
                data.portfolio.change24h = change24;
                data.portfolio.status = (price >= RANGE_LOW && price <= RANGE_HIGH) ? 'In Range' : 'Out of Range';

                // Update allocation
                data.allocation[0].value = avaxVal;
                data.allocation[0].pct = Math.round((avaxVal / totalVal) * 100);
                data.allocation[1].value = USDC_HELD;
                data.allocation[1].pct = Math.round((USDC_HELD / totalVal) * 100);

                // Update range
                data.range.efficiency = eff;
                data.range.zone = zone.label;
                data.range.width = rangeWidth;

                // Update yield
                data.yieldInfo.earned = 0; // Will accumulate over time

            } catch (err) {
                console.error('DexScreener fetch failed:', err);
                data.portfolio.status = 'Error fetching price';
            }
            return data;
        }

        // Initialize
        (async () => {
            const templateRes = await fetch('defi-template.json?v=' + Date.now());
            const template = await templateRes.json();
            const dataRes = await fetch('defi-data.json?v=' + Date.now());
            let data = await dataRes.json();

            // Fetch live price and calculate values
            data = await fetchLiveData(data);

            const dash = new DashboardEngine({ template, data });
            await dash.init('#app');

            // Refresh every 60s
            setInterval(async () => {
                let freshData = await (await fetch('defi-data.json?v=' + Date.now())).json();
                freshData = await fetchLiveData(freshData);
                // Re-render with fresh data
                const dash2 = new DashboardEngine({ template, data: freshData });
                await dash2.init('#app');
                window.defiDash = dash2;
            }, 60000);

            window.defiDash = dash;
        })();
    </script>
</body>
</html>
