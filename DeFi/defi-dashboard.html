<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GenTech Dashboard — AAE DeFi Agent</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* AAE DeFi Agent specific overrides */

        /* Agent status pulse */
        .agent-status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            border-radius: 20px;
            background: rgba(0, 255, 136, 0.08);
            border: 1px solid rgba(0, 255, 136, 0.2);
            font-size: 0.8em;
            color: var(--gold);
            margin-bottom: 20px;
        }
        .agent-status .pulse {
            width: 8px;
            height: 8px;
            background: var(--gold);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        /* Token cards */
        .token-card {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: var(--radius);
            padding: 18px;
            transition: all 0.25s ease;
        }
        .token-card:hover {
            border-color: var(--gold);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 255, 136, 0.08);
        }
        .token-symbol {
            font-size: 1.4em;
            font-weight: 700;
            color: var(--gold);
        }
        .token-name {
            color: var(--text-dim);
            font-size: 0.85em;
            margin-bottom: 12px;
        }
        .token-balance {
            font-size: 1.1em;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 4px;
        }
        .token-value {
            font-size: 1.3em;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 4px;
        }
        .token-change { font-size: 0.85em; font-weight: 500; }
        .token-change[data-positive="true"] { color: var(--success); }
        .token-change[data-positive="false"] { color: var(--danger); }
        .token-chain { margin-top: 8px; }

        /* Agent action highlight in tables */
        .dashboard-table tr:hover td {
            background: rgba(0, 255, 136, 0.03) !important;
        }

        /* Milestone category headers */
        .milestone-earnings {
            display: flex;
            gap: 15px;
            margin-top: 10px;
            padding: 12px 16px;
            background: rgba(0, 255, 136, 0.05);
            border-radius: var(--radius);
            border: 1px solid rgba(0, 255, 136, 0.1);
        }
        .earnings-item {
            text-align: center;
            flex: 1;
        }
        .earnings-label {
            font-size: 0.75em;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .earnings-value {
            font-size: 1.3em;
            font-weight: 700;
            color: var(--gold);
            margin-top: 4px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.3); }
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script src="../assets/dashboard-engine.js"></script>
    <script>
        // AAE DeFi-specific field rendering
        const originalFormatField = DashboardEngine.prototype.formatField;
        DashboardEngine.prototype.formatField = function(value, field = {}) {
            if (value === null || value === undefined) return '—';
            
            // Green/red for P&L and token changes
            if (field.className === 'token-change' || field.key === 'pnl') {
                const num = parseFloat(value);
                const positive = num >= 0;
                const sign = positive ? '+' : '';
                const prefix = field.key === 'pnl' ? '$' : '';
                return `<span data-positive="${positive}">${prefix}${sign}${value}${field.key === 'pnl' ? '' : '%'}</span>`;
            }
            
            // Agent action badge
            if (field.key === 'type' && value && value.startsWith('Agent')) {
                return `<span class="badge" style="background:rgba(0,255,136,0.12);border-color:rgba(0,255,136,0.3);color:var(--gold);">${value}</span>`;
            }
            
            return originalFormatField.call(this, value, field);
        };

        // Inject agent status after header
        const originalRenderShell = DashboardEngine.prototype.renderShell;
        DashboardEngine.prototype.renderShell = function() {
            originalRenderShell.call(this);
            const header = this.rootEl.querySelector('.dashboard-header');
            if (header) {
                const status = document.createElement('div');
                status.className = 'agent-status';
                status.innerHTML = '<div class="pulse"></div> Agent Active — Monitoring yields, executing rebalances';
                header.appendChild(status);
            }
        };

        // Initialize
        (async () => {
            const templateRes = await fetch('defi-template.json?' + Date.now());
            const template = await templateRes.json();
            const dataRes = await fetch('defi-data.json?' + Date.now());
            const data = await dataRes.json();

            const dash = new DashboardEngine({ template, data });
            await dash.init('#app');

            // Expose for debugging
            window.defiDash = dash;
        })();
    </script>
</body>
</html>
