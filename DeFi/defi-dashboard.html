<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GenTech Dashboard — AAE DeFi</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* AAE DeFi LP Curve specific overrides */

        /* Agent status pulse */
        .agent-status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            border-radius: 20px;
            background: rgba(232, 65, 66, 0.08);
            border: 1px solid rgba(232, 65, 66, 0.2);
            font-size: 0.8em;
            color: var(--gold);
            margin-bottom: 20px;
        }
        .agent-status .pulse {
            width: 8px;
            height: 8px;
            background: var(--gold);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        /* Scout Fleet Cards */
        .scout-card {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: var(--radius);
            padding: 18px;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }
        .scout-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--gold);
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .scout-card:hover::before {
            opacity: 1;
        }
        .scout-card:hover {
            border-color: var(--gold);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(232, 65, 66, 0.08);
        }
        .scout-card.active {
            border-color: rgba(232, 65, 66, 0.3);
        }
        .scout-card.active::before {
            opacity: 1;
            background: var(--success);
        }
        .scout-name {
            font-size: 1.1em;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 8px;
        }
        .scout-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .scout-status.active {
            background: rgba(232, 65, 66, 0.12);
            color: var(--success);
        }
        .scout-status.scanning {
            background: rgba(0, 204, 255, 0.12);
            color: var(--accent);
        }
        .scout-status.monitoring {
            background: rgba(245, 158, 11, 0.12);
            color: var(--warning);
        }
        .scout-status.idle {
            background: rgba(107, 114, 128, 0.12);
            color: var(--text-dim);
        }
        .scout-status .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
        }
        .scout-status.active .dot {
            animation: pulse 2s ease-in-out infinite;
        }
        .scout-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.85em;
            color: var(--text-dim);
            margin-top: 8px;
        }
        .scout-findings {
            font-weight: 600;
            color: var(--gold);
        }

        /* Opportunity Feed */
        .opportunity-row {
            transition: background 0.2s ease;
        }
        .opportunity-row:hover {
            background: rgba(232, 65, 66, 0.03) !important;
        }
        .risk-badge {
            padding: 3px 8px;
            border-radius: 8px;
            font-size: 0.8em;
            font-weight: 600;
        }
        .risk-badge.low {
            background: rgba(232, 65, 66, 0.12);
            color: var(--success);
        }
        .risk-badge.medium {
            background: rgba(245, 158, 11, 0.12);
            color: var(--warning);
        }
        .risk-badge.high {
            background: rgba(255, 51, 102, 0.12);
            color: var(--danger);
        }

        /* Agent Action Log */
        .agent-action-row {
            border-left: 3px solid transparent;
            transition: all 0.2s ease;
        }
        .agent-action-row:hover {
            border-left-color: var(--gold);
            background: rgba(232, 65, 66, 0.02);
        }

        /* LP Curve container */
        .lp-curve-container {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: var(--radius);
            padding: 24px;
            position: relative;
            overflow: hidden;
        }

        /* Curve canvas */
        .lp-curve-canvas {
            width: 100%;
            height: 280px;
            position: relative;
        }

        .lp-curve-canvas canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Price marker */
        .price-marker {
            position: absolute;
            top: 0;
            width: 2px;
            height: 100%;
            background: var(--gold);
            box-shadow: 0 0 8px rgba(232, 65, 66, 0.5);
            transition: left 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
        }
        .price-marker::after {
            content: attr(data-price);
            position: absolute;
            top: -24px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--gold);
            color: #0a0e17;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75em;
            font-weight: 700;
            white-space: nowrap;
        }

        /* Range labels */
        .range-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 12px;
            padding: 0 4px;
        }
        .range-label {
            font-size: 0.8em;
            color: var(--text-dim);
        }
        .range-label .value {
            color: var(--gold);
            font-weight: 600;
        }

        /* Curve info bar */
        .curve-info {
            display: flex;
            gap: 20px;
            margin-top: 16px;
            padding: 12px 16px;
            background: rgba(232, 65, 66, 0.05);
            border-radius: var(--radius);
            border: 1px solid rgba(232, 65, 66, 0.1);
        }
        .curve-info-item {
            text-align: center;
            flex: 1;
        }
        .curve-info-label {
            font-size: 0.7em;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .curve-info-value {
            font-size: 1.1em;
            font-weight: 700;
            color: var(--gold);
            margin-top: 4px;
        }

        /* Token cards */
        .token-card {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: var(--radius);
            padding: 18px;
            transition: all 0.25s ease;
        }
        .token-card:hover {
            border-color: var(--gold);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(232, 65, 66, 0.08);
        }
        .token-symbol {
            font-size: 1.4em;
            font-weight: 700;
            color: var(--gold);
        }
        .token-name {
            color: var(--text-dim);
            font-size: 0.85em;
            margin-bottom: 12px;
        }
        .token-balance {
            font-size: 1.1em;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 4px;
        }
        .token-value {
            font-size: 1.3em;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 4px;
        }
        .token-change { font-size: 0.85em; font-weight: 500; }
        .token-change[data-positive="true"] { color: var(--success); }
        .token-change[data-positive="false"] { color: var(--danger); }

        /* Agent action highlight in tables */
        .dashboard-table tr:hover td {
            background: rgba(232, 65, 66, 0.03) !important;
        }

        /* Milestone category headers */
        .milestone-earnings {
            display: flex;
            gap: 15px;
            margin-top: 10px;
            padding: 12px 16px;
            background: rgba(232, 65, 66, 0.05);
            border-radius: var(--radius);
            border: 1px solid rgba(232, 65, 66, 0.1);
        }
        .earnings-item {
            text-align: center;
            flex: 1;
        }
        .earnings-label {
            font-size: 0.75em;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .earnings-value {
            font-size: 1.3em;
            font-weight: 700;
            color: var(--gold);
            margin-top: 4px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.3); }
        }

        /* Glow animation for price line */
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 8px rgba(232, 65, 66, 0.5); }
            50% { box-shadow: 0 0 16px rgba(232, 65, 66, 0.8); }
        }
        .price-marker {
            animation: glow 2s ease-in-out infinite;
        }

        /* Fee Milestones */
        .milestone-ladder {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: var(--radius);
            padding: 24px;
        }
        .milestone-tier {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            margin-bottom: 12px;
            background: rgba(255,255,255,0.02);
            border-radius: 10px;
            border: 1px solid var(--panel-border);
            transition: all 0.3s ease;
        }
        .milestone-tier.current {
            border-color: var(--gold);
            background: rgba(232, 65, 66, 0.05);
            box-shadow: 0 0 20px rgba(232, 65, 66, 0.1);
        }
        .milestone-tier.achieved {
            border-color: rgba(232, 65, 66, 0.3);
            opacity: 0.7;
        }
        .tier-icon {
            font-size: 2em;
            width: 50px;
            text-align: center;
        }
        .tier-info {
            flex: 1;
        }
        .tier-label {
            font-size: 1.1em;
            font-weight: 700;
            color: var(--text);
        }
        .tier-target {
            color: var(--gold);
            font-weight: 600;
        }
        .tier-unlocks {
            font-size: 0.8em;
            color: var(--text-dim);
            margin-top: 4px;
        }
        .tier-progress {
            width: 120px;
        }
        .tier-progress-bar {
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 4px;
        }
        .tier-progress-fill {
            height: 100%;
            background: var(--gold);
            border-radius: 3px;
            transition: width 0.8s ease;
        }
        .tier-progress-text {
            font-size: 0.75em;
            color: var(--text-dim);
            text-align: right;
        }

        /* Trajectory */
        .trajectory-container {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: var(--radius);
            padding: 24px;
        }
        .trajectory-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .trajectory-current {
            text-align: center;
        }
        .trajectory-current-value {
            font-size: 2.5em;
            font-weight: 700;
            color: var(--gold);
        }
        .trajectory-current-label {
            font-size: 0.8em;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .trajectory-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-top: 20px;
        }
        .trajectory-stat {
            text-align: center;
            padding: 16px;
            background: rgba(255,255,255,0.02);
            border-radius: 10px;
            border: 1px solid var(--panel-border);
        }
        .trajectory-stat-value {
            font-size: 1.5em;
            font-weight: 700;
            color: var(--gold);
        }
        .trajectory-stat-label {
            font-size: 0.75em;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
        }
        .trajectory-next {
            margin-top: 20px;
            padding: 16px;
            background: rgba(232, 65, 66, 0.05);
            border-radius: 10px;
            border: 1px solid rgba(232, 65, 66, 0.2);
            text-align: center;
        }
        .trajectory-next-label {
            font-size: 0.8em;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .trajectory-next-value {
            font-size: 1.8em;
            font-weight: 700;
            color: var(--gold);
            margin-top: 8px;
        }
        .trajectory-next-detail {
            font-size: 0.85em;
            color: var(--text-dim);
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div style="position:fixed;top:10px;left:10px;z-index:100;"><a href="../Profiles/hub.html" style="color:#3b82f6;text-decoration:none;font-size:0.9em;">← Back to Hub</a></div>
    <div id="app"></div>

    <script src="../assets/dashboard-engine.js?v=2.0"></script>
    <script>
        // ══════════════════════════════════════════════
        // LP CURVE RENDERER
        // Draws a bell curve shape that shifts left/right with price
        // ══════════════════════════════════════════════

        class LPCurveRenderer {
            constructor(container, data, options = {}) {
                this.container = container;
                this.data = data;
                this.options = {
                    height: 280,
                    padding: { top: 30, right: 20, bottom: 40, left: 20 },
                    curveColor: '#e84142',
                    curveGlow: 'rgba(232, 65, 66, 0.3)',
                    priceColor: '#e84142',
                    gridColor: 'rgba(255,255,255,0.05)',
                    animDuration: 800,
                    ...options
                };
                this.canvas = null;
                this.ctx = null;
                this.priceMarker = null;
                this.animFrame = null;
                this.currentPrice = data.currentPrice;
                this.targetPrice = data.currentPrice;
                this.init();
            }

            init() {
                // Create canvas
                this.canvas = document.createElement('canvas');
                this.canvas.style.width = '100%';
                this.canvas.style.height = this.options.height + 'px';
                this.container.appendChild(this.canvas);

                // Create price marker
                this.priceMarker = document.createElement('div');
                this.priceMarker.className = 'price-marker';
                this.priceMarker.setAttribute('data-price', this.currentPrice.toFixed(5));
                this.container.appendChild(this.priceMarker);

                // Setup canvas
                this.resize();
                window.addEventListener('resize', () => this.resize());

                // Start animation loop
                this.animate();
            }

            resize() {
                const rect = this.container.getBoundingClientRect();
                const dpr = window.devicePixelRatio || 1;
                this.canvas.width = rect.width * dpr;
                this.canvas.height = this.options.height * dpr;
                this.ctx = this.canvas.getContext('2d');
                this.ctx.scale(dpr, dpr);
                this.width = rect.width;
                this.height = this.options.height;
                this.draw();
            }

            priceToX(price) {
                const { rangeMin, rangeMax } = this.data;
                const { padding } = this.options;
                const plotWidth = this.width - padding.left - padding.right;
                return padding.left + ((price - rangeMin) / (rangeMax - rangeMin)) * plotWidth;
            }

            depthToY(depth) {
                const { padding } = this.options;
                const plotHeight = this.height - padding.top - padding.bottom;
                return padding.top + plotHeight * (1 - depth);
            }

            draw() {
                const { ctx, width, height } = this;
                const { padding, curveColor, curveGlow, gridColor } = this.options;
                const { bins, rangeMin, rangeMax } = this.data;

                // Clear
                ctx.clearRect(0, 0, width, height);

                // Draw grid lines
                ctx.strokeStyle = gridColor;
                ctx.lineWidth = 1;
                for (let i = 0; i <= 4; i++) {
                    const y = padding.top + (height - padding.top - padding.bottom) * (i / 4);
                    ctx.beginPath();
                    ctx.moveTo(padding.left, y);
                    ctx.lineTo(width - padding.right, y);
                    ctx.stroke();
                }

                // Draw price axis labels
                ctx.fillStyle = '#6b7280';
                ctx.font = '11px Inter, sans-serif';
                ctx.textAlign = 'center';
                const priceSteps = 5;
                for (let i = 0; i <= priceSteps; i++) {
                    const price = rangeMin + (rangeMax - rangeMin) * (i / priceSteps);
                    const x = this.priceToX(price);
                    ctx.fillText(price.toFixed(2), x, height - 10);
                }

                // Draw curve
                if (bins.length < 2) return;

                // Glow layer
                ctx.save();
                ctx.shadowColor = curveGlow;
                ctx.shadowBlur = 20;
                ctx.beginPath();
                ctx.moveTo(this.priceToX(bins[0].price), this.depthToY(0));
                for (let i = 0; i < bins.length; i++) {
                    const x = this.priceToX(bins[i].price);
                    const y = this.depthToY(bins[i].depth);
                    if (i === 0) {
                        ctx.lineTo(x, y);
                    } else {
                        // Smooth curve using quadratic bezier
                        const prevX = this.priceToX(bins[i-1].price);
                        const prevY = this.depthToY(bins[i-1].depth);
                        const cpX = (prevX + x) / 2;
                        ctx.quadraticCurveTo(prevX, prevY, cpX, (prevY + y) / 2);
                    }
                }
                const lastBin = bins[bins.length - 1];
                ctx.lineTo(this.priceToX(lastBin.price), this.depthToY(0));
                ctx.closePath();

                // Fill with gradient
                const gradient = ctx.createLinearGradient(0, padding.top, 0, height - padding.bottom);
                gradient.addColorStop(0, 'rgba(232, 65, 66, 0.4)');
                gradient.addColorStop(0.5, 'rgba(232, 65, 66, 0.15)');
                gradient.addColorStop(1, 'rgba(232, 65, 66, 0.02)');
                ctx.fillStyle = gradient;
                ctx.fill();

                // Stroke
                ctx.strokeStyle = curveColor;
                ctx.lineWidth = 2.5;
                ctx.stroke();
                ctx.restore();

                // Draw current price indicator on curve
                const priceX = this.priceToX(this.currentPrice);
                const closestBin = bins.reduce((prev, curr) => 
                    Math.abs(curr.price - this.currentPrice) < Math.abs(prev.price - this.currentPrice) ? curr : prev
                );
                const priceY = this.depthToY(closestBin.depth);

                // Price dot
                ctx.beginPath();
                ctx.arc(priceX, priceY, 5, 0, Math.PI * 2);
                ctx.fillStyle = curveColor;
                ctx.fill();
                ctx.strokeStyle = '#0a0e17';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Update price marker position
                if (this.priceMarker) {
                    const markerLeft = (priceX / this.width) * 100;
                    this.priceMarker.style.left = `calc(${markerLeft}% - 1px)`;
                    this.priceMarker.setAttribute('data-price', this.currentPrice.toFixed(5));
                }
            }

            animate() {
                // Smooth price movement
                const diff = this.targetPrice - this.currentPrice;
                if (Math.abs(diff) > 0.0001) {
                    this.currentPrice += diff * 0.08;
                    this.draw();
                }
                this.animFrame = requestAnimationFrame(() => this.animate());
            }

            updatePrice(newPrice) {
                this.targetPrice = newPrice;
            }

            destroy() {
                if (this.animFrame) cancelAnimationFrame(this.animFrame);
            }
        }

        // ══════════════════════════════════════════════
        // DASHBOARD CUSTOMIZATIONS
        // ══════════════════════════════════════════════

        // AAE DeFi-specific field rendering
        const originalFormatField = DashboardEngine.prototype.formatField;
        DashboardEngine.prototype.formatField = function(value, field = {}) {
            if (value === null || value === undefined) return '—';
            
            // Green/red for P&L and token changes
            if (field.className === 'token-change' || field.key === 'pnl') {
                const num = parseFloat(value);
                const positive = num >= 0;
                const sign = positive ? '+' : '';
                const prefix = field.key === 'pnl' ? '$' : '';
                return `<span data-positive="${positive}">${prefix}${sign}${value}${field.key === 'pnl' ? '' : '%'}</span>`;
            }
            
            // Agent action badge
            if (field.key === 'type' && value && value.startsWith('Agent')) {
                return `<span class="badge" style="background:rgba(232,65,66,0.12);border-color:rgba(232,65,66,0.3);color:var(--gold);">${value}</span>`;
            }
            
            // Scout status badge with color coding
            if (field.key === 'status') {
                const statusLower = (value || '').toLowerCase();
                let bgColor = 'rgba(232,65,66,0.12)';
                let borderColor = 'rgba(232,65,66,0.3)';
                let textColor = 'var(--success)';
                
                if (statusLower === 'active' || statusLower === 'executed') {
                    bgColor = 'rgba(232,65,66,0.12)';
                    borderColor = 'rgba(232,65,66,0.3)';
                    textColor = 'var(--success)';
                } else if (statusLower === 'scanning' || statusLower === 'evaluating') {
                    bgColor = 'rgba(0,204,255,0.12)';
                    borderColor = 'rgba(0,204,255,0.3)';
                    textColor = 'var(--accent)';
                } else if (statusLower === 'monitoring' || statusLower === 'queued') {
                    bgColor = 'rgba(245,158,11,0.12)';
                    borderColor = 'rgba(245,158,11,0.3)';
                    textColor = 'var(--warning)';
                } else if (statusLower === 'idle') {
                    bgColor = 'rgba(107,114,128,0.12)';
                    borderColor = 'rgba(107,114,128,0.3)';
                    textColor = 'var(--text-dim)';
                }
                
                return `<span class="badge" style="background:${bgColor};border-color:${borderColor};color:${textColor};">${value}</span>`;
            }
            
            // Risk badge
            if (field.key === 'risk') {
                const riskLower = (value || '').toLowerCase();
                let bgColor = 'rgba(232,65,66,0.12)';
                let textColor = 'var(--success)';
                
                if (riskLower === 'medium') {
                    bgColor = 'rgba(245,158,11,0.12)';
                    textColor = 'var(--warning)';
                } else if (riskLower === 'high') {
                    bgColor = 'rgba(255,51,102,0.12)';
                    textColor = 'var(--danger)';
                }
                
                return `<span class="badge" style="background:${bgColor};color:${textColor};">${value}</span>`;
            }
            
            // Scout name badge
            if (field.key === 'scout') {
                return `<span class="badge" style="background:rgba(0,204,255,0.12);border-color:rgba(0,204,255,0.3);color:var(--accent);">${value}</span>`;
            }
            
            return originalFormatField.call(this, value, field);
        };

        // Custom section renderer for LP curve
        const originalRenderCustom = DashboardEngine.prototype.renderCustom;
        DashboardEngine.prototype.renderCustom = function(section) {
            if (section.customRender === 'heroEfficiency') {
                return this.renderHeroEfficiency(section);
            }
            if (section.customRender === 'marketIntel') {
                return this.renderMarketIntel(section);
            }
            if (section.customRender === 'strategyAdvisor') {
                return this.renderStrategyAdvisor(section);
            }
            if (section.customRender === 'lpCurve') {
                return `<div class="lp-curve-container" id="lp-curve-canvas"></div>`;
            }
            if (section.customRender === 'feeMilestones') {
                return this.renderFeeMilestones(section);
            }
            if (section.customRender === 'trajectory') {
                return this.renderTrajectory(section);
            }
            if (section.customRender === 'rebalanceSuggestions') {

        // Fee Milestones Renderer
        DashboardEngine.prototype.renderFeeMilestones = function(section) {
            const data = this.resolveDataSource(section.dataSource);
            if (!data) return '<p class="empty-state">No milestone data</p>';

            const { currentDailyFees, positionUsd, cumulativeFees, daysActive, tiers } = data;
            let currentTierIdx = -1;
            let nextTierIdx = 0;
            let progressPct = 0;

            // Find current tier
            for (let i = 0; i < tiers.length; i++) {
                if (currentDailyFees >= tiers[i].target) {
                    currentTierIdx = i;
                    nextTierIdx = Math.min(i + 1, tiers.length - 1);
                }
            }

            // Calculate progress to next tier
            if (currentTierIdx >= 0) {
                const currentTarget = tiers[currentTierIdx].target;
                const nextTarget = tiers[nextTierIdx].target;
                progressPct = Math.min(100, ((currentDailyFees - currentTarget) / (nextTarget - currentTarget)) * 100);
            } else {
                nextTierIdx = 0;
                progressPct = Math.min(100, (currentDailyFees / tiers[0].target) * 100);
            }

            const tiersHtml = tiers.map((tier, i) => {
                let statusClass = '';
                if (i < currentTierIdx + 1) statusClass = 'achieved';
                else if (i === nextTierIdx && currentTierIdx + 1 === i) statusClass = 'current';
                else if (i === 0 && currentTierIdx === -1) statusClass = 'current';

                const tierProgress = i <= currentTierIdx ? 100 :
                    (i === nextTierIdx ? progressPct :
                    (currentDailyFees / tier.target) * 100);

                return `
                    <div class="milestone-tier ${statusClass}">
                        <div class="tier-icon">${tier.icon}</div>
                        <div class="tier-info">
                            <div class="tier-label">Tier ${tier.tier}: ${tier.label} — <span class="tier-target">$${tier.target}/day</span></div>
                            <div class="tier-unlocks">Unlocks: ${tier.unlocks}</div>
                        </div>
                        <div class="tier-progress">
                            <div class="tier-progress-bar">
                                <div class="tier-progress-fill" style="width: ${tierProgress}%"></div>
                            </div>
                            <div class="tier-progress-text">${tierProgress.toFixed(1)}%</div>
                        </div>
                    </div>
                `;
            }).join('');

            return `
                <div class="milestone-ladder">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                        <div>
                            <div style="font-size:0.8em; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px;">Current Daily Fees</div>
                            <div style="font-size:2em; font-weight:700; color:var(--gold);">$${currentDailyFees.toFixed(3)}</div>
                        </div>
                        <div style="text-align:right;">
                            <div style="font-size:0.8em; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px;">Position Size</div>
                            <div style="font-size:1.5em; font-weight:700; color:var(--text);">$${positionUsd.toFixed(2)}</div>
                        </div>
                    </div>
                    ${tiersHtml}
                </div>
            `;
        };

        // Trajectory Renderer
        DashboardEngine.prototype.renderTrajectory = function(section) {
            const data = this.resolveDataSource(section.dataSource);
            if (!data) return '<p class="empty-state">No trajectory data</p>';

            const { currentDailyFees, positionUsd, cumulativeFees, daysActive, tiers } = data;

            // Find current and next tier
            let currentTierIdx = -1;
            for (let i = 0; i < tiers.length; i++) {
                if (currentDailyFees >= tiers[i].target) currentTierIdx = i;
            }
            const nextTier = tiers[Math.min(currentTierIdx + 1, tiers.length - 1)];
            const gapToNext = Math.max(0, nextTier.target - currentDailyFees);

            // Calculate APR and projections
            const dailyApr = positionUsd > 0 ? (currentDailyFees / positionUsd) * 100 : 0;
            const annualizedReturn = dailyApr * 365;

            // Days to next milestone (assuming current fee rate stays constant)
            const daysToNext = currentDailyFees > 0 ? Math.ceil(gapToNext / currentDailyFees) : Infinity;

            // Required multiplier to hit next tier
            const multiplier = currentDailyFees > 0 ? (nextTier.target / currentDailyFees) : Infinity;

            // Capital needed at current rate to hit next tier
            const capitalNeeded = currentDailyFees > 0 ?
                Math.ceil((nextTier.target / currentDailyFees) * positionUsd) : Infinity;

            const formatDays = (d) => {
                if (d === Infinity) return '∞';
                if (d > 365) return `${(d / 365).toFixed(1)} years`;
                if (d > 30) return `${(d / 30).toFixed(1)} months`;
                return `${d} days`;
            };

            return `
                <div class="trajectory-container">
                    <div class="trajectory-header">
                        <div class="trajectory-current">
                            <div class="trajectory-current-label">Daily Fees</div>
                            <div class="trajectory-current-value">$${currentDailyFees.toFixed(3)}</div>
                        </div>
                        <div style="text-align:center;">
                            <div style="font-size:0.8em; color:var(--text-dim);">NEXT TARGET</div>
                            <div style="font-size:1.5em; font-weight:700; color:var(--gold);">${nextTier.icon} $${nextTier.target}/day</div>
                            <div style="font-size:0.8em; color:var(--text-dim);">${nextTier.label}</div>
                        </div>
                    </div>

                    <div class="trajectory-stats">
                        <div class="trajectory-stat">
                            <div class="trajectory-stat-value">${dailyApr.toFixed(2)}%</div>
                            <div class="trajectory-stat-label">Daily APR</div>
                        </div>
                        <div class="trajectory-stat">
                            <div class="trajectory-stat-value">${annualizedReturn.toFixed(0)}%</div>
                            <div class="trajectory-stat-label">Annualized</div>
                        </div>
                        <div class="trajectory-stat">
                            <div class="trajectory-stat-value">$${cumulativeFees.toFixed(2)}</div>
                            <div class="trajectory-stat-label">Cumulative Fees</div>
                        </div>
                    </div>

                    <div class="trajectory-next">
                        <div class="trajectory-next-label">Time to ${nextTier.label} ($${nextTier.target}/day)</div>
                        <div class="trajectory-next-value">${formatDays(daysToNext)}</div>
                        <div class="trajectory-next-detail">
                            At current rate: ${multiplier.toFixed(1)}x fees needed · $${capitalNeeded.toLocaleString()} capital at same efficiency
                        </div>
                    </div>
                </div>
            `;
        };

                                <div style="font-size: 0.85em; color: var(--text-dim); margin-bottom: 8px;">${s.description}</div>
                                <div style="display: flex; justify-content: space-between; align-items: center;">
                                    <div style="font-size: 0.75em; color: var(--text-dim);">Impact: <span style="color: var(--gold);">${s.impact}</span></div>
                                    ${s.action ? `<div style="font-size: 0.75em; color: var(--blue); cursor: pointer;">${s.action} →</div>` : ''}
                                </div>
                            </div>
                        `).join('')}
                    </div>

                    <!-- Quick Actions -->
                    <div style="margin-top: 16px; display: flex; gap: 8px; flex-wrap: wrap;">
                        <a href="https://traderjoexyz.com/avalanche/pool?tokenA=0xB31f66AA3C1e785363F0875A1B74E27b85FD66c7&tokenB=0xB97EF9Ef8734C71904D8002F8b6Bc66Dd9c48a6E" target="_blank" style="flex: 1; min-width: 120px; padding: 10px; background: var(--bg-alt); border: 1px solid var(--panel-border); border-radius: 6px; text-align: center; text-decoration: none; color: var(--gold); font-size: 0.85em;">
                            🔄 Rebalance on Trader Joe
                        </a>
                        <div style="flex: 1; min-width: 120px; padding: 10px; background: var(--bg-alt); border: 1px solid var(--panel-border); border-radius: 6px; text-align: center; color: var(--text-dim); font-size: 0.85em;">
                            📊 View Full Analysis
                        </div>
                    </div>
                </div>
            `;
        };

        // Inject agent status after header
        const originalRenderShell = DashboardEngine.prototype.renderShell;
        DashboardEngine.prototype.renderShell = function() {
            originalRenderShell.call(this);
            const header = this.rootEl.querySelector('.dashboard-header');
            if (header) {
                const status = document.createElement('div');
                status.className = 'agent-status';
                status.innerHTML = '<div class="pulse"></div> 4 Scouts Active — Yield · Opportunity · Risk · Cross-Chain';
                header.appendChild(status);
            }
        };

        // Initialize
        let lpCurve = null;
        let defiDash = null;

        // Fetch live data from DexScreener
        async function fetchLiveData() {
            try {
                const res = await fetch('https://api.dexscreener.com/latest/dex/pairs/avalanche/0x864d4e5Ee7318e97483DB7EB0912E09F161516EA');
                const json = await res.json();
                const pair = json.pairs?.[0];
                if (!pair) return null;

                const price = parseFloat(pair.priceUsd) || 6.52;
                const volume24h = pair.volume?.h24 || 435300;
                const tvl = pair.liquidity?.usd || 366900;
                const change24h = pair.priceChange?.h24 || 0;

                // Calculate efficiency based on price position in range
                const rangeMin = 6.70;
                const rangeMax = 6.88;
                const rangeCenter = (rangeMin + rangeMax) / 2;
                const rangeHalf = (rangeMax - rangeMin) / 2;
                const distFromCenter = Math.abs(price - rangeCenter);
                const efficiency = Math.max(0, Math.min(100, 100 - (distFromCenter / rangeHalf) * 50));

                const inRange = price >= rangeMin && price <= rangeMax;

                return {
                    hero: {
                        positionUsd: 44.54,
                        dailyFees: (efficiency / 100 * 0.25).toFixed(3),
                        efficiency: efficiency.toFixed(1),
                        efficiencyZone: efficiency > 80 ? 'Center' : efficiency > 60 ? 'Inner' : efficiency > 50 ? 'Outer' : 'Edge',
                        rangeStatus: inRange ? 'In Range' : 'Out of Range',
                        currentPrice: price,
                        rangeMin: rangeMin,
                        rangeMax: rangeMax,
                        milestoneCurrent: 'Unranked',
                        milestoneNext: 'Scout',
                        milestoneTarget: 5,
                        milestoneProgress: (efficiency / 100 * 5).toFixed(1)
                    },
                    marketIntel: {
                        avaxPrice: price,
                        change24h: change24h,
                        volume24h: volume24h,
                        tvl: tvl,
                        trend: change24h > 2 ? 'uptrend' : change24h < -2 ? 'downtrend' : 'consolidation',
                        news: [
                            { headline: `AVAX at $${price.toFixed(2)} — ${inRange ? 'In Range' : 'Out of Range'}`, impact: inRange ? 'bullish' : 'bearish', relevance: 'high' },
                            { headline: `24h volume: $${(volume24h/1000).toFixed(0)}K`, impact: 'neutral', relevance: 'medium' },
                            { headline: `TVL: $${(tvl/1000000).toFixed(2)}M`, impact: 'neutral', relevance: 'medium' }
                        ]
                    },
                    strategyAdvisor: {
                        efficiencyZone: efficiency > 80 ? 'Center' : efficiency > 60 ? 'Inner' : 'Outer',
                        efficiency: efficiency.toFixed(1),
                        recommendedAction: efficiency < 50 ? 'Rebalance Now' : efficiency < 70 ? 'Monitor Closely' : 'Hold Position',
                        dcaType: efficiency < 50 ? 'Edge-Weighted DCA' : efficiency < 70 ? 'Moderate DCA' : 'Full DCA',
                        dcaDetails: `In range with bid-ask shape. Price near ${efficiency > 70 ? 'center' : 'edge'} of 6.70–6.88 range.`,
                        rebalanceTrigger: 'Price exits 6.70-6.88 range',
                        compoundThreshold: 50,
                        cumulativeFees: (efficiency / 100 * 0.25),
                        nextCompound: `$${(50 - efficiency / 100 * 0.25).toFixed(2)} away from first compound`,
                        riskLevel: efficiency > 70 ? 'Low' : efficiency > 50 ? 'Medium' : 'High',
                        riskNote: efficiency > 70 ? 'In range, capturing max fees.' : efficiency > 50 ? 'In range, monitoring.' : 'Near edge, consider rebalance.'
                    },
                    curveData: {
                        rangeMin: rangeMin,
                        rangeMax: rangeMax,
                        currentPrice: price,
                        efficiency: efficiency
                    },
                    rebalanceSuggestions: {
                        efficiency: efficiency.toFixed(1),
                        price: price,
                        rangeMin: rangeMin,
                        rangeMax: rangeMax,
                        volatility: 'medium',
                        trend: change24h > 2 ? 'uptrend' : change24h < -2 ? 'downtrend' : 'consolidation',
                        suggestions: [
                            ...(efficiency < 50 ? [{
                                icon: '🔴',
                                title: 'Rebalance Now — Efficiency Critical',
                                description: `Your efficiency is at ${efficiency.toFixed(1)}%. Price is near the edge of your range. Moving to a tighter range around $${price.toFixed(2)} could increase daily fees by ${Math.round((70 - efficiency) / 10)}%.`,
                                priority: 'high',
                                impact: `+${Math.round((70 - efficiency) / 10)}% daily fees`,
                                action: 'Rebalance on Trader Joe'
                            }] : []),
                            ...(efficiency >= 50 && efficiency < 70 ? [{
                                icon: '🟡',
                                title: 'Monitor — Approaching Threshold',
                                description: `Efficiency at ${efficiency.toFixed(1)}%. Consider rebalancing if it drops below 50%. Current range ($${rangeMin.toFixed(2)}-$${rangeMax.toFixed(2)}) is still capturing decent fees.`,
                                priority: 'medium',
                                impact: 'Maintain current fees',
                                action: null
                            }] : []),
                            ...(efficiency >= 70 ? [{
                                icon: '🟢',
                                title: 'Hold Position — Earning Well',
                                description: `Efficiency at ${efficiency.toFixed(1)}%. Price is centered in your range. No action needed — you're capturing maximum fees.`,
                                priority: 'low',
                                impact: 'Max fees earned',
                                action: null
                            }] : []),
                            {
                                icon: '💡',
                                title: efficiency < 60 ? 'Consider Wider Range' : 'Consider Tighter Range',
                                description: efficiency < 60
                                    ? `Current range is $${rangeMin.toFixed(2)}-$${rangeMax.toFixed(2)}. A wider range ($${(price * 0.95).toFixed(2)}-$${(price * 1.05).toFixed(2)}) would keep you in range longer during volatility.`
                                    : `Current range is $${rangeMin.toFixed(2)}-$${rangeMax.toFixed(2)}. A tighter range ($${(price * 0.98).toFixed(2)}-$${(price * 1.02).toFixed(2)}) would earn more fees if price stays stable.`,
                                priority: 'low',
                                impact: efficiency < 60 ? 'More uptime' : 'Higher fees',
                                action: null
                            }
                        ]
                    },
                    timestamp: new Date().toISOString()
                };
            } catch (e) {
                console.warn('[DeFi] DexScreener fetch failed, using cached data:', e.message);
                return null;
            }
        }

        (async () => {
            const templateRes = await fetch('defi-template.json?' + Date.now());
            const template = await templateRes.json();

            // Try live data first, fall back to cached
            let data = await fetchLiveData();
            if (!data) {
                const dataRes = await fetch('defi-data.json?' + Date.now());
                data = await dataRes.json();
            }

            defiDash = new DashboardEngine({ template, data });
            await defiDash.init('#app');

            // Initialize LP curve renderer
            const curveContainer = document.getElementById('lp-curve-canvas');
            if (curveContainer && data.curveData) {
                lpCurve = new LPCurveRenderer(curveContainer, data.curveData);
            }

            // Expose for debugging
            window.defiDash = defiDash;
            window.lpCurve = lpCurve;
        })();

        // Auto-refresh every 60 seconds with LIVE data
        setInterval(async () => {
            try {
                const liveData = await fetchLiveData();
                if (liveData && defiDash) {
                    defiDash.data = liveData;
                    defiDash.render();
                    console.log('[DeFi] Live refresh at', new Date().toLocaleTimeString(), '- Price:', liveData.hero.currentPrice);
                }
            } catch (e) {
                console.warn('[DeFi] Auto-refresh failed:', e.message);
            }
        }, 60000);
    </script>
</body>
</html>
