<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GenTech Dashboard — AAE DeFi</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* AAE DeFi LP Curve specific overrides */

        /* Agent status pulse */
        .agent-status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            border-radius: 20px;
            background: rgba(232, 65, 66, 0.08);
            border: 1px solid rgba(232, 65, 66, 0.2);
            font-size: 0.8em;
            color: var(--gold);
            margin-bottom: 20px;
        }
        .agent-status .pulse {
            width: 8px;
            height: 8px;
            background: var(--gold);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        /* Scout Fleet Cards */
        .scout-card {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: var(--radius);
            padding: 18px;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }
        .scout-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--gold);
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .scout-card:hover::before {
            opacity: 1;
        }
        .scout-card:hover {
            border-color: var(--gold);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(232, 65, 66, 0.08);
        }
        .scout-card.active {
            border-color: rgba(232, 65, 66, 0.3);
        }
        .scout-card.active::before {
            opacity: 1;
            background: var(--success);
        }
        .scout-name {
            font-size: 1.1em;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 8px;
        }
        .scout-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .scout-status.active {
            background: rgba(232, 65, 66, 0.12);
            color: var(--success);
        }
        .scout-status.scanning {
            background: rgba(0, 204, 255, 0.12);
            color: var(--accent);
        }
        .scout-status.monitoring {
            background: rgba(245, 158, 11, 0.12);
            color: var(--warning);
        }
        .scout-status.idle {
            background: rgba(107, 114, 128, 0.12);
            color: var(--text-dim);
        }
        .scout-status .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
        }
        .scout-status.active .dot {
            animation: pulse 2s ease-in-out infinite;
        }
        .scout-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.85em;
            color: var(--text-dim);
            margin-top: 8px;
        }
        .scout-findings {
            font-weight: 600;
            color: var(--gold);
        }

        /* Opportunity Feed */
        .opportunity-row {
            transition: background 0.2s ease;
        }
        .opportunity-row:hover {
            background: rgba(232, 65, 66, 0.03) !important;
        }
        .risk-badge {
            padding: 3px 8px;
            border-radius: 8px;
            font-size: 0.8em;
            font-weight: 600;
        }
        .risk-badge.low {
            background: rgba(232, 65, 66, 0.12);
            color: var(--success);
        }
        .risk-badge.medium {
            background: rgba(245, 158, 11, 0.12);
            color: var(--warning);
        }
        .risk-badge.high {
            background: rgba(255, 51, 102, 0.12);
            color: var(--danger);
        }

        /* Agent Action Log */
        .agent-action-row {
            border-left: 3px solid transparent;
            transition: all 0.2s ease;
        }
        .agent-action-row:hover {
            border-left-color: var(--gold);
            background: rgba(232, 65, 66, 0.02);
        }

        /* LP Curve container */
        .lp-curve-container {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: var(--radius);
            padding: 24px;
            position: relative;
            overflow: hidden;
        }

        /* Curve canvas */
        .lp-curve-canvas {
            width: 100%;
            height: 220px;
            position: relative;
        }

        .lp-curve-canvas canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Price marker */
        .price-marker {
            position: absolute;
            top: 0;
            width: 2px;
            height: 100%;
            background: var(--gold);
            box-shadow: 0 0 8px rgba(232, 65, 66, 0.5);
            transition: left 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
        }
        .price-marker::after {
            content: attr(data-price);
            position: absolute;
            top: -24px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--gold);
            color: #0a0e17;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75em;
            font-weight: 700;
            white-space: nowrap;
        }

        /* Range labels */
        .range-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 12px;
            padding: 0 4px;
        }
        .range-label {
            font-size: 0.8em;
            color: var(--text-dim);
        }
        .range-label .value {
            color: var(--gold);
            font-weight: 600;
        }

        /* Curve info bar */
        .curve-info {
            display: flex;
            gap: 20px;
            margin-top: 16px;
            padding: 12px 16px;
            background: rgba(232, 65, 66, 0.05);
            border-radius: var(--radius);
            border: 1px solid rgba(232, 65, 66, 0.1);
        }
        .curve-info-item {
            text-align: center;
            flex: 1;
        }
        .curve-info-label {
            font-size: 0.7em;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .curve-info-value {
            font-size: 1.1em;
            font-weight: 700;
            color: var(--gold);
            margin-top: 4px;
        }

        /* Token cards */
        .token-card {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: var(--radius);
            padding: 18px;
            transition: all 0.25s ease;
        }
        .token-card:hover {
            border-color: var(--gold);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(232, 65, 66, 0.08);
        }
        .token-symbol {
            font-size: 1.4em;
            font-weight: 700;
            color: var(--gold);
        }
        .token-name {
            color: var(--text-dim);
            font-size: 0.85em;
            margin-bottom: 12px;
        }
        .token-balance {
            font-size: 1.1em;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 4px;
        }
        .token-value {
            font-size: 1.3em;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 4px;
        }
        .token-change { font-size: 0.85em; font-weight: 500; }
        .token-change[data-positive="true"] { color: var(--success); }
        .token-change[data-positive="false"] { color: var(--danger); }

        /* Agent action highlight in tables */
        .dashboard-table tr:hover td {
            background: rgba(232, 65, 66, 0.03) !important;
        }

        /* Milestone category headers */
        .milestone-earnings {
            display: flex;
            gap: 15px;
            margin-top: 10px;
            padding: 12px 16px;
            background: rgba(232, 65, 66, 0.05);
            border-radius: var(--radius);
            border: 1px solid rgba(232, 65, 66, 0.1);
        }
        .earnings-item {
            text-align: center;
            flex: 1;
        }
        .earnings-label {
            font-size: 0.75em;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .earnings-value {
            font-size: 1.3em;
            font-weight: 700;
            color: var(--gold);
            margin-top: 4px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.3); }
        }

        /* Glow animation for price line */
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 8px rgba(232, 65, 66, 0.5); }
            50% { box-shadow: 0 0 16px rgba(232, 65, 66, 0.8); }
        }
        .price-marker {
            animation: glow 2s ease-in-out infinite;
        }

        /* Fee Milestones */
        .milestone-ladder {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: var(--radius);
            padding: 24px;
        }
        .milestone-tier {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            margin-bottom: 12px;
            background: rgba(255,255,255,0.02);
            border-radius: 10px;
            border: 1px solid var(--panel-border);
            transition: all 0.3s ease;
        }
        .milestone-tier.current {
            border-color: var(--gold);
            background: rgba(232, 65, 66, 0.05);
            box-shadow: 0 0 20px rgba(232, 65, 66, 0.1);
        }
        .milestone-tier.achieved {
            border-color: rgba(232, 65, 66, 0.3);
            opacity: 0.7;
        }
        .tier-icon {
            font-size: 2em;
            width: 50px;
            text-align: center;
        }
        .tier-info {
            flex: 1;
        }
        .tier-label {
            font-size: 1.1em;
            font-weight: 700;
            color: var(--text);
        }
        .tier-target {
            color: var(--gold);
            font-weight: 600;
        }
        .tier-unlocks {
            font-size: 0.8em;
            color: var(--text-dim);
            margin-top: 4px;
        }
        .tier-progress {
            width: 120px;
        }
        .tier-progress-bar {
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 4px;
        }
        .tier-progress-fill {
            height: 100%;
            background: var(--gold);
            border-radius: 3px;
            transition: width 0.8s ease;
        }
        .tier-progress-text {
            font-size: 0.75em;
            color: var(--text-dim);
            text-align: right;
        }

        /* Trajectory */
        .trajectory-container {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: var(--radius);
            padding: 24px;
        }
        .trajectory-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .trajectory-current {
            text-align: center;
        }
        .trajectory-current-value {
            font-size: 2.5em;
            font-weight: 700;
            color: var(--gold);
        }
        .trajectory-current-label {
            font-size: 0.8em;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .trajectory-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-top: 20px;
        }
        .trajectory-stat {
            text-align: center;
            padding: 16px;
            background: rgba(255,255,255,0.02);
            border-radius: 10px;
            border: 1px solid var(--panel-border);
        }
        .trajectory-stat-value {
            font-size: 1.5em;
            font-weight: 700;
            color: var(--gold);
        }
        .trajectory-stat-label {
            font-size: 0.75em;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
        }
        .trajectory-next {
            margin-top: 20px;
            padding: 16px;
            background: rgba(232, 65, 66, 0.05);
            border-radius: 10px;
            border: 1px solid rgba(232, 65, 66, 0.2);
            text-align: center;
        }
        .trajectory-next-label {
            font-size: 0.8em;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .trajectory-next-value {
            font-size: 1.8em;
            font-weight: 700;
            color: var(--gold);
            margin-top: 8px;
        }
        .trajectory-next-detail {
            font-size: 0.85em;
            color: var(--text-dim);
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div style="position:fixed;top:10px;left:10px;z-index:100;"><a href="../Profiles/hub.html" style="color:#3b82f6;text-decoration:none;font-size:0.9em;">← Back to Hub</a></div>
    <div id="app"></div>

    <script src="../assets/dashboard-engine.js?v=2.0"></script>
    <script>
        // ══════════════════════════════════════════════
        // LP CURVE RENDERER — Bar Chart Style
        // Colored bins like LFJ: green=USDC, purple=AVAX
        // ══════════════════════════════════════════════

        class LPCurveRenderer {
            constructor(container, data, options = {}) {
                this.container = container;
                this.data = data;
                this.options = {
                    height: 220,
                    padding: { top: 20, right: 12, bottom: 36, left: 12 },
                    barRadius: 3,
                    colors: {
                        usdc: '#22c55e',       // green — USDC side
                        usdcGlow: 'rgba(34,197,94,0.25)',
                        avax: '#a855f7',       // purple — AVAX side
                        avaxGlow: 'rgba(168,85,247,0.25)',
                        active: '#f472b6',     // pink — active/rewarded bin
                        activeGlow: 'rgba(244,114,182,0.4)',
                        priceLine: '#ef4444',  // red — current price marker
                        grid: 'rgba(255,255,255,0.06)',
                        label: '#9ca3af',
                    },
                    animDuration: 600,
                    ...options
                };
                this.canvas = null;
                this.ctx = null;
                this.animProgress = 0;
                this.animFrame = null;
                this.init();
            }

            init() {
                this.canvas = document.createElement('canvas');
                this.canvas.style.width = '100%';
                this.canvas.style.height = this.options.height + 'px';
                this.canvas.style.borderRadius = '8px';
                this.container.appendChild(this.canvas);
                this.resize();
                window.addEventListener('resize', () => this.resize());
                this.animateIn();
            }

            resize() {
                const rect = this.container.getBoundingClientRect();
                const dpr = window.devicePixelRatio || 1;
                this.canvas.width = rect.width * dpr;
                this.canvas.height = this.options.height * dpr;
                this.ctx = this.canvas.getContext('2d');
                this.ctx.scale(dpr, dpr);
                this.width = rect.width;
                this.height = this.options.height;
                this.draw(1);
            }

            priceToX(price) {
                const { rangeMin, rangeMax } = this.data;
                const { padding } = this.options;
                const plotWidth = this.width - padding.left - padding.right;
                return padding.left + ((price - rangeMin) / (rangeMax - rangeMin)) * plotWidth;
            }

            draw(progress = 1) {
                const { ctx, width, height } = this;
                const { padding, colors, barRadius } = this.options;
                const { bins, rangeMin, rangeMax, currentPrice } = this.data;
                const plotHeight = height - padding.top - padding.bottom;

                ctx.clearRect(0, 0, width, height);

                if (!bins || bins.length === 0) return;

                // Grid lines
                ctx.strokeStyle = colors.grid;
                ctx.lineWidth = 1;
                for (let i = 0; i <= 3; i++) {
                    const y = padding.top + plotHeight * (i / 3);
                    ctx.beginPath();
                    ctx.moveTo(padding.left, y);
                    ctx.lineTo(width - padding.right, y);
                    ctx.stroke();
                }

                // Price axis labels (6 evenly spaced)
                ctx.fillStyle = colors.label;
                ctx.font = '10px Inter, system-ui, sans-serif';
                ctx.textAlign = 'center';
                const labelCount = Math.min(6, bins.length);
                for (let i = 0; i < labelCount; i++) {
                    const bin = bins[Math.floor(i * (bins.length - 1) / (labelCount - 1))];
                    const x = this.priceToX(bin.price);
                    ctx.fillText('$' + bin.price.toFixed(2), x, height - 8);
                }

                // Find closest bin to current price for active marker
                let activeIdx = 0;
                let minDist = Infinity;
                bins.forEach((b, i) => {
                    const d = Math.abs(b.price - currentPrice);
                    if (d < minDist) { minDist = d; activeIdx = i; }
                });

                // Draw bars
                const maxDepth = Math.max(...bins.map(b => b.depth), 0.01);
                const binWidth = (width - padding.left - padding.right) / bins.length;
                const gap = Math.max(1, binWidth * 0.15);
                const barW = binWidth - gap;

                for (let i = 0; i < bins.length; i++) {
                    const bin = bins[i];
                    const x = padding.left + i * binWidth + gap / 2;
                    const normalizedDepth = (bin.depth / maxDepth) * progress;
                    const barH = normalizedDepth * plotHeight * 0.92;
                    const y = padding.top + plotHeight - barH;

                    // Color: left of active = USDC (green), right = AVAX (purple)
                    // Active bin = pink
                    let fillColor, glowColor;
                    if (i === activeIdx) {
                        fillColor = colors.active;
                        glowColor = colors.activeGlow;
                    } else if (bin.price <= currentPrice) {
                        fillColor = colors.usdc;
                        glowColor = colors.usdcGlow;
                    } else {
                        fillColor = colors.avax;
                        glowColor = colors.avaxGlow;
                    }

                    // Glow under bar
                    ctx.save();
                    ctx.shadowColor = glowColor;
                    ctx.shadowBlur = 8;

                    // Rounded rect
                    ctx.beginPath();
                    ctx.roundRect(x, y, barW, barH, [barRadius, barRadius, 0, 0]);
                    ctx.fillStyle = fillColor;
                    ctx.fill();
                    ctx.restore();
                }

                // Current price line
                const priceX = this.priceToX(currentPrice);
                ctx.save();
                ctx.setLineDash([4, 3]);
                ctx.strokeStyle = colors.priceLine;
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(priceX, padding.top);
                ctx.lineTo(priceX, padding.top + plotHeight);
                ctx.stroke();
                ctx.restore();

                // Price label at top
                ctx.fillStyle = colors.priceLine;
                ctx.font = 'bold 10px Inter, system-ui, sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('$' + currentPrice.toFixed(2), priceX, padding.top - 4);

                // Legend
                const legendY = height - 2;
                ctx.font = '9px Inter, system-ui, sans-serif';
                ctx.textAlign = 'left';
                // USDC dot + label
                ctx.fillStyle = colors.usdc;
                ctx.beginPath(); ctx.arc(padding.left + 4, legendY - 3, 3, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = colors.label;
                ctx.fillText('USDC', padding.left + 12, legendY);
                // AVAX dot + label
                ctx.fillStyle = colors.avax;
                ctx.beginPath(); ctx.arc(padding.left + 54, legendY - 3, 3, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = colors.label;
                ctx.fillText('AVAX', padding.left + 62, legendY);
                // Active dot + label
                ctx.fillStyle = colors.active;
                ctx.beginPath(); ctx.arc(padding.left + 104, legendY - 3, 3, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = colors.label;
                ctx.fillText('Active', padding.left + 112, legendY);
            }

            animateIn() {
                const start = performance.now();
                const dur = this.options.animDuration;
                const tick = (now) => {
                    const elapsed = now - start;
                    this.animProgress = Math.min(1, elapsed / dur);
                    // Ease out cubic
                    const t = 1 - Math.pow(1 - this.animProgress, 3);
                    this.draw(t);
                    if (this.animProgress < 1) {
                        this.animFrame = requestAnimationFrame(tick);
                    }
                };
                this.animFrame = requestAnimationFrame(tick);
            }

            updateData(newData) {
                this.data = newData;
                this.animProgress = 0;
                this.animateIn();
            }

            destroy() {
                if (this.animFrame) cancelAnimationFrame(this.animFrame);
            }
        }

        // ══════════════════════════════════════════════
        // DASHBOARD CUSTOMIZATIONS
        // ══════════════════════════════════════════════

        // AAE DeFi-specific field rendering
        const originalFormatField = DashboardEngine.prototype.formatField;
        DashboardEngine.prototype.formatField = function(value, field = {}) {
            if (value === null || value === undefined) return '—';
            
            // Green/red for P&L and token changes
            if (field.className === 'token-change' || field.key === 'pnl') {
                const num = parseFloat(value);
                const positive = num >= 0;
                const sign = positive ? '+' : '';
                const prefix = field.key === 'pnl' ? '$' : '';
                return `<span data-positive="${positive}">${prefix}${sign}${value}${field.key === 'pnl' ? '' : '%'}</span>`;
            }
            
            // Agent action badge
            if (field.key === 'type' && value && value.startsWith('Agent')) {
                return `<span class="badge" style="background:rgba(232,65,66,0.12);border-color:rgba(232,65,66,0.3);color:var(--gold);">${value}</span>`;
            }
            
            // Scout status badge with color coding
            if (field.key === 'status') {
                const statusLower = (value || '').toLowerCase();
                let bgColor = 'rgba(232,65,66,0.12)';
                let borderColor = 'rgba(232,65,66,0.3)';
                let textColor = 'var(--success)';
                
                if (statusLower === 'active' || statusLower === 'executed') {
                    bgColor = 'rgba(232,65,66,0.12)';
                    borderColor = 'rgba(232,65,66,0.3)';
                    textColor = 'var(--success)';
                } else if (statusLower === 'scanning' || statusLower === 'evaluating') {
                    bgColor = 'rgba(0,204,255,0.12)';
                    borderColor = 'rgba(0,204,255,0.3)';
                    textColor = 'var(--accent)';
                } else if (statusLower === 'monitoring' || statusLower === 'queued') {
                    bgColor = 'rgba(245,158,11,0.12)';
                    borderColor = 'rgba(245,158,11,0.3)';
                    textColor = 'var(--warning)';
                } else if (statusLower === 'idle') {
                    bgColor = 'rgba(107,114,128,0.12)';
                    borderColor = 'rgba(107,114,128,0.3)';
                    textColor = 'var(--text-dim)';
                }
                
                return `<span class="badge" style="background:${bgColor};border-color:${borderColor};color:${textColor};">${value}</span>`;
            }
            
            // Risk badge
            if (field.key === 'risk') {
                const riskLower = (value || '').toLowerCase();
                let bgColor = 'rgba(232,65,66,0.12)';
                let textColor = 'var(--success)';
                
                if (riskLower === 'medium') {
                    bgColor = 'rgba(245,158,11,0.12)';
                    textColor = 'var(--warning)';
                } else if (riskLower === 'high') {
                    bgColor = 'rgba(255,51,102,0.12)';
                    textColor = 'var(--danger)';
                }
                
                return `<span class="badge" style="background:${bgColor};color:${textColor};">${value}</span>`;
            }
            
            // Scout name badge
            if (field.key === 'scout') {

        // Custom section renderer for LP curve
        const originalRenderCustom = DashboardEngine.prototype.renderCustom;
        DashboardEngine.prototype.renderCustom = function(section) {
            if (section.customRender === 'heroEfficiency') {
                return this.renderHeroEfficiency(section);
            }
            if (section.customRender === 'marketIntel') {
                return this.renderMarketIntel(section);
            }
            if (section.customRender === 'strategyAdvisor') {
                return this.renderStrategyAdvisor(section);
            }
            if (section.customRender === 'lpCurve') {
                return `<div class="lp-curve-container" id="lp-curve-canvas"></div>`;

            if (section.customRender === 'feeMilestones') {
                return this.renderFeeMilestones(section);
            }
            if (section.customRender === 'trajectory') {
                return this.renderTrajectory(section);
            }
            if (section.customRender === 'rebalanceSuggestions') {
                return this.renderRebalanceSuggestions(section);
            }
            if (section.customRender === 'supportResistance') {
                return this.renderSupportResistance(section);
            }
            return originalRenderCustom.call(this, section);
        };

        // Hero Efficiency Renderer — the main visual (shape-aware)
        DashboardEngine.prototype.renderHeroEfficiency = function(section) {
            const data = this.resolveDataSource(section.dataSource);
            if (!data) return '<p class="empty-state">No data</p>';

            const { positionUsd, dailyFees, efficiency, efficiencyZone, shape, rangeStatus, currentPrice, rangeMin, rangeMax, milestoneNext, milestoneTarget, milestoneProgress } = data;

            // Shape-aware efficiency calculation
            const rangePct = Math.max(0, Math.min(100, ((currentPrice - rangeMin) / (rangeMax - rangeMin)) * 100));
            let effColor, effLabel, shapeNote, edgeEfficiency;

            if (shape === 'Bid-Ask' || shape === 'Bidirectional') {
                // Bid-Ask: edges = high efficiency (liquidity concentrated there)
                // Center = low efficiency (thin liquidity)
                const distFromEdge = Math.min(rangePct, 100 - rangePct); // 0 at edges, 50 at center
                edgeEfficiency = Math.max(0, 100 - (distFromEdge * 2)); // 100 at edges, 0 at center
                effColor = edgeEfficiency >= 70 ? '#e84142' : edgeEfficiency >= 50 ? '#00ccff' : edgeEfficiency >= 30 ? '#fbbf24' : '#ff3366';
                effLabel = edgeEfficiency >= 70 ? 'Edge Zone (High Fees)' : edgeEfficiency >= 50 ? 'Mid Zone' : edgeEfficiency >= 30 ? 'Approaching Center' : 'Center Zone (Low Fees)';
                shapeNote = 'Bid-Ask: Liquidity at edges, fees spike on price swings';
            } else {
                // Convergent/Bell: center = high efficiency
                edgeEfficiency = efficiency;
                effColor = efficiency >= 70 ? '#e84142' : efficiency >= 50 ? '#00ccff' : efficiency >= 30 ? '#fbbf24' : '#ff3366';
                effLabel = efficiency >= 70 ? 'Center Zone' : efficiency >= 50 ? 'Mid Zone' : efficiency >= 30 ? 'Low Zone' : 'Edge Zone';
                shapeNote = 'Convergent: Liquidity at center, steady fee accrual';
            }

            return `
                <div style="background:var(--panel-bg); border:1px solid var(--panel-border); border-radius:var(--radius); padding:28px; margin-bottom:16px;">
                    <div style="display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:20px;">
                        <!-- Left: Efficiency Gauge -->
                        <div style="text-align:center; min-width:180px;">
                            <div style="position:relative; width:160px; height:160px; margin:0 auto;">
                                <svg viewBox="0 0 160 160" style="transform:rotate(-90deg);">
                                    <circle cx="80" cy="80" r="70" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="12"/>
                                    <circle cx="80" cy="80" r="70" fill="none" stroke="${effColor}" stroke-width="12"
                                        stroke-dasharray="${(edgeEfficiency / 100) * 440} 440"
                                        stroke-linecap="round" style="filter:drop-shadow(0 0 8px ${effColor}40); transition: stroke-dasharray 1s ease;"/>
                                </svg>
                                <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center;">
                                    <div style="font-size:2.2em; font-weight:700; color:${effColor};">${edgeEfficiency.toFixed(1)}%</div>
                                    <div style="font-size:0.75em; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px;">Efficiency</div>
                                </div>
                            </div>
                            <div style="margin-top:8px; padding:4px 12px; background:${effColor}15; border:1px solid ${effColor}40; border-radius:20px; display:inline-block;">
                                <span style="font-size:0.8em; font-weight:600; color:${effColor};">${effLabel}</span>
                            </div>
                            <div style="margin-top:6px; font-size:0.7em; color:var(--text-dim); font-style:italic;">${shapeNote}</div>
                        </div>

                        <!-- Center: Key Stats -->
                        <div style="flex:1; min-width:200px;">
                            <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
                                <div>
                                    <div style="font-size:0.7em; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px;">Position Value</div>
                                    <div style="font-size:1.8em; font-weight:700; color:var(--gold);">$${positionUsd.toFixed(2)}</div>
                                </div>
                                <div>
                                    <div style="font-size:0.7em; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px;">Daily Fees</div>
                                    <div style="font-size:1.8em; font-weight:700; color:var(--gold);">$${dailyFees.toFixed(3)}</div>
                                </div>
                                <div>
                                    <div style="font-size:0.7em; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px;">AVAX Price</div>
                                    <div style="font-size:1.3em; font-weight:600; color:var(--text);">$${currentPrice.toFixed(4)}</div>
                                </div>
                                <div>
                                    <div style="font-size:0.7em; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px;">Range Status</div>
                                    <div style="font-size:1.3em; font-weight:600; color:${rangeStatus === 'In Range' ? 'var(--gold)' : 'var(--danger)'};">${rangeStatus === 'In Range' ? '🟢' : '🔴'} ${rangeStatus}</div>
                                </div>
                            </div>
                            <!-- Mini range bar -->
                            <div style="margin-top:16px;">
                                <div style="height:6px; background:rgba(255,255,255,0.06); border-radius:3px; position:relative; overflow:visible;">
                                    <div style="position:absolute; left:0; right:0; top:0; height:100%; background:linear-gradient(90deg, var(--danger), var(--gold), var(--danger)); border-radius:3px; opacity:0.3;"></div>
                                    <div style="position:absolute; left:${rangePct}%; top:-3px; width:12px; height:12px; background:var(--gold); border-radius:50%; transform:translateX(-50%); box-shadow:0 0 8px rgba(232,65,66,0.5);"></div>
                                </div>
                                <div style="display:flex; justify-content:space-between; margin-top:6px;">
                                    <span style="font-size:0.7em; color:var(--text-dim);">$${rangeMin}</span>
                                    <span style="font-size:0.7em; color:var(--text-dim);">$${rangeMax}</span>
                                </div>
                            </div>
                        </div>

                        <!-- Right: Milestone Progress -->
                        <div style="min-width:160px; text-align:right;">
                            <div style="font-size:0.7em; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px;">Next Milestone</div>
                            <div style="font-size:1.4em; font-weight:700; color:var(--gold); margin:4px 0;">🎖️ ${milestoneNext}</div>
                            <div style="font-size:0.85em; color:var(--text-dim);">Target: $${milestoneTarget}/day</div>
                            <div style="margin-top:8px; height:6px; background:rgba(255,255,255,0.06); border-radius:3px; overflow:hidden;">
                                <div style="height:100%; width:${milestoneProgress}%; background:var(--gold); border-radius:3px;"></div>
                            </div>
                            <div style="font-size:0.75em; color:var(--text-dim); margin-top:4px;">${milestoneProgress.toFixed(1)}% there</div>
                        </div>
                    </div>
                </div>
            `;
        };

        // Market Intelligence Renderer
        DashboardEngine.prototype.renderMarketIntel = function(section) {
            const data = this.resolveDataSource(section.dataSource);
            if (!data) return '<p class="empty-state">No market data</p>';

                            <div style="font-size:0.65em; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px;">24h Volume</div>
                            <div style="font-size:1.3em; font-weight:700; color:var(--text);">$${(volume24h / 1000).toFixed(1)}K</div>

                        <div style="text-align:center;">

                    <div style="display:flex; align-items:center; gap:8px; margin-bottom:12px; padding:8px 12px; background:rgba(255,255,255,0.02); border-radius:8px;">
                        <span>${trendEmoji}</span>

                    </div>
                    ${newsHtml ? `<div style="font-size:0.75em; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; margin-bottom:8px;">Pool-Relevant News</div>${newsHtml}` : ''}
                </div>

        // Support/Resistance Levels Renderer
        DashboardEngine.prototype.renderSupportResistance = function(section) {
            const data = this.resolveDataSource(section.dataSource);
            if (!data) return '<p class="empty-state">No S/R data</p>';

            const { currentPrice, levels, shapeRecommendation, proximityAlert } = data;
            
            // Calculate distance to nearest support/resistance
            const resistanceLevels = levels.filter(l => l.type === 'resistance').sort((a, b) => a.price - b.price);
            const supportLevels = levels.filter(l => l.type === 'support').sort((a, b) => b.price - a.price);
            
            const nearestResistance = resistanceLevels.find(r => r.price > currentPrice);
            const nearestSupport = supportLevels.find(s => s.price < currentPrice);
            
            const distToResistance = nearestResistance ? ((nearestResistance.price - currentPrice) / currentPrice * 100).toFixed(1) : '∞';
            const distToSupport = nearestSupport ? ((currentPrice - nearestSupport.price) / currentPrice * 100).toFixed(1) : '∞';

            // Build price ladder
            const allLevels = [...supportLevels, ...resistanceLevels].sort((a, b) => b.price - a.price);
            
            let ladderHtml = allLevels.map(level => {
                const isAbove = level.price > currentPrice;
                const distance = Math.abs(level.price - currentPrice);
                const distPct = (distance / currentPrice * 100).toFixed(1);
                const barWidth = Math.min(100, Math.max(10, 100 - (distance / currentPrice * 500)));
                
                const color = level.type === 'resistance' 
                    ? (level.strength === 'strong' ? '#ef4444' : level.strength === 'medium' ? '#f59e0b' : '#6b7280')
                    : (level.strength === 'strong' ? '#22c55e' : level.strength === 'medium' ? '#10b981' : '#6b7280');
                
                const emoji = level.type === 'resistance' ? '🔴' : '🟢';
                const strengthBadge = level.strength === 'strong' ? '⚔️' : level.strength === 'medium' ? '🛡️' : '📍';
                
                return `
                    <div style="display:flex; align-items:center; gap:12px; padding:10px 14px; background:${color}08; border:1px solid ${color}30; border-radius:8px; margin-bottom:8px;">
                        <div style="min-width:24px; text-align:center;">${emoji}</div>
                        <div style="flex:1;">
                            <div style="display:flex; justify-content:space-between; align-items:center;">
                                <span style="font-weight:700; color:${color};">$${level.price.toFixed(2)}</span>
                                <span style="font-size:0.75em; color:var(--text-dim);">${distPct}% ${isAbove ? 'above' : 'below'}</span>
                            </div>
                            <div style="font-size:0.8em; color:var(--text-dim); margin-top:2px;">
                                ${strengthBadge} ${level.label} ${level.note ? `· ${level.note}` : ''}
                            </div>
                        </div>
                        <div style="width:60px; height:6px; background:rgba(255,255,255,0.06); border-radius:3px; overflow:hidden;">
                            <div style="width:${barWidth}%; height:100%; background:${color}; border-radius:3px;"></div>
                        </div>
                    </div>
                `;
            }).join('');

            // Shape recommendation card
            const shapeColor = shapeRecommendation.shape === 'Curve' ? '#22c55e' : shapeRecommendation.shape === 'Bid-Ask' ? '#f59e0b' : '#3b82f6';
            const shapeEmoji = shapeRecommendation.shape === 'Curve' ? '📈' : shapeRecommendation.shape === 'Bid-Ask' ? '📊' : '🎯';

            return `
                <div style="background:var(--panel-bg); border:1px solid var(--panel-border); border-radius:var(--radius); padding:20px;">
                    <!-- Header with current price context -->
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; padding-bottom:12px; border-bottom:1px solid var(--panel-border);">
                        <div>
                            <div style="font-size:0.7em; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px;">Support & Resistance</div>
                            <div style="font-size:1.4em; font-weight:700; color:var(--text);">Price Map</div>
                        </div>
                        <div style="text-align:right;">
                            <div style="font-size:0.7em; color:var(--text-dim);">Current Price</div>
                            <div style="font-size:1.3em; font-weight:700; color:var(--gold);">$${currentPrice.toFixed(3)}</div>
                        </div>
                    </div>

                    <!-- Proximity Alerts -->
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px;">
                        <div style="padding:14px; background:rgba(239,68,68,0.06); border:1px solid rgba(239,68,68,0.2); border-radius:10px;">
                            <div style="font-size:0.65em; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px;">Nearest Resistance</div>
                            <div style="font-size:1.2em; font-weight:700; color:#ef4444; margin:4px 0;">
                                ${nearestResistance ? `$${nearestResistance.price.toFixed(2)}` : 'None'}
                            </div>
                            <div style="font-size:0.8em; color:var(--text-dim);">
                                ${distToResistance === '∞' ? 'No resistance above' : `${distToResistance}% away`}
                            </div>
                        </div>
                        <div style="padding:14px; background:rgba(34,197,94,0.06); border:1px solid rgba(34,197,94,0.2); border-radius:10px;">
                            <div style="font-size:0.65em; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px;">Nearest Support</div>
                            <div style="font-size:1.2em; font-weight:700; color:#22c55e; margin:4px 0;">
                                ${nearestSupport ? `$${nearestSupport.price.toFixed(2)}` : 'None'}
                            </div>
                            <div style="font-size:0.8em; color:var(--text-dim);">
                                ${distToSupport === '∞' ? 'No support below' : `${distToSupport}% away`}
                            </div>
                        </div>
                    </div>

                    ${proximityAlert ? `
                        <div style="padding:12px 16px; background:rgba(245,158,11,0.08); border:1px solid rgba(245,158,11,0.3); border-radius:8px; margin-bottom:16px; display:flex; align-items:center; gap:10px;">
                            <span style="font-size:1.2em;">⚠️</span>
                            <span style="font-size:0.9em; color:#f59e0b; font-weight:500;">${proximityAlert}</span>
                        </div>
                    ` : ''}

                    <!-- Price Ladder -->
                    <div style="margin-bottom:20px;">
                        <div style="font-size:0.7em; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; margin-bottom:12px;">Price Ladder</div>
                        ${ladderHtml}
                    </div>

                    <!-- Shape Recommendation -->
                    <div style="padding:16px; background:${shapeColor}08; border:1px solid ${shapeColor}30; border-radius:10px;">
                        <div style="display:flex; align-items:center; gap:10px; margin-bottom:8px;">
                            <span style="font-size:1.3em;">${shapeEmoji}</span>
                            <div>
                                <div style="font-size:0.7em; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px;">Recommended Shape</div>
                                <div style="font-size:1.2em; font-weight:700; color:${shapeColor};">${shapeRecommendation.shape}</div>
                            </div>
                        </div>
                        <div style="font-size:0.85em; color:var(--text-dim);">${shapeRecommendation.reason}</div>
                        <div style="margin-top:8px; font-size:0.8em; color:var(--text-dim);">
                            <strong>Optimal Range:</strong> $${shapeRecommendation.optimalRange[0].toFixed(2)} – $${shapeRecommendation.optimalRange[1].toFixed(2)}
                        </div>
                    </div>
                </div>
            `;
        };

        // Scout Fleet Renderer
        DashboardEngine.prototype.renderScoutFleet = function(section) {
            const data = this.resolveDataSource(section.dataSource);

        // Fee Milestones Renderer
        DashboardEngine.prototype.renderFeeMilestones = function(section) {
            const data = this.resolveDataSource(section.dataSource);
            if (!data) return '<p class="empty-state">No milestone data</p>';

            const { currentDailyFees, positionUsd, cumulativeFees, daysActive, tiers } = data;
            let currentTierIdx = -1;
            let nextTierIdx = 0;
            let progressPct = 0;

            // Find current tier
            for (let i = 0; i < tiers.length; i++) {
                if (currentDailyFees >= tiers[i].target) {
                    currentTierIdx = i;
                    nextTierIdx = Math.min(i + 1, tiers.length - 1);
                }
            }

            // Calculate progress to next tier
            if (currentTierIdx >= 0) {
                const currentTarget = tiers[currentTierIdx].target;
                const nextTarget = tiers[nextTierIdx].target;
                progressPct = Math.min(100, ((currentDailyFees - currentTarget) / (nextTarget - currentTarget)) * 100);
            } else {
                nextTierIdx = 0;
                progressPct = Math.min(100, (currentDailyFees / tiers[0].target) * 100);
            }

            const tiersHtml = tiers.map((tier, i) => {
                let statusClass = '';
                if (i < currentTierIdx + 1) statusClass = 'achieved';
                else if (i === nextTierIdx && currentTierIdx + 1 === i) statusClass = 'current';
                else if (i === 0 && currentTierIdx === -1) statusClass = 'current';

                const tierProgress = i <= currentTierIdx ? 100 :
                    (i === nextTierIdx ? progressPct :
                    (currentDailyFees / tier.target) * 100);

                return `
                    <div class="milestone-tier ${statusClass}">
                        <div class="tier-icon">${tier.icon}</div>
                        <div class="tier-info">
                            <div class="tier-label">Tier ${tier.tier}: ${tier.label} — <span class="tier-target">$${tier.target}/day</span></div>
                            <div class="tier-unlocks">Unlocks: ${tier.unlocks}</div>
                        </div>
                        <div class="tier-progress">
                            <div class="tier-progress-bar">
                                <div class="tier-progress-fill" style="width: ${tierProgress}%"></div>
                            </div>
                            <div class="tier-progress-text">${tierProgress.toFixed(1)}%</div>
                        </div>
                    </div>
                `;
            }).join('');

            return `
                <div class="milestone-ladder">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                        <div>
                            <div style="font-size:0.8em; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px;">Current Daily Fees</div>
                            <div style="font-size:2em; font-weight:700; color:var(--gold);">$${currentDailyFees.toFixed(3)}</div>
                        </div>
                        <div style="text-align:right;">
                            <div style="font-size:0.8em; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px;">Position Size</div>
                            <div style="font-size:1.5em; font-weight:700; color:var(--text);">$${positionUsd.toFixed(2)}</div>
                        </div>
                    </div>
                    ${tiersHtml}
                </div>
            `;
        };

        // Trajectory Renderer
        DashboardEngine.prototype.renderTrajectory = function(section) {
            const data = this.resolveDataSource(section.dataSource);
            if (!data) return '<p class="empty-state">No trajectory data</p>';

            const { currentDailyFees, positionUsd, cumulativeFees, daysActive, tiers } = data;

            // Find current and next tier
            let currentTierIdx = -1;
            for (let i = 0; i < tiers.length; i++) {
                if (currentDailyFees >= tiers[i].target) currentTierIdx = i;
            }
            const nextTier = tiers[Math.min(currentTierIdx + 1, tiers.length - 1)];
            const gapToNext = Math.max(0, nextTier.target - currentDailyFees);

            // Calculate APR and projections
            const dailyApr = positionUsd > 0 ? (currentDailyFees / positionUsd) * 100 : 0;
            const annualizedReturn = dailyApr * 365;

            // Days to next milestone (assuming current fee rate stays constant)
            const daysToNext = currentDailyFees > 0 ? Math.ceil(gapToNext / currentDailyFees) : Infinity;

            // Required multiplier to hit next tier
            const multiplier = currentDailyFees > 0 ? (nextTier.target / currentDailyFees) : Infinity;

            // Capital needed at current rate to hit next tier
            const capitalNeeded = currentDailyFees > 0 ?
                Math.ceil((nextTier.target / currentDailyFees) * positionUsd) : Infinity;

            const formatDays = (d) => {
                if (d === Infinity) return '∞';
                if (d > 365) return `${(d / 365).toFixed(1)} years`;
                if (d > 30) return `${(d / 30).toFixed(1)} months`;
                return `${d} days`;
            };

            return `
                <div class="trajectory-container">
                    <div class="trajectory-header">
                        <div class="trajectory-current">
                            <div class="trajectory-current-label">Daily Fees</div>
                            <div class="trajectory-current-value">$${currentDailyFees.toFixed(3)}</div>
                        </div>
                        <div style="text-align:center;">
                            <div style="font-size:0.8em; color:var(--text-dim);">NEXT TARGET</div>
                            <div style="font-size:1.5em; font-weight:700; color:var(--gold);">${nextTier.icon} $${nextTier.target}/day</div>
                            <div style="font-size:0.8em; color:var(--text-dim);">${nextTier.label}</div>
                        </div>
                    </div>

                    <div class="trajectory-stats">
                        <div class="trajectory-stat">
                            <div class="trajectory-stat-value">${dailyApr.toFixed(2)}%</div>
                            <div class="trajectory-stat-label">Daily APR</div>
                        </div>
                        <div class="trajectory-stat">
                            <div class="trajectory-stat-value">${annualizedReturn.toFixed(0)}%</div>
                            <div class="trajectory-stat-label">Annualized</div>
                        </div>
                        <div class="trajectory-stat">
                            <div class="trajectory-stat-value">$${cumulativeFees.toFixed(2)}</div>
                            <div class="trajectory-stat-label">Cumulative Fees</div>
                        </div>
                    </div>

                    <div class="trajectory-next">
                        <div class="trajectory-next-label">Time to ${nextTier.label} ($${nextTier.target}/day)</div>
                        <div class="trajectory-next-value">${formatDays(daysToNext)}</div>
                        <div class="trajectory-next-detail">
                            At current rate: ${multiplier.toFixed(1)}x fees needed · $${capitalNeeded.toLocaleString()} capital at same efficiency
                        </div>
                    </div>
                </div>
            `;
        };

        // Rebalance Suggestions Renderer
        DashboardEngine.prototype.renderRebalanceSuggestions = function(section) {
            const data = this.resolveDataSource(section.dataSource);
            if (!data) return '<p class="empty-state">No rebalance data</p>';

            const { efficiency, price, rangeMin, rangeMax, volatility, trend, suggestions } = data;

            return `
                <div style="padding: 16px;">
                    <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 16px;">
                        <span style="font-size: 1.5em;">🔄</span>
                        <div>
                            <div style="font-size: 1.1em; font-weight: 600; color: var(--gold);">Rebalance Intelligence</div>
                            <div style="font-size: 0.8em; color: var(--text-dim);">Smart suggestions based on current market conditions</div>
                        </div>
                    </div>

                    <!-- Current Status -->
                    <div style="background: var(--bg-alt); border: 1px solid var(--panel-border); border-radius: 8px; padding: 12px; margin-bottom: 16px;">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <div>
                                <div style="font-size: 0.75em; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px;">Current Efficiency</div>
                                <div style="font-size: 1.8em; font-weight: 700; color: ${efficiency > 70 ? '#22c55e' : efficiency > 50 ? '#f59e0b' : '#ef4444'};">${efficiency}%</div>
                            </div>
                            <div style="text-align: right;">
                                <div style="font-size: 0.75em; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px;">Range</div>
                                <div style="font-size: 1em; color: var(--text);">$${rangeMin.toFixed(2)} — $${rangeMax.toFixed(2)}</div>
                            </div>
                        </div>
                    </div>

                    <!-- Suggestions -->
                    <div style="display: flex; flex-direction: column; gap: 12px;">
                        ${suggestions.map(s => `
                            <div style="background: var(--bg-alt); border: 1px solid ${s.priority === 'high' ? '#ef4444' : s.priority === 'medium' ? '#f59e0b' : '#22c55e'}; border-radius: 8px; padding: 12px;">
                                <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 8px;">
                                    <span style="font-size: 1.2em;">${s.icon}</span>
                                    <div style="font-weight: 600; color: var(--text);">${s.title}</div>
                                    <div style="margin-left: auto; font-size: 0.7em; padding: 2px 8px; border-radius: 4px; background: ${s.priority === 'high' ? 'rgba(239,68,68,0.2)' : s.priority === 'medium' ? 'rgba(245,158,11,0.2)' : 'rgba(34,197,94,0.2)'}; color: ${s.priority === 'high' ? '#ef4444' : s.priority === 'medium' ? '#f59e0b' : '#22c55e'};">
                                        ${s.priority.toUpperCase()}
                                    </div>
                                </div>
                                <div style="font-size: 0.85em; color: var(--text-dim); margin-bottom: 8px;">${s.description}</div>
                                <div style="display: flex; justify-content: space-between; align-items: center;">
                                    <div style="font-size: 0.75em; color: var(--text-dim);">Impact: <span style="color: var(--gold);">${s.impact}</span></div>
                                    ${s.action ? `<div style="font-size: 0.75em; color: var(--blue); cursor: pointer;">${s.action} →</div>` : ''}
                                </div>
                            </div>
                        `).join('')}
                    </div>

                    <!-- Quick Actions -->
                    <div style="margin-top: 16px; display: flex; gap: 8px; flex-wrap: wrap;">
                        <a href="https://traderjoexyz.com/avalanche/pool?tokenA=0xB31f66AA3C1e785363F0875A1B74E27b85FD66c7&tokenB=0xB97EF9Ef8734C71904D8002F8b6Bc66Dd9c48a6E" target="_blank" style="flex: 1; min-width: 120px; padding: 10px; background: var(--bg-alt); border: 1px solid var(--panel-border); border-radius: 6px; text-align: center; text-decoration: none; color: var(--gold); font-size: 0.85em;">
                            🔄 Rebalance on Trader Joe
                        </a>
                        <div style="flex: 1; min-width: 120px; padding: 10px; background: var(--bg-alt); border: 1px solid var(--panel-border); border-radius: 6px; text-align: center; color: var(--text-dim); font-size: 0.85em;">
                            📊 View Full Analysis
                        </div>
                    </div>
                </div>
            `;
        };

        // Inject agent status after header
        const originalRenderShell = DashboardEngine.prototype.renderShell;
        DashboardEngine.prototype.renderShell = function() {
            originalRenderShell.call(this);
            const header = this.rootEl.querySelector('.dashboard-header');
            if (header) {
                const status = document.createElement('div');
                status.className = 'agent-status';
                status.innerHTML = '<div class="pulse"></div> 4 Scouts Active — Yield · Opportunity · Risk · Cross-Chain';
                header.appendChild(status);
            }
        };

        // Initialize
        let lpCurve = null;
        let defiDash = null;

        // Fetch live market data from DexScreener (returns only price/volume overlay)
        async function fetchLiveData() {
            try {
                const res = await fetch('https://api.dexscreener.com/latest/dex/pairs/avalanche/0x864d4e5Ee7318e97483DB7EB0912E09F161516EA');
                const json = await res.json();
                const pair = json.pairs?.[0];
                if (!pair) return null;

                return {
                    currentPrice: parseFloat(pair.priceUsd) || undefined,
                    priceChange24h: pair.priceChange?.h24 !== undefined ? parseFloat(pair.priceChange.h24) : undefined,
                    volume24h: pair.volume?.h24 !== undefined ? parseFloat(pair.volume.h24) : undefined,
                    liquidity: pair.liquidity?.usd !== undefined ? parseFloat(pair.liquidity.usd) : undefined
                };
            } catch (e) {
                console.warn('[DeFi] DexScreener fetch failed:', e.message);
                return null;
            }
        }

        // Compute weekly/monthly projections and fire-sale signals from base data
        function enrichDashboardData(data) {
            const pos = data.lpPosition || {};
            const fees = data.fees || {};
            const hero = data.hero || {};
            const dailyFees = parseFloat(fees.dailyFees || hero.dailyFees || 0);
            const positionUsd = parseFloat(pos.totalValueUSD || pos.totalValue || hero.positionUsd || 0);
            const currentPrice = parseFloat(data.currentPrice || pos.currentPrice || hero.currentPrice || 0);
            const rangeMin = parseFloat(pos.rangeMin || hero.rangeMin || 0);
            const rangeMax = parseFloat(pos.rangeMax || hero.rangeMax || 0);
            const rangeCenter = (rangeMin + rangeMax) / 2;
            const avaxAmount = parseFloat(pos.avaxAmount || 0);
            const usdcAmount = parseFloat(pos.usdcAmount || 0);

            // Weekly / monthly / annual projections
            const weeklyFees = dailyFees * 7;
            const monthlyFees = dailyFees * 30;
            const annualFees = dailyFees * 365;
            const weeklyApr = positionUsd > 0 ? (weeklyFees / positionUsd) * 100 : 0;
            const monthlyApr = positionUsd > 0 ? (monthlyFees / positionUsd) * 100 : 0;

            data.projections = {
                dailyFees,
                weeklyFees,
                monthlyFees,
                annualFees,
                weeklyApr,
                monthlyApr,
                positionUsd
            };

            // Fire sale: price near or below range low, or discount vs range center
            const distToLow = rangeMin > 0 ? ((currentPrice - rangeMin) / rangeMin) * 100 : 0;
            const discountToCenter = rangeCenter > 0 ? ((rangeCenter - currentPrice) / rangeCenter) * 100 : 0;
            const isFireSale = distToLow <= 2 || currentPrice <= rangeMin || discountToCenter >= 10;

            // Average price proxy: current average cost basis of held tokens
            const avgHoldingPrice = avaxAmount > 0 ? (usdcAmount / avaxAmount) : currentPrice;

            data.fireSale = {
                currentPrice,
                rangeMin,
                rangeMax,
                rangeCenter,
                avgHoldingPrice,
                distToLow,
                discountToCenter,
                isFireSale,
                message: isFireSale
                    ? `🔥 Fire sale zone: AVAX is ${Math.abs(discountToCenter).toFixed(1)}% below range center — consider adding liquidity or spot buying.`
                    : distToLow <= 5
                        ? `⚠️ Approaching range low: only ${distToLow.toFixed(1)}% above $${rangeMin.toFixed(2)}.`
                        : `Price is ${discountToCenter >= 0 ? discountToCenter.toFixed(1) + '% below' : Math.abs(discountToCenter).toFixed(1) + '% above'} range center ($${rangeCenter.toFixed(2)}).`
            };

            return data;
        }

        (async () => {
            const templateRes = await fetch('defi-template.json?' + Date.now(), { cache: 'no-store' });
            const template = await templateRes.json();

            // Always load full data from defi-data.json first
            const owner = 'ProtoJay4789';
            const repo = 'ProtoJay4789.github.io';
            const branch = 'main';
            const dataUrl = `https://raw.githubusercontent.com/${owner}/${repo}/${branch}/DeFi/defi-data.json`;
            const dataRes = await fetch(dataUrl + '?' + Date.now(), { cache: 'no-store' });
            const data = await dataRes.json();

            // Overlay live price/volume from DexScreener
            try {
                const liveData = await fetchLiveData();
                if (liveData) {
                    if (liveData.currentPrice) data.currentPrice = liveData.currentPrice;
                    if (liveData.priceChange24h !== undefined) data.priceChange24h = liveData.priceChange24h;
                    if (liveData.volume24h) data.volume24h = liveData.volume24h;
                    if (liveData.liquidity) data.liquidity = liveData.liquidity;
                }
            } catch (e) {
                console.warn('[DeFi] DexScreener overlay failed:', e.message);
            }

            // Enrich with computed projections + fire-sale signals
            enrichDashboardData(data);

            defiDash = new DashboardEngine({ template, data });
            await defiDash.init('#app');

            // Initialize LP curve renderer
            const curveContainer = document.getElementById('lp-curve-canvas');
            if (curveContainer && data.curveData) {
                lpCurve = new LPCurveRenderer(curveContainer, data.curveData);
            }

            // Expose for debugging
            window.defiDash = defiDash;
            window.lpCurve = lpCurve;
        })();

        // Auto-refresh every 60 seconds with LIVE data + fresh defi-data.json
        async function applyLiveData() {
            try {
                // 1. Re-fetch fresh position data from GitHub
                const owner = 'ProtoJay4789';
                const repo = 'ProtoJay4789.github.io';
                const branch = 'main';
                const dataUrl = `https://raw.githubusercontent.com/${owner}/${repo}/${branch}/DeFi/defi-data.json`;
                const dataRes = await fetch(dataUrl + '?' + Date.now(), { cache: 'no-store' });
                const freshData = await dataRes.json();

                // 2. Overlay live DexScreener data
                const liveData = await fetchLiveData();

                if (defiDash) {
                    // Deep merge: fresh data first, then live overlay
                    function deepMerge(target, source) {
                        for (const key of Object.keys(source)) {
                            if (source[key] && typeof source[key] === 'object' && !Array.isArray(source[key]) && target[key]) {
                                deepMerge(target[key], source[key]);
                            } else {
                                target[key] = source[key];
                            }
                        }
                        return target;
                    }
                    deepMerge(defiDash.data, freshData);
                    if (liveData) {
                        if (liveData.currentPrice) defiDash.data.currentPrice = liveData.currentPrice;
                        if (liveData.priceChange24h !== undefined) defiDash.data.priceChange24h = liveData.priceChange24h;
                        if (liveData.volume24h) defiDash.data.volume24h = liveData.volume24h;
                        if (liveData.liquidity) defiDash.data.liquidity = liveData.liquidity;
                    }
                    enrichDashboardData(defiDash.data);
                    defiDash.render();
                    // Re-create LPCurveRenderer (render() replaces the DOM container)
                    const curveContainer = document.getElementById('lp-curve-canvas');
                    if (curveContainer && defiDash.data.curveData) {
                        if (lpCurve) lpCurve.destroy();
                        lpCurve = new LPCurveRenderer(curveContainer, defiDash.data.curveData);
                        window.lpCurve = lpCurve;
                    }
                    console.log('[DeFi] Live refresh at', new Date().toLocaleTimeString(), '- Price:', defiDash.data?.currentPrice);
                }
            } catch (e) {
                console.warn('[DeFi] Auto-refresh failed:', e.message);
            }
        }
        // First refresh after 5 seconds, then every 60 seconds
        setTimeout(applyLiveData, 5000);
        setInterval(applyLiveData, 60000);
    </script>
</body>
</html>
