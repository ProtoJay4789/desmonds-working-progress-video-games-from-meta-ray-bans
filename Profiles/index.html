<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GenTech — People Directory</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Crimson Text', Georgia, serif;
            background: #0a0a0f;
            color: #e8e8e8;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            padding: 60px 20px;
            width: 100%;
            flex: 1;
        }

        /* ── Header ── */
        .dir-header {
            text-align: center;
            margin-bottom: 48px;
        }
        .dir-header h1 {
            font-family: 'Cinzel', serif;
            font-weight: 700;
            font-size: 2em;
            color: #c9a84c;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }
        .dir-header p {
            color: #6a6a7a;
            font-size: 1.1em;
            font-style: italic;
        }

        /* ── Profile Grid ── */
        .profile-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 18px;
        }
        .profile-card {
            background: #12121a;
            border: 1px solid #1e1e2e;
            border-radius: 16px;
            padding: 32px 20px;
            text-align: center;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
            position: relative;
        }
        .profile-card::after {
            content: '→';
            position: absolute;
            bottom: 14px;
            right: 18px;
            color: #c9a84c44;
            font-size: 1.2em;
            transition: all 0.3s;
        }
        .profile-card:hover {
            border-color: #c9a84c55;
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(201,168,76,0.08);
        }
        .profile-card:hover::after {
            color: #c9a84c;
            transform: translateX(4px);
        }

        .profile-icon {
            font-size: 2.8rem;
            margin-bottom: 14px;
            filter: drop-shadow(0 0 12px rgba(201,168,76,0.2));
        }
        .profile-card h2 {
            font-family: 'Cinzel', serif;
            font-weight: 600;
            font-size: 1.1em;
            color: #e8e8e8;
            margin-bottom: 6px;
        }
        .profile-card .role {
            color: #6a6a7a;
            font-size: 0.85em;
        }

        /* ── Footer ── */
        footer {
            text-align: center;
            padding: 28px 20px;
            font-family: 'Cinzel', serif;
            font-size: 0.75em;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #4a4a5a;
            border-top: 1px solid #1a1a28;
        }

        /* ── Responsive ── */
        @media (max-width: 500px) {
            .profile-grid { grid-template-columns: 1fr; }
            .dir-header h1 { font-size: 1.5em; }
        }
    </style>
</head>
<body>
    <div class="container">

        <div class="dir-header">
            <h1>SELECT YOUR PROFILE</h1>
            <p>The GenTech member directory</p>
        </div>

        <div class="profile-grid">

            <!-- Jordan -->
            <a href="jordan.html" class="profile-card">
                <div class="profile-icon">🏗️</div>
                <h2>Jordan</h2>
                <div class="role">Founding Member</div>
            </a>

            <!-- Christel -->
            <a href="../Cookbook/christel-kitchen.html" class="profile-card">
                <div class="profile-icon">🍳</div>
                <h2>Christel</h2>
                <div class="role">Kitchen &amp; Code</div>
            </a>

            <!-- Vanito -->
            <a href="vanito.html" class="profile-card">
                <div class="profile-icon">🛠️</div>
                <h2>Vanito</h2>
                <div class="role">Ops &amp; Infrastructure</div>
            </a>

        </div>
    </div>

    <footer>
        GENTECH · Built with ❤️
    </footer>
</body>
</html>
