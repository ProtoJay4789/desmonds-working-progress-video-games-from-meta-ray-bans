<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="seedGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="rootGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.2" />
    </linearGradient>
  </defs>
  
  <!-- Dark background -->
  <rect width="200" height="200" rx="24" fill="#0a0a0a"/>
  
  <!-- Root system (bottom) -->
  <g stroke="#3b82f6" stroke-width="1.5" fill="none" opacity="0.5">
    <!-- Main root down -->
    <line x1="100" y1="120" x2="100" y2="170"/>
    <!-- Left roots -->
    <line x1="100" y1="130" x2="70" y2="165"/>
    <line x1="70" y1="165" x2="55" y2="180"/>
    <line x1="100" y1="145" x2="80" y2="175"/>
    <!-- Right roots -->
    <line x1="100" y1="130" x2="130" y2="165"/>
    <line x1="130" y1="165" x2="145" y2="180"/>
    <line x1="100" y1="145" x2="120" y2="175"/>
    <!-- Sub roots -->
    <line x1="70" y1="165" x2="60" y2="185"/>
    <line x1="130" y1="165" x2="140" y2="185"/>
  </g>
  
  <!-- Seed circle -->
  <circle cx="100" cy="90" r="30" fill="url(#seedGrad)" opacity="0.9"/>
  
  <!-- Inner circuit pattern -->
  <g stroke="#0a0a0a" stroke-width="1.2" fill="none">
    <!-- Horizontal lines -->
    <line x1="88" y1="82" x2="112" y2="82"/>
    <line x1="85" y1="90" x2="115" y2="90"/>
    <line x1="88" y1="98" x2="112" y2="98"/>
    <!-- Vertical connector -->
    <line x1="100" y1="78" x2="100" y2="102"/>
    <!-- Node dots -->
    <circle cx="88" cy="82" r="2" fill="#0a0a0a"/>
    <circle cx="112" cy="82" r="2" fill="#0a0a0a"/>
    <circle cx="85" cy="90" r="2" fill="#0a0a0a"/>
    <circle cx="115" cy="90" r="2" fill="#0a0a0a"/>
    <circle cx="88" cy="98" r="2" fill="#0a0a0a"/>
    <circle cx="112" cy="98" r="2" fill="#0a0a0a"/>
  </g>
  
  <!-- Circuit branches (top) -->
  <g stroke="#22c55e" stroke-width="1" fill="none" opacity="0.6">
    <line x1="100" y1="60" x2="100" y2="45"/>
    <line x1="100" y1="45" x2="85" y2="35"/>
    <line x1="100" y1="45" x2="115" y2="35"/>
    <line x1="100" y1="52" x2="80" y2="42"/>
    <line x1="100" y1="52" x2="120" y2="42"/>
    <!-- Node dots -->
    <circle cx="100" cy="45" r="2" fill="#22c55e"/>
    <circle cx="85" cy="35" r="1.5" fill="#22c55e"/>
    <circle cx="115" cy="35" r="1.5" fill="#22c55e"/>
    <circle cx="80" cy="42" r="1.5" fill="#22c55e"/>
    <circle cx="120" cy="42" r="1.5" fill="#22c55e"/>
  </g>
</svg>
