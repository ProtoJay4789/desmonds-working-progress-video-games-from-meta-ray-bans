<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#0f172a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="chartGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="agentGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="agentGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#15803d;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="bpGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:0.9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Subtle grid -->
  <g stroke="#3b82f6" stroke-width="0.3" opacity="0.06">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="100" y1="0" x2="100" y2="630"/>
    <line x1="200" y1="0" x2="200" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/><line x1="500" y1="0" x2="500" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="700" y1="0" x2="700" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/><line x1="1100" y1="0" x2="1100" y2="630"/>
    <line x1="0" y1="50" x2="1200" y2="50"/><line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="150" x2="1200" y2="150"/><line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="250" x2="1200" y2="250"/><line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="350" x2="1200" y2="350"/><line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="450" x2="1200" y2="450"/><line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="0" y1="550" x2="1200" y2="550"/><line x1="0" y1="600" x2="1200" y2="600"/>
  </g>

  <!-- === CHART AREA (left side) === -->
  <g transform="translate(80, 120)">
    <!-- Chart background -->
    <rect x="0" y="0" width="450" height="320" rx="12" fill="#0f172a" stroke="#1e293b" stroke-width="1" opacity="0.8"/>

    <!-- Chart grid lines -->
    <g stroke="#1e293b" stroke-width="0.5">
      <line x1="40" y1="40" x2="430" y2="40"/>
      <line x1="40" y1="100" x2="430" y2="100"/>
      <line x1="40" y1="160" x2="430" y2="160"/>
      <line x1="40" y1="220" x2="430" y2="220"/>
      <line x1="40" y1="280" x2="430" y2="280"/>
    </g>

    <!-- Y-axis labels -->
    <g font-family="system-ui" font-size="10" fill="#64748b">
      <text x="30" y="44" text-anchor="end">$10</text>
      <text x="30" y="104" text-anchor="end">$8</text>
      <text x="30" y="164" text-anchor="end">$6</text>
      <text x="30" y="224" text-anchor="end">$4</text>
      <text x="30" y="284" text-anchor="end">$2</text>
    </g>

    <!-- Bar chart (rising) -->
    <g fill="url(#barGrad)">
      <rect x="55" y="240" width="30" height="40" rx="3" opacity="0.7"/>
      <rect x="95" y="210" width="30" height="70" rx="3" opacity="0.75"/>
      <rect x="135" y="180" width="30" height="100" rx="3" opacity="0.8"/>
      <rect x="175" y="150" width="30" height="130" rx="3" opacity="0.85"/>
      <rect x="215" y="110" width="30" height="170" rx="3" opacity="0.9"/>
      <rect x="255" y="80" width="30" height="200" rx="3" opacity="0.95"/>
      <rect x="295" y="50" width="30" height="230" rx="3"/>
      <rect x="335" y="30" width="30" height="250" rx="3"/>
    </g>

    <!-- Trend line (going up) -->
    <polyline points="70,238 110,208 150,178 190,148 230,108 270,78 310,48 350,28"
      stroke="url(#lineGrad)" stroke-width="3" fill="none" filter="url(#glow)"/>

    <!-- Trend line dots -->
    <g fill="#22c55e" filter="url(#softGlow)">
      <circle cx="70" cy="238" r="4"/>
      <circle cx="150" cy="178" r="4"/>
      <circle cx="230" cy="108" r="4"/>
      <circle cx="310" cy="48" r="4"/>
      <circle cx="350" cy="28" r="5"/>
    </g>

    <!-- Arrow at end of trend -->
    <polygon points="350,28 340,18 358,18" fill="#22c55e" filter="url(#glow)"/>

    <!-- Chart label -->
    <text x="235" y="310" font-family="system-ui" font-size="11" fill="#64748b" text-anchor="middle">AAE Protocol Growth</text>
  </g>

  <!-- === AGENTS (right side) === -->

  <!-- Agent 1 (left) — holding blueprint -->
  <g transform="translate(650, 180)">
    <!-- Body -->
    <rect x="-18" y="30" width="36" height="70" rx="8" fill="url(#agentGrad1)"/>
    <!-- Head -->
    <circle cx="0" cy="12" r="20" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
    <!-- Visor/eyes -->
    <rect x="-12" y="6" width="24" height="8" rx="4" fill="#3b82f6" opacity="0.8"/>
    <!-- Antenna -->
    <line x1="0" y1="-8" x2="0" y2="-20" stroke="#3b82f6" stroke-width="2"/>
    <circle cx="0" cy="-22" r="3" fill="#3b82f6" filter="url(#glow)"/>
    <!-- Arms -->
    <line x1="-18" y1="45" x2="-35" y2="60" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>
    <line x1="18" y1="45" x2="35" y2="30" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>
    <!-- Blueprint in right hand -->
    <g transform="translate(35, 10)">
      <rect x="-20" y="-15" width="40" height="30" rx="3" fill="url(#bpGrad)" opacity="0.9"/>
      <g stroke="#0a0a1a" stroke-width="0.8" fill="none" opacity="0.5">
        <line x1="-14" y1="-8" x2="14" y2="-8"/>
        <line x1="-14" y1="-2" x2="10" y2="-2"/>
        <line x1="-14" y1="4" x2="14" y2="4"/>
        <line x1="-14" y1="10" x2="8" y2="10"/>
      </g>
      <!-- Blueprint icon -->
      <rect x="-6" y="-10" width="12" height="8" rx="1" fill="none" stroke="#0a0a1a" stroke-width="0.8" opacity="0.4"/>
    </g>
    <!-- Legs -->
    <line x1="-8" y1="100" x2="-12" y2="130" stroke="#1e40af" stroke-width="4" stroke-linecap="round"/>
    <line x1="8" y1="100" x2="12" y2="130" stroke="#1e40af" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Agent 2 (center) — pointing at chart -->
  <g transform="translate(750, 160)">
    <!-- Body -->
    <rect x="-20" y="35" width="40" height="75" rx="8" fill="url(#agentGrad2)"/>
    <!-- Head -->
    <circle cx="0" cy="14" r="22" fill="#1a1a2e" stroke="#22c55e" stroke-width="2"/>
    <!-- Visor/eyes -->
    <rect x="-13" y="8" width="26" height="8" rx="4" fill="#22c55e" opacity="0.8"/>
    <!-- Antenna -->
    <line x1="0" y1="-8" x2="0" y2="-22" stroke="#22c55e" stroke-width="2"/>
    <circle cx="0" cy="-24" r="3" fill="#22c55e" filter="url(#glow)"/>
    <!-- Arms -->
    <line x1="-20" y1="50" x2="-40" y2="35" stroke="#22c55e" stroke-width="3" stroke-linecap="round"/>
    <line x1="20" y1="50" x2="45" y2="20" stroke="#22c55e" stroke-width="3" stroke-linecap="round"/>
    <!-- Pointing hand (toward chart) -->
    <polygon points="45,20 55,15 50,25" fill="#22c55e"/>
    <!-- Blueprint in left hand -->
    <g transform="translate(-40, 20)">
      <rect x="-18" y="-12" width="36" height="26" rx="3" fill="url(#bpGrad)" opacity="0.9"/>
      <g stroke="#0a0a1a" stroke-width="0.8" fill="none" opacity="0.5">
        <line x1="-12" y1="-6" x2="12" y2="-6"/>
        <line x1="-12" y1="0" x2="8" y2="0"/>
        <line x1="-12" y1="6" x2="12" y2="6"/>
      </g>
    </g>
    <!-- Legs -->
    <line x1="-8" y1="110" x2="-12" y2="145" stroke="#15803d" stroke-width="4" stroke-linecap="round"/>
    <line x1="8" y1="110" x2="12" y2="145" stroke="#15803d" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Agent 3 (right) — holding tablet -->
  <g transform="translate(860, 200)">
    <!-- Body -->
    <rect x="-16" y="28" width="32" height="65" rx="7" fill="#6366f1"/>
    <!-- Head -->
    <circle cx="0" cy="10" r="18" fill="#1a1a2e" stroke="#6366f1" stroke-width="2"/>
    <!-- Visor/eyes -->
    <rect x="-10" y="5" width="20" height="7" rx="3" fill="#6366f1" opacity="0.8"/>
    <!-- Antenna -->
    <line x1="0" y1="-8" x2="0" y2="-18" stroke="#6366f1" stroke-width="2"/>
    <circle cx="0" cy="-20" r="3" fill="#6366f1" filter="url(#glow)"/>
    <!-- Arms -->
    <line x1="-16" y1="40" x2="-30" y2="55" stroke="#6366f1" stroke-width="3" stroke-linecap="round"/>
    <line x1="16" y1="40" x2="30" y2="30" stroke="#6366f1" stroke-width="3" stroke-linecap="round"/>
    <!-- Tablet in right hand -->
    <g transform="translate(30, 18)">
      <rect x="-12" y="-16" width="24" height="32" rx="3" fill="#1e293b" stroke="#6366f1" stroke-width="1.5"/>
      <rect x="-8" y="-12" width="16" height="20" rx="1" fill="#0f172a"/>
      <!-- Mini chart on tablet -->
      <polyline points="-6,2 -2,-2 2,1 6,-4" stroke="#22c55e" stroke-width="1" fill="none"/>
    </g>
    <!-- Legs -->
    <line x1="-6" y1="93" x2="-10" y2="120" stroke="#4f46e5" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="6" y1="93" x2="10" y2="120" stroke="#4f46e5" stroke-width="3.5" stroke-linecap="round"/>
  </g>

  <!-- Connection lines between agents -->
  <g stroke="#3b82f6" stroke-width="1" opacity="0.2" stroke-dasharray="4,4">
    <line x1="685" y1="250" x2="730" y2="240"/>
    <line x1="785" y1="240" x2="830" y2="260"/>
  </g>

  <!-- Floating data nodes -->
  <g filter="url(#softGlow)" opacity="0.6">
    <circle cx="600" cy="150" r="6" fill="#3b82f6"/>
    <circle cx="920" cy="140" r="5" fill="#22c55e"/>
    <circle cx="580" cy="350" r="4" fill="#f59e0b"/>
    <circle cx="950" cy="380" r="5" fill="#6366f1"/>
  </g>

  <!-- === TEXT CONTENT === -->

  <!-- GenTech branding -->
  <text x="600" y="460" font-family="'Segoe UI', system-ui, sans-serif" font-size="48" font-weight="700" fill="#e2e8f0" text-anchor="middle" letter-spacing="3">
    Gen<tspan fill="url(#lineGrad)">Tech</tspan>
  </text>

  <!-- Main caption -->
  <text x="600" y="510" font-family="'Segoe UI', system-ui, sans-serif" font-size="28" fill="#94a3b8" text-anchor="middle" letter-spacing="6" font-weight="300">
    AGENT ECONOMY BUILDERS
  </text>

  <!-- Pillars -->
  <g font-family="system-ui" font-size="13" fill="#64748b" text-anchor="middle">
    <text x="600" y="555">
      <tspan fill="#3b82f6">🔐 Identity</tspan>
      <tspan dx="15" fill="#475569">·</tspan>
      <tspan dx="15" fill="#3b82f6">⚡ Payments</tspan>
      <tspan dx="15" fill="#475569">·</tspan>
      <tspan dx="15" fill="#3b82f6">📊 Credit</tspan>
      <tspan dx="15" fill="#475569">·</tspan>
      <tspan dx="15" fill="#3b82f6">🧠 Memory</tspan>
      <tspan dx="15" fill="#475569">·</tspan>
      <tspan dx="15" fill="#3b82f6">🎤 Voice</tspan>
    </text>
  </g>

  <!-- Bottom gradient bar -->
  <rect x="0" y="615" width="1200" height="15" fill="url(#lineGrad)" opacity="0.4"/>
</svg>
