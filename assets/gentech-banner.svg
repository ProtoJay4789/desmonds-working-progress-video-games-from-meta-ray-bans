<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500">
  <defs>
    <linearGradient id="bannerSky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a;stop-opacity:1"/>
      <stop offset="40%" style="stop-color:#1e1b4b;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#312e81;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="bannerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="seedGrad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1500" height="500" fill="url(#bannerSky)"/>

  <!-- Subtle grid pattern -->
  <g stroke="#3b82f6" stroke-width="0.3" opacity="0.08">
    <line x1="0" y1="0" x2="0" y2="500"/><line x1="100" y1="0" x2="100" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="500"/><line x1="300" y1="0" x2="300" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/><line x1="500" y1="0" x2="500" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/><line x1="700" y1="0" x2="700" y2="500"/>
    <line x1="800" y1="0" x2="800" y2="500"/><line x1="900" y1="0" x2="900" y2="500"/>
    <line x1="1000" y1="0" x2="1000" y2="500"/><line x1="1100" y1="0" x2="1100" y2="500"/>
    <line x1="1200" y1="0" x2="1200" y2="500"/><line x1="1300" y1="0" x2="1300" y2="500"/>
    <line x1="1400" y1="0" x2="1400" y2="500"/>
    <line x1="0" y1="50" x2="1500" y2="50"/><line x1="0" y1="100" x2="1500" y2="100"/>
    <line x1="0" y1="150" x2="1500" y2="150"/><line x1="0" y1="200" x2="1500" y2="200"/>
    <line x1="0" y1="250" x2="1500" y2="250"/><line x1="0" y1="300" x2="1500" y2="300"/>
    <line x1="0" y1="350" x2="1500" y2="350"/><line x1="0" y1="400" x2="1500" y2="400"/>
    <line x1="0" y1="450" x2="1500" y2="450"/>
  </g>

  <!-- Cityscape left -->
  <g fill="#0f172a" opacity="0.6">
    <rect x="0" y="280" width="40" height="220"/>
    <rect x="45" y="250" width="30" height="250"/>
    <rect x="80" y="220" width="50" height="280"/>
    <rect x="135" y="260" width="35" height="240"/>
    <rect x="175" y="200" width="55" height="300"/>
    <rect x="235" y="240" width="40" height="260"/>
  </g>

  <!-- Cityscape right -->
  <g fill="#0f172a" opacity="0.6">
    <rect x="1200" y="250" width="45" height="250"/>
    <rect x="1250" y="220" width="35" height="280"/>
    <rect x="1290" y="260" width="50" height="240"/>
    <rect x="1345" y="200" width="40" height="300"/>
    <rect x="1390" y="240" width="55" height="260"/>
    <rect x="1450" y="270" width="50" height="230"/>
  </g>

  <!-- Building windows (left) -->
  <g fill="#fbbf24" opacity="0.3">
    <rect x="88" y="230" width="5" height="5"/><rect x="100" y="230" width="5" height="5"/>
    <rect x="88" y="245" width="5" height="5"/><rect x="100" y="245" width="5" height="5"/>
    <rect x="185" y="210" width="6" height="6"/><rect x="200" y="210" width="6" height="6"/>
    <rect x="185" y="225" width="6" height="6"/><rect x="200" y="225" width="6" height="6"/>
    <rect x="185" y="240" width="6" height="6"/><rect x="200" y="240" width="6" height="6"/>
  </g>

  <!-- Building windows (right) -->
  <g fill="#fbbf24" opacity="0.3">
    <rect x="1298" y="270" width="5" height="5"/><rect x="1315" y="270" width="5" height="5"/>
    <rect x="1298" y="285" width="5" height="5"/><rect x="1315" y="285" width="5" height="5"/>
    <rect x="1355" y="210" width="6" height="6"/><rect x="1370" y="210" width="6" height="6"/>
    <rect x="1355" y="225" width="6" height="6"/><rect x="1370" y="225" width="6" height="6"/>
  </g>

  <!-- Neon accent lines -->
  <g stroke="#f472b6" stroke-width="1" opacity="0.2" filter="url(#softGlow)">
    <line x1="0" y1="420" x2="400" y2="380"/>
    <line x1="1100" y1="380" x2="1500" y2="420"/>
  </g>

  <!-- Horizontal neon divider -->
  <line x1="350" y1="350" x2="1150" y2="350" stroke="url(#bannerGrad)" stroke-width="1" opacity="0.3"/>

  <!-- SEED MARK (left side) -->
  <g transform="translate(180, 200)">
    <!-- Root system -->
    <g stroke="#3b82f6" stroke-width="1.5" fill="none" opacity="0.4">
      <line x1="0" y1="40" x2="0" y2="80"/>
      <line x1="0" y1="50" x2="-25" y2="75"/>
      <line x1="-25" y1="75" x2="-35" y2="90"/>
      <line x1="0" y1="60" x2="-15" y2="85"/>
      <line x1="0" y1="50" x2="25" y2="75"/>
      <line x1="25" y1="75" x2="35" y2="90"/>
      <line x1="0" y1="60" x2="15" y2="85"/>
      <line x1="-25" y1="75" x2="-30" y2="95"/>
      <line x1="25" y1="75" x2="30" y2="95"/>
    </g>
    <!-- Seed circle -->
    <circle cx="0" cy="0" r="35" fill="url(#seedGrad2)" opacity="0.85"/>
    <!-- Circuit pattern inside -->
    <g stroke="#0a0a1a" stroke-width="1.5" fill="none">
      <line x1="-12" y1="-8" x2="12" y2="-8"/>
      <line x1="-15" y1="0" x2="15" y2="0"/>
      <line x1="-12" y1="8" x2="12" y2="8"/>
      <line x1="0" y1="-15" x2="0" y2="15"/>
      <circle cx="-12" cy="-8" r="2.5" fill="#0a0a1a"/>
      <circle cx="12" cy="-8" r="2.5" fill="#0a0a1a"/>
      <circle cx="-15" cy="0" r="2.5" fill="#0a0a1a"/>
      <circle cx="15" cy="0" r="2.5" fill="#0a0a1a"/>
      <circle cx="-12" cy="8" r="2.5" fill="#0a0a1a"/>
      <circle cx="12" cy="8" r="2.5" fill="#0a0a1a"/>
    </g>
    <!-- Circuit branches up -->
    <g stroke="#22c55e" stroke-width="1" fill="none" opacity="0.5">
      <line x1="0" y1="-35" x2="0" y2="-55"/>
      <line x1="0" y1="-55" x2="-15" y2="-65"/>
      <line x1="0" y1="-55" x2="15" y2="-65"/>
      <line x1="0" y1="-45" x2="-20" y2="-55"/>
      <line x1="0" y1="-45" x2="20" y2="-55"/>
      <circle cx="0" cy="-55" r="2" fill="#22c55e"/>
      <circle cx="-15" cy="-65" r="1.5" fill="#22c55e"/>
      <circle cx="15" cy="-65" r="1.5" fill="#22c55e"/>
      <circle cx="-20" cy="-55" r="1.5" fill="#22c55e"/>
      <circle cx="20" cy="-55" r="1.5" fill="#22c55e"/>
    </g>
  </g>

  <!-- TEXT CONTENT (center-right) -->

  <!-- Main title -->
  <text x="300" y="210" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="#e2e8f0" letter-spacing="4">
    Gen<tspan fill="url(#bannerGrad)">Tech</tspan>
  </text>

  <!-- Tagline -->
  <text x="302" y="255" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="22" fill="#94a3b8" letter-spacing="3">
    TOUGH LOVE FOR THE AGENT ECONOMY
  </text>

  <!-- Pillars -->
  <g font-family="'Segoe UI', system-ui, sans-serif" font-size="14" fill="#64748b">
    <text x="302" y="300">
      <tspan fill="#3b82f6" font-weight="600">🔐 Identity</tspan>
      <tspan dx="20" fill="#475569">·</tspan>
      <tspan dx="20" fill="#3b82f6" font-weight="600">⚡ Payments</tspan>
      <tspan dx="20" fill="#475569">·</tspan>
      <tspan dx="20" fill="#3b82f6" font-weight="600">📊 Credit</tspan>
      <tspan dx="20" fill="#475569">·</tspan>
      <tspan dx="20" fill="#3b82f6" font-weight="600">🧠 Memory</tspan>
      <tspan dx="20" fill="#475569">·</tspan>
      <tspan dx="20" fill="#3b82f6" font-weight="600">🎤 Voice</tspan>
    </text>
  </g>

  <!-- Chain badges -->
  <g transform="translate(302, 325)">
    <rect x="0" y="0" width="80" height="24" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="40" y="16" font-family="system-ui" font-size="11" fill="#22c55e" text-anchor="middle" font-weight="600">Solana</text>

    <rect x="90" y="0" width="65" height="24" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="122" y="16" font-family="system-ui" font-size="11" fill="#3b82f6" text-anchor="middle" font-weight="600">Base</text>

    <rect x="165" y="0" width="95" height="24" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="212" y="16" font-family="system-ui" font-size="11" fill="#f97316" text-anchor="middle" font-weight="600">Avalanche</text>

    <rect x="270" y="0" width="90" height="24" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="315" y="16" font-family="system-ui" font-size="11" fill="#ef4444" text-anchor="middle" font-weight="600">Arbitrum</text>
  </g>

  <!-- Subtle bottom gradient bar -->
  <rect x="0" y="490" width="1500" height="10" fill="url(#bannerGrad)" opacity="0.4"/>
</svg>
