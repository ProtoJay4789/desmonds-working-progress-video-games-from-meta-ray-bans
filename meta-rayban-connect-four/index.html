<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connect Four — Meta Ray-Ban Display</title>
  <style>
    /* ============================================================
       CONNECT FOUR — Meta Ray-Ban Display Edition
       With AI Opponent + Single/Multiplayer Modes
       ============================================================ */
    :root {
      --bg: #0a0a1a;
      --board-bg: #1a1a3a;
      --cell-empty: #2a2a4a;
      --cell-p1: #e63946;
      --cell-p2: #f4a261;
      --cell-p1-glow: rgba(230, 57, 70, 0.6);
      --cell-p2-glow: rgba(244, 162, 97, 0.6);
      --text: #e8e8f0;
      --text-dim: #7a7a9a;
      --gold: #d4a017;
      --board-border: #3a3a5a;
      --win-glow: #00ff88;
      --ai-glow: #8b5cf6;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow-x: hidden;
      user-select: none;
    }

    /* ============================================================
       HUD CONTAINER
       ============================================================ */
    .hud-container {
      width: 100%;
      max-width: 420px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    /* ============================================================
       HEADER
       ============================================================ */
    .header { text-align: center; width: 100%; }

    .title {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .subtitle {
      font-size: 0.7rem;
      color: var(--text-dim);
      margin-top: 2px;
    }

    /* ============================================================
       MODE SELECTOR
       ============================================================ */
    .mode-selector {
      display: flex;
      gap: 6px;
      width: 100%;
      max-width: 340px;
      margin-bottom: 4px;
    }

    .mode-btn {
      flex: 1;
      padding: 8px 0;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: var(--text-dim);
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .mode-btn:hover {
      background: rgba(255,255,255,0.1);
      color: var(--text);
    }

    .mode-btn.active {
      background: rgba(212, 160, 23, 0.2);
      border-color: var(--gold);
      color: var(--gold);
    }

    .mode-btn .mode-icon { font-size: 1rem; display: block; margin-bottom: 2px; }

    /* ============================================================
       DIFFICULTY SELECTOR (AI mode only)
       ============================================================ */
    .difficulty-selector {
      display: none;
      gap: 4px;
      width: 100%;
      max-width: 340px;
      justify-content: center;
    }

    .difficulty-selector.visible { display: flex; }

    .diff-btn {
      padding: 5px 14px;
      background: rgba(139, 92, 246, 0.1);
      border: 1px solid rgba(139, 92, 246, 0.2);
      border-radius: 6px;
      color: var(--text-dim);
      font-size: 0.65rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .diff-btn:hover {
      background: rgba(139, 92, 246, 0.2);
      color: var(--text);
    }

    .diff-btn.active {
      background: rgba(139, 92, 246, 0.3);
      border-color: var(--ai-glow);
      color: var(--ai-glow);
    }

    /* ============================================================
       SCORE BAR
       ============================================================ */
    .score-bar {
      display: flex;
      justify-content: space-between;
      width: 100%;
      max-width: 340px;
      padding: 6px 12px;
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      font-size: 0.8rem;
    }

    .score-player {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .score-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .score-dot.p1 { background: var(--cell-p1); box-shadow: 0 0 6px var(--cell-p1-glow); }
    .score-dot.p2 { background: var(--cell-p2); box-shadow: 0 0 6px var(--cell-p2-glow); }
    .score-dot.p2.ai { background: var(--ai-glow); box-shadow: 0 0 6px rgba(139, 92, 246, 0.5); }

    .score-num { font-weight: 700; font-size: 1rem; }

    .turn-indicator {
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-dim);
      padding: 4px 0;
      min-height: 22px;
    }

    .turn-indicator .current-turn { font-weight: 700; }
    .turn-indicator .current-turn.p1 { color: var(--cell-p1); }
    .turn-indicator .current-turn.p2 { color: var(--cell-p2); }
    .turn-indicator .current-turn.ai { color: var(--ai-glow); }

    /* ============================================================
       GAME BOARD
       ============================================================ */
    .board-wrapper { position: relative; }

    .board {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      grid-template-rows: repeat(6, 1fr);
      gap: 5px;
      padding: 10px;
      background: var(--board-bg);
      border: 2px solid var(--board-border);
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
    }

    .cell {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--cell-empty);
      border: 2px solid rgba(255,255,255,0.05);
      cursor: pointer;
      transition: all 0.15s ease;
      position: relative;
    }

    .cell:hover { transform: scale(1.05); border-color: rgba(255,255,255,0.15); }

    .cell.p1 {
      background: var(--cell-p1);
      box-shadow: 0 0 10px var(--cell-p1-glow), inset 0 -2px 4px rgba(0,0,0,0.3);
      border-color: rgba(230, 57, 70, 0.4);
      animation: dropIn 0.3s ease-out;
    }

    .cell.p2 {
      background: var(--cell-p2);
      box-shadow: 0 0 10px var(--cell-p2-glow), inset 0 -2px 4px rgba(0,0,0,0.3);
      border-color: rgba(244, 162, 97, 0.4);
      animation: dropIn 0.3s ease-out;
    }

    .cell.p2.ai-piece {
      background: var(--ai-glow);
      box-shadow: 0 0 10px rgba(139, 92, 246, 0.6), inset 0 -2px 4px rgba(0,0,0,0.3);
      border-color: rgba(139, 92, 246, 0.4);
    }

    .cell.winning {
      animation: winPulse 0.6s ease-in-out infinite alternate;
      border-color: var(--win-glow);
    }

    .cell.p1.winning { box-shadow: 0 0 16px var(--cell-p1-glow), 0 0 24px var(--win-glow); }
    .cell.p2.winning { box-shadow: 0 0 16px var(--cell-p2-glow), 0 0 24px var(--win-glow); }

    @keyframes dropIn {
      0% { transform: translateY(-30px) scale(0.8); opacity: 0; }
      60% { transform: translateY(3px) scale(1.05); }
      100% { transform: translateY(0) scale(1); opacity: 1; }
    }

    @keyframes winPulse {
      from { transform: scale(1); }
      to { transform: scale(1.08); }
    }

    /* ============================================================
       CONTROLS
       ============================================================ */
    .controls {
      display: flex;
      gap: 10px;
      width: 100%;
      max-width: 340px;
      justify-content: center;
      margin-top: 4px;
    }

    .ctrl-btn {
      flex: 1;
      max-width: 100px;
      padding: 10px 0;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }

    .ctrl-btn:hover { background: rgba(255,255,255,0.15); border-color: var(--gold); }
    .ctrl-btn:active { transform: scale(0.95); }

    .ctrl-btn.drop {
      background: rgba(212, 160, 23, 0.2);
      border-color: var(--gold);
      color: var(--gold);
    }

    .ctrl-btn.drop:hover { background: rgba(212, 160, 23, 0.35); }

    .ctrl-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
      transform: none;
    }

    /* ============================================================
       STATUS / WIN
       ============================================================ */
    .status-bar {
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-dim);
      min-height: 20px;
    }

    .status-bar.win {
      color: var(--win-glow);
      font-weight: 700;
      font-size: 0.9rem;
      animation: winText 0.5s ease-in-out infinite alternate;
    }

    .status-bar.lose {
      color: var(--ai-glow);
      font-weight: 700;
      font-size: 0.9rem;
    }

    @keyframes winText {
      from { opacity: 0.7; }
      to { opacity: 1; }
    }

    .status-bar.draw { color: var(--gold); font-weight: 700; }

    .new-game-btn {
      display: none;
      padding: 8px 24px;
      background: var(--gold);
      color: var(--bg);
      border: none;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
    }

    .new-game-btn:hover { background: #e8b020; transform: scale(1.05); }
    .new-game-btn.visible { display: inline-block; }

    /* ============================================================
       AI THINKING INDICATOR
       ============================================================ */
    .ai-thinking {
      display: none;
      align-items: center;
      gap: 8px;
      font-size: 0.75rem;
      color: var(--ai-glow);
    }

    .ai-thinking.visible { display: flex; }

    .ai-dots {
      display: flex;
      gap: 4px;
    }

    .ai-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--ai-glow);
      animation: aiPulse 1.2s ease-in-out infinite;
    }

    .ai-dot:nth-child(2) { animation-delay: 0.2s; }
    .ai-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes aiPulse {
      0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1.2); }
    }

    /* ============================================================
       GESTURE HINTS
       ============================================================ */
    .gesture-hints {
      display: flex;
      gap: 16px;
      font-size: 0.65rem;
      color: var(--text-dim);
      margin-top: 4px;
      justify-content: center;
    }

    .gesture-hint { display: flex; align-items: center; gap: 4px; }
    .gesture-icon { font-size: 0.9rem; }

    /* ============================================================
       CONFETTI
       ============================================================ */
    .confetti-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 100;
      overflow: hidden;
    }

    .confetti {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 2px;
      animation: confettiFall 2s ease-in forwards;
    }

    @keyframes confettiFall {
      0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }

    /* ============================================================
       RESPONSIVE
       ============================================================ */
    @media (max-width: 380px) {
      .cell { width: 36px; height: 36px; }
      .board { gap: 4px; padding: 8px; }
      .title { font-size: 1.1rem; }
    }

    @media (max-width: 320px) {
      .cell { width: 30px; height: 30px; }
      .board { gap: 3px; padding: 6px; }
    }
  </style>
</head>
<body>

<div class="hud-container">
  <!-- Header -->
  <div class="header">
    <div class="title">⚡ Connect Four</div>
    <div class="subtitle">Meta Ray-Ban Display Edition</div>
  </div>

  <!-- Mode Selector -->
  <div class="mode-selector">
    <button class="mode-btn active" id="mode-ai" onclick="setMode('ai')">
      <span class="mode-icon">🤖</span>
      vs AI
    </button>
    <button class="mode-btn" id="mode-2p" onclick="setMode('2p')">
      <span class="mode-icon">👥</span>
      2 Players
    </button>
  </div>

  <!-- Difficulty Selector -->
  <div class="difficulty-selector visible" id="difficulty-selector">
    <button class="diff-btn active" data-level="easy" onclick="setDifficulty('easy')">Easy</button>
    <button class="diff-btn" data-level="medium" onclick="setDifficulty('medium')">Medium</button>
    <button class="diff-btn" data-level="hard" onclick="setDifficulty('hard')">Hard</button>
    <button class="diff-btn" data-level="unbeatable" onclick="setDifficulty('unbeatable')">🔥 Unbeatable</button>
  </div>

  <!-- Score Bar -->
  <div class="score-bar">
    <div class="score-player">
      <div class="score-dot p1"></div>
      <span id="p1-label">You</span>
      <span class="score-num" id="score-p1">0</span>
    </div>
    <div class="score-player">
      <span class="score-num" id="score-p2">0</span>
      <span id="p2-label">AI</span>
      <div class="score-dot p2 ai" id="p2-dot"></div>
    </div>
  </div>

  <!-- Turn Indicator -->
  <div class="turn-indicator" id="turn-indicator">
    <span class="current-turn p1">Your</span> turn
  </div>

  <!-- AI Thinking -->
  <div class="ai-thinking" id="ai-thinking">
    <div class="ai-dots">
      <div class="ai-dot"></div>
      <div class="ai-dot"></div>
      <div class="ai-dot"></div>
    </div>
    <span>AI is thinking...</span>
  </div>

  <!-- Game Board -->
  <div class="board-wrapper">
    <div class="board" id="board"></div>
  </div>

  <!-- Status -->
  <div class="status-bar" id="status"></div>

  <!-- New Game Button -->
  <button class="new-game-btn" id="new-game-btn" onclick="resetGame()">New Game</button>

  <!-- Controls -->
  <div class="controls" id="controls">
    <button class="ctrl-btn" onclick="moveLeft()">◀ Left</button>
    <button class="ctrl-btn drop" onclick="dropPiece()">▼ Drop</button>
    <button class="ctrl-btn" onclick="moveRight()">Right ▶</button>
  </div>

  <!-- Gesture Hints -->
  <div class="gesture-hints">
    <div class="gesture-hint">
      <span class="gesture-icon">👈</span>
      <span>Swipe: Move</span>
    </div>
    <div class="gesture-hint">
      <span class="gesture-icon">✊</span>
      <span>Pinch: Drop</span>
    </div>
    <div class="gesture-hint">
      <span class="gesture-icon">🎤</span>
      <span>Say: "Drop"</span>
    </div>
  </div>
</div>

<!-- Confetti Container -->
<div class="confetti-container" id="confetti-container"></div>

<script>
  /* ============================================================
     GAME STATE
     ============================================================ */
  const ROWS = 6;
  const COLS = 7;
  const EMPTY = 0;
  const P1 = 1; // Red (Human)
  const P2 = 2; // Gold (Human or AI)

  let board = [];
  let currentPlayer = P1;
  let selectedCol = 3;
  let gameOver = false;
  let scores = { [P1]: 0, [P2]: 0 };
  let gameMode = 'ai'; // 'ai' or '2p'
  let difficulty = 'medium'; // easy, medium, hard, unbeatable
  let aiThinking = false;

  /* ============================================================
     MODE & DIFFICULTY
     ============================================================ */
  function setMode(mode) {
    gameMode = mode;
    document.getElementById('mode-ai').classList.toggle('active', mode === 'ai');
    document.getElementById('mode-2p').classList.toggle('active', mode === '2p');
    document.getElementById('difficulty-selector').classList.toggle('visible', mode === 'ai');

    // Update labels
    if (mode === 'ai') {
      document.getElementById('p1-label').textContent = 'You';
      document.getElementById('p2-label').textContent = 'AI';
      document.getElementById('p2-dot').classList.add('ai');
    } else {
      document.getElementById('p1-label').textContent = 'Red';
      document.getElementById('p2-label').textContent = 'Gold';
      document.getElementById('p2-dot').classList.remove('ai');
    }

    resetGame();
  }

  function setDifficulty(level) {
    difficulty = level;
    document.querySelectorAll('.diff-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.level === level);
    });
  }

  /* ============================================================
     INIT
     ============================================================ */
  function initBoard() {
    board = Array.from({ length: ROWS }, () => Array(COLS).fill(EMPTY));
    currentPlayer = P1;
    selectedCol = 3;
    gameOver = false;
    aiThinking = false;
    renderBoard();
    updateStatus();
    updateTurnIndicator();
    document.getElementById('new-game-btn').classList.remove('visible');
    document.getElementById('ai-thinking').classList.remove('visible');
    document.getElementById('confetti-container').innerHTML = '';
    setControlsEnabled(true);
  }

  /* ============================================================
     RENDER
     ============================================================ */
  function renderBoard() {
    const boardEl = document.getElementById('board');
    boardEl.innerHTML = '';

    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.dataset.row = r;
        cell.dataset.col = c;

        if (board[r][c] === P1) cell.classList.add('p1');
        if (board[r][c] === P2) {
          cell.classList.add('p2');
          if (gameMode === 'ai') cell.classList.add('ai-piece');
        }

        cell.addEventListener('click', () => {
          if (!gameOver && !aiThinking) {
            selectedCol = c;
            dropPiece();
          }
        });

        boardEl.appendChild(cell);
      }
    }
  }

  function highlightColumn() {
    const cells = document.querySelectorAll('.cell');
    cells.forEach(cell => {
      const col = parseInt(cell.dataset.col);
      const row = parseInt(cell.dataset.row);
      if (col === selectedCol && !gameOver && board[row][col] === EMPTY) {
        cell.style.borderColor = 'rgba(212, 160, 23, 0.5)';
      } else if (board[row][col] === EMPTY) {
        cell.style.borderColor = 'rgba(255,255,255,0.05)';
      }
    });
  }

  /* ============================================================
     GAME LOGIC
     ============================================================ */
  function dropPiece() {
    if (gameOver || aiThinking) return;

    // In AI mode, only allow human to drop on their turn
    if (gameMode === 'ai' && currentPlayer === P2) return;

    const row = getAvailableRow(selectedCol);
    if (row === -1) return;

    board[row][selectedCol] = currentPlayer;
    renderBoard();
    highlightColumn();

    const winCells = checkWin(row, selectedCol);
    if (winCells) {
      handleWin(winCells);
      return;
    }

    if (checkDraw()) {
      handleDraw();
      return;
    }

    currentPlayer = currentPlayer === P1 ? P2 : P1;
    updateTurnIndicator();

    // Trigger AI move
    if (gameMode === 'ai' && currentPlayer === P2 && !gameOver) {
      triggerAIMove();
    }
  }

  function getAvailableRow(col) {
    for (let r = ROWS - 1; r >= 0; r--) {
      if (board[r][col] === EMPTY) return r;
    }
    return -1;
  }

  function moveLeft() {
    if (gameOver || aiThinking) return;
    selectedCol = (selectedCol - 1 + COLS) % COLS;
    highlightColumn();
  }

  function moveRight() {
    if (gameOver || aiThinking) return;
    selectedCol = (selectedCol + 1) % COLS;
    highlightColumn();
  }

  function setControlsEnabled(enabled) {
    document.querySelectorAll('.ctrl-btn').forEach(btn => {
      btn.disabled = !enabled;
    });
  }

  /* ============================================================
     WIN DETECTION
     ============================================================ */
  function checkWin(row, col) {
    const player = board[row][col];
    const directions = [
      [0, 1],   // Horizontal
      [1, 0],   // Vertical
      [1, 1],   // Diagonal down-right
      [1, -1]   // Diagonal down-left
    ];

    for (const [dr, dc] of directions) {
      let cells = [[row, col]];

      for (let i = 1; i < 4; i++) {
        const r = row + dr * i;
        const c = col + dc * i;
        if (r >= 0 && r < ROWS && c >= 0 && c < COLS && board[r][c] === player) {
          cells.push([r, c]);
        } else break;
      }

      for (let i = 1; i < 4; i++) {
        const r = row - dr * i;
        const c = col - dc * i;
        if (r >= 0 && r < ROWS && c >= 0 && c < COLS && board[r][c] === player) {
          cells.push([r, c]);
        } else break;
      }

      if (cells.length >= 4) return cells;
    }

    return null;
  }

  function checkDraw() {
    return board[0].every(cell => cell !== EMPTY);
  }

  /* ============================================================
     WIN / DRAW HANDLERS
     ============================================================ */
  function handleWin(winCells) {
    gameOver = true;
    scores[currentPlayer]++;
    updateScores();
    setControlsEnabled(false);

    const cells = document.querySelectorAll('.cell');
    winCells.forEach(([r, c]) => {
      const idx = r * COLS + c;
      cells[idx].classList.add('winning');
    });

    const statusEl = document.getElementById('status');

    if (gameMode === 'ai') {
      if (currentPlayer === P1) {
        statusEl.textContent = '🎉 You win!';
        statusEl.className = 'status-bar win';
        spawnConfetti();
      } else {
        statusEl.textContent = '🤖 AI wins!';
        statusEl.className = 'status-bar lose';
      }
    } else {
      const playerName = currentPlayer === P1 ? 'Red' : 'Gold';
      statusEl.textContent = `🎉 ${playerName} wins!`;
      statusEl.className = 'status-bar win';
      spawnConfetti();
    }

    document.getElementById('new-game-btn').classList.add('visible');
  }

  function handleDraw() {
    gameOver = true;
    const statusEl = document.getElementById('status');
    statusEl.textContent = "🤝 It's a draw!";
    statusEl.className = 'status-bar draw';
    document.getElementById('new-game-btn').classList.add('visible');
    setControlsEnabled(false);
  }

  /* ============================================================
     UI UPDATES
     ============================================================ */
  function updateTurnIndicator() {
    const el = document.getElementById('turn-indicator');

    if (gameMode === 'ai') {
      if (currentPlayer === P1) {
        el.innerHTML = '<span class="current-turn p1">Your</span> turn';
      } else {
        el.innerHTML = '<span class="current-turn ai">AI's</span> turn';
      }
    } else {
      const name = currentPlayer === P1 ? 'Red' : 'Gold';
      const cls = currentPlayer === P1 ? 'p1' : 'p2';
      el.innerHTML = `<span class="current-turn ${cls}">${name}'s</span> turn`;
    }
  }

  function updateScores() {
    document.getElementById('score-p1').textContent = scores[P1];
    document.getElementById('score-p2').textContent = scores[P2];
  }

  function updateStatus() {
    const statusEl = document.getElementById('status');
    statusEl.textContent = '';
    statusEl.className = 'status-bar';
  }

  function resetGame() {
    initBoard();
  }

  /* ============================================================
     AI OPPONENT
     ============================================================ */
  function triggerAIMove() {
    aiThinking = true;
    setControlsEnabled(false);
    document.getElementById('ai-thinking').classList.add('visible');

    // Small delay to feel natural
    const delay = difficulty === 'easy' ? 300 : difficulty === 'medium' ? 500 : 700;

    setTimeout(() => {
      const col = getAIMove();
      const row = getAvailableRow(col);

      if (row !== -1) {
        board[row][col] = P2;
        renderBoard();

        const winCells = checkWin(row, col);
        if (winCells) {
          handleWin(winCells);
        } else if (checkDraw()) {
          handleDraw();
        } else {
          currentPlayer = P1;
          updateTurnIndicator();
        }
      }

      aiThinking = false;
      setControlsEnabled(true);
      document.getElementById('ai-thinking').classList.remove('visible');
    }, delay);
  }

  function getAIMove() {
    switch (difficulty) {
      case 'easy': return getEasyMove();
      case 'medium': return getMediumMove();
      case 'hard': return getHardMove();
      case 'unbeatable': return getUnbeatableMove();
      default: return getMediumMove();
    }
  }

  /* --- EASY AI: Random with basic blocking --- */
  function getEasyMove() {
    // 30% chance to block, 70% random
    if (Math.random() < 0.3) {
      const block = findWinningMove(P1);
      if (block !== -1) return block;
    }

    const validCols = getValidColumns();
    return validCols[Math.floor(Math.random() * validCols.length)];
  }

  /* --- MEDIUM AI: Blocks wins, takes wins, prefers center --- */
  function getMediumMove() {
    // 1. Win if possible
    const winMove = findWinningMove(P2);
    if (winMove !== -1) return winMove;

    // 2. Block opponent win
    const blockMove = findWinningMove(P1);
    if (blockMove !== -1) return blockMove;

    // 3. Prefer center columns
    const centerPreferred = [3, 2, 4, 1, 5, 0, 6];
    for (const col of centerPreferred) {
      if (getAvailableRow(col) !== -1) return col;
    }

    return 3;
  }

  /* --- HARD AI: Minimax depth 4 --- */
  function getHardMove() {
    return minimaxMove(4);
  }

  /* --- UNBEATABLE AI: Minimax depth 6 with alpha-beta --- */
  function getUnbeatableMove() {
    return minimaxMove(6);
  }

  /* ============================================================
     AI HELPERS
     ============================================================ */
  function getValidColumns() {
    const cols = [];
    for (let c = 0; c < COLS; c++) {
      if (board[0][c] === EMPTY) cols.push(c);
    }
    return cols;
  }

  function findWinningMove(player) {
    for (let c = 0; c < COLS; c++) {
      const r = getAvailableRow(c);
      if (r === -1) continue;

      board[r][c] = player;
      const wins = checkWin(r, c);
      board[r][c] = EMPTY;

      if (wins) return c;
    }
    return -1;
  }

  /* ============================================================
     MINIMAX WITH ALPHA-BETA PRUNING
     ============================================================ */
  function minimaxMove(depth) {
    let bestScore = -Infinity;
    let bestCol = 3;
    const validCols = getValidColumns();

    // Shuffle for variety
    validCols.sort(() => Math.random() - 0.5);

    for (const col of validCols) {
      const row = getAvailableRow(col);
      if (row === -1) continue;

      board[row][col] = P2;
      const score = minimax(board, depth - 1, -Infinity, Infinity, false);
      board[row][col] = EMPTY;

      if (score > bestScore) {
        bestScore = score;
        bestCol = col;
      }
    }

    return bestCol;
  }

  function minimax(boardState, depth, alpha, beta, isMaximizing) {
    // Terminal checks
    if (depth === 0) return evaluateBoard();

    const validCols = getValidColumns();
    if (validCols.length === 0) return evaluateBoard();

    if (isMaximizing) {
      let maxScore = -Infinity;
      for (const col of validCols) {
        const row = getAvailableRow(col);
        if (row === -1) continue;

        board[row][col] = P2;

        // Check if this move wins
        if (checkWin(row, col)) {
          board[row][col] = EMPTY;
          return 100000 + depth; // Prefer faster wins
        }

        const score = minimax(board, depth - 1, alpha, beta, false);
        board[row][col] = EMPTY;

        maxScore = Math.max(maxScore, score);
        alpha = Math.max(alpha, score);
        if (beta <= alpha) break;
      }
      return maxScore;
    } else {
      let minScore = Infinity;
      for (const col of validCols) {
        const row = getAvailableRow(col);
        if (row === -1) continue;

        board[row][col] = P1;

        // Check if this move wins for opponent
        if (checkWin(row, col)) {
          board[row][col] = EMPTY;
          return -100000 - depth; // Prefer faster wins
        }

        const score = minimax(board, depth - 1, alpha, beta, true);
        board[row][col] = EMPTY;

        minScore = Math.min(minScore, score);
        beta = Math.min(beta, score);
        if (beta <= alpha) break;
      }
      return minScore;
    }
  }

  /* ============================================================
     BOARD EVALUATION FUNCTION
     ============================================================ */
  function evaluateBoard() {
    let score = 0;

    // Center column preference
    for (let r = 0; r < ROWS; r++) {
      if (board[r][3] === P2) score += 3;
      if (board[r][3] === P1) score -= 3;
    }

    // Evaluate all windows of 4
    // Horizontal
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c <= COLS - 4; c++) {
        score += evaluateWindow([board[r][c], board[r][c+1], board[r][c+2], board[r][c+3]]);
      }
    }

    // Vertical
    for (let c = 0; c < COLS; c++) {
      for (let r = 0; r <= ROWS - 4; r++) {
        score += evaluateWindow([board[r][c], board[r+1][c], board[r+2][c], board[r+3][c]]);
      }
    }

    // Diagonal (down-right)
    for (let r = 0; r <= ROWS - 4; r++) {
      for (let c = 0; c <= COLS - 4; c++) {
        score += evaluateWindow([board[r][c], board[r+1][c+1], board[r+2][c+2], board[r+3][c+3]]);
      }
    }

    // Diagonal (down-left)
    for (let r = 0; r <= ROWS - 4; r++) {
      for (let c = 3; c < COLS; c++) {
        score += evaluateWindow([board[r][c], board[r+1][c-1], board[r+2][c-2], board[r+3][c-3]]);
      }
    }

    return score;
  }

  function evaluateWindow(window) {
    const ai = window.filter(x => x === P2).length;
    const human = window.filter(x => x === P1).length;
    const empty = window.filter(x => x === EMPTY).length;

    if (ai === 4) return 100;
    if (ai === 3 && empty === 1) return 5;
    if (ai === 2 && empty === 2) return 2;

    if (human === 3 && empty === 1) return -4;

    return 0;
  }

  /* ============================================================
     CONFETTI EFFECT
     ============================================================ */
  function spawnConfetti() {
    const container = document.getElementById('confetti-container');
    const colors = ['#e63946', '#f4a261', '#d4a017', '#00ff88', '#4ecdc4', '#ff6b6b'];

    for (let i = 0; i < 40; i++) {
      const confetti = document.createElement('div');
      confetti.className = 'confetti';
      confetti.style.left = Math.random() * 100 + '%';
      confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
      confetti.style.animationDelay = Math.random() * 0.5 + 's';
      confetti.style.animationDuration = (1.5 + Math.random()) + 's';
      container.appendChild(confetti);
    }

    setTimeout(() => container.innerHTML = '', 3000);
  }

  /* ============================================================
     KEYBOARD CONTROLS
     ============================================================ */
  document.addEventListener('keydown', (e) => {
    switch (e.key) {
      case 'ArrowLeft':
        e.preventDefault();
        moveLeft();
        break;
      case 'ArrowRight':
        e.preventDefault();
        moveRight();
        break;
      case ' ':
      case 'Enter':
        e.preventDefault();
        dropPiece();
        break;
      case '1': setMode('ai'); break;
      case '2': setMode('2p'); break;
    }
  });

  /* ============================================================
     TOUCH / SWIPE CONTROLS
     ============================================================ */
  let touchStartX = null;

  document.addEventListener('touchstart', (e) => {
    touchStartX = e.touches[0].clientX;
  });

  document.addEventListener('touchend', (e) => {
    if (touchStartX === null) return;
    const touchEndX = e.changedTouches[0].clientX;
    const diff = touchEndX - touchStartX;

    if (Math.abs(diff) > 30) {
      if (diff > 0) moveRight();
      else moveLeft();
    } else {
      dropPiece();
    }

    touchStartX = null;
  });

  /* ============================================================
     VOICE COMMANDS
     ============================================================ */
  if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    recognition.continuous = true;
    recognition.interimResults = false;

    recognition.onresult = (event) => {
      const last = event.results[event.results.length - 1];
      const text = last[0].transcript.toLowerCase().trim();

      if (text.includes('drop') || text.includes('go') || text.includes('place')) {
        dropPiece();
      } else if (text.includes('left')) {
        moveLeft();
      } else if (text.includes('right')) {
        moveRight();
      } else if (text.includes('reset') || text.includes('new game')) {
        resetGame();
      } else if (text.includes('single') || text.includes('one player')) {
        setMode('ai');
      } else if (text.includes('two player') || text.includes('multiplayer')) {
        setMode('2p');
      }
    };

    recognition.onerror = () => {};
    // Uncomment to enable: recognition.start();
  }

  /* ============================================================
     BOOT
     ============================================================ */
  initBoard();
</script>
