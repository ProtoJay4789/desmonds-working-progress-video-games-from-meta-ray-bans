<!--
  Template: Embedded JSON pattern for static dashboards
  Usage: Copy into HTML, replace {{JSON_DATA}} with actual JSON (minify or indent).
-->
<div class="dashboard-grid">
  <div class="column" id="col-now">
    <h3>★ NOW</h3>
    <div class="items" id="items-now"></div>
  </div>
  <div class="column" id="col-wip">
    <h3>◐ WIP</h3>
    <div class="items" id="items-wip"></div>
  </div>
  <div class="column" id="col-tba">
    <h3>○ TBA</h3>
    <div class="items" id="items-tba"></div>
  </div>
</div>

<script id="data-source" type="application/json">
{{JSON_DATA}}
</script>

<script>
  const items = JSON.parse(document.getElementById('data-source').textContent);
  const categories = {
    now: items.filter(i => i.status === 'live' || (i.status === 'building' && i.deadline)),
    wip: items.filter(i => i.status === 'building' && !i.deadline || i.status === 'research'),
    tba: [] // extend as needed
  };
  const render = (cid, list) => {
    const el = document.getElementById('items-' + cid);
    el.innerHTML = list.map(i => `
      <div class="item">
        <strong>${i.title}</strong>
        <div class="meta">${i.tech.join(' · ')} ${i.deadline ? '· DL: '+i.deadline : ''}</div>
        <p>${i.description}</p>
      </div>
    `).join('');
  };
  Object.keys(categories).forEach(k => render(k, categories[k]));
</script>

<style>
  .dashboard-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
  @media (max-width: 900px) { .dashboard-grid { grid-template-columns: 1fr; } }
  .column { background: #111; border: 1px solid #333; border-radius: 8px; padding: 1rem; }
  .item { margin-bottom: 0.75rem; }
  .item strong { color: #fbbf24; }
  .meta { font-size: 0.8em; color: #888; font-family: monospace; }
</style>
