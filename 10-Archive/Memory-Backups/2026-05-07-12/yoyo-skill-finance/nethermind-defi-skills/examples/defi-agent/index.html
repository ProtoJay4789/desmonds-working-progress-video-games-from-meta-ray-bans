<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="DeFi Agent — natural language to DeFi transactions">
<meta name="theme-color" content="#0f1117">
<title>DeFi Agent — DefiSkills</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='16' fill='%2338bdf8'/><text y='72' x='14' font-size='60' font-family='system-ui' font-weight='700' fill='%230f1117'>aw</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════════
   DESIGN TOKENS
   ═══════════════════════════════════════════════════════════════ */
:root {
  --bg-0: #0f1117;
  --bg-1: #161922;
  --bg-2: #1e2230;
  --bg-3: #272c3d;
  --border-0: #2a2f40;
  --border-1: #363d52;

  --text-0: #f1f3f8;
  --text-1: #b8bfd0;
  --text-2: #8891a6;

  --accent: #38bdf8;
  --accent-dim: rgba(56, 189, 248, 0.1);
  --accent-mid: rgba(56, 189, 248, 0.18);

  --ok: #34d399;
  --ok-dim: rgba(52, 211, 153, 0.1);
  --ok-mid: rgba(52, 211, 153, 0.15);

  --warn: #fbbf24;
  --warn-dim: rgba(251, 191, 36, 0.1);

  --err: #f87171;
  --err-dim: rgba(248, 113, 113, 0.1);

  --purple: #a78bfa;
  --purple-dim: rgba(167, 139, 250, 0.1);

  --sans: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --mono: 'DM Mono', 'SF Mono', Consolas, monospace;
  --radius: 10px;
  --radius-sm: 6px;
}

/* ═══════════════════════════════════════════════════════════════
   RESET & BASE
   ═══════════════════════════════════════════════════════════════ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { height: 100%; }
body {
  font-family: var(--sans);
  font-size: 14px;
  line-height: 1.55;
  color: var(--text-1);
  background: var(--bg-0);
  height: 100%;
  display: flex;
  flex-direction: column;
  -webkit-font-smoothing: antialiased;
}
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

/* Focus ring — visible on keyboard only */
:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
  border-radius: 4px;
}
:focus:not(:focus-visible) { outline: none; }

/* Custom scrollbar */
.scr::-webkit-scrollbar { width: 5px; }
.scr::-webkit-scrollbar-track { background: transparent; }
.scr::-webkit-scrollbar-thumb { background: var(--border-0); border-radius: 3px; }
.scr::-webkit-scrollbar-thumb:hover { background: var(--border-1); }

/* Reduced motion */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}

/* ═══════════════════════════════════════════════════════════════
   ANIMATIONS
   ═══════════════════════════════════════════════════════════════ */
@keyframes enter { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulse { 0%, 100% { opacity: .35; } 50% { opacity: 1; } }

.anim-enter { animation: enter .25s cubic-bezier(.16,1,.3,1) both; }
.anim-pulse { animation: pulse 1.6s ease-in-out infinite; }

/* ═══════════════════════════════════════════════════════════════
   LAYOUT
   ═══════════════════════════════════════════════════════════════ */
.header {
  background: var(--bg-1);
  border-bottom: 1px solid var(--border-0);
  position: sticky; top: 0; z-index: 40;
}
.header-inner {
  max-width: 720px; margin: 0 auto;
  padding: 0 20px; height: 56px;
  display: flex; align-items: center; justify-content: space-between;
}
.logo { display: flex; align-items: center; gap: 10px; }
.logo-mark {
  width: 28px; height: 28px; border-radius: 7px;
  background: var(--accent);
  display: grid; place-items: center;
  font-family: var(--mono); font-size: 11px; font-weight: 700;
  color: var(--bg-0); letter-spacing: -0.5px;
}
.logo-text { font-weight: 600; font-size: 15px; color: var(--text-0); }
.logo-badge {
  font-family: var(--mono); font-size: 11px; color: var(--text-2);
  background: var(--bg-2); border: 1px solid var(--border-0);
  padding: 2px 8px; border-radius: 20px; margin-left: 4px;
}

/* Portfolio strip */
.portfolio {
  background: var(--bg-1); border-bottom: 1px solid var(--border-0);
  overflow-x: auto; display: none;
}
.portfolio.show { display: block; }
.portfolio-inner {
  max-width: 720px; margin: 0 auto; padding: 10px 20px;
  display: flex; align-items: center; gap: 8px;
}
.portfolio-label {
  font-family: var(--mono); font-size: 11px; font-weight: 500;
  color: var(--text-2); text-transform: uppercase; letter-spacing: .5px;
  white-space: nowrap;
}
.bal-chip {
  display: flex; align-items: baseline; gap: 5px;
  background: var(--bg-0); border: 1px solid var(--border-0);
  padding: 4px 10px; border-radius: 20px; white-space: nowrap;
}
.bal-val { font-size: 13px; font-weight: 600; color: var(--text-0); font-variant-numeric: tabular-nums; }
.bal-sym { font-family: var(--mono); font-size: 11px; color: var(--text-2); }

/* Chat area */
.chat-wrap { flex: 1; overflow-y: auto; }
.chat {
  max-width: 720px; margin: 0 auto; padding: 24px 20px 16px;
  min-height: 100%; display: flex; flex-direction: column; justify-content: flex-end;
  gap: 16px;
}

/* Input bar */
.input-bar {
  background: var(--bg-1); border-top: 1px solid var(--border-0);
  padding: 12px 20px; flex-shrink: 0;
}
.input-inner {
  max-width: 720px; margin: 0 auto;
  display: flex; gap: 8px;
}
.input-field {
  flex: 1; background: var(--bg-0); border: 1px solid var(--border-0);
  border-radius: var(--radius); padding: 12px 16px;
  font-family: var(--sans); font-size: 14px; color: var(--text-0);
  transition: border-color .15s;
}
.input-field::placeholder { color: var(--text-2); }
.input-field:focus { border-color: var(--accent); outline: none; }
.input-field:disabled { opacity: .4; cursor: not-allowed; }
.input-field:disabled::placeholder { color: var(--text-2); }

/* Activity log */
.log-bar {
  background: var(--bg-1); border-top: 1px solid var(--border-0);
  flex-shrink: 0;
}
.log-toggle {
  width: 100%; padding: 8px 20px; border: none; background: none;
  display: flex; align-items: center; gap: 6px; cursor: pointer;
  font-family: var(--mono); font-size: 11px; color: var(--text-2);
  text-transform: uppercase; letter-spacing: .5px;
}
.log-toggle:hover { color: var(--text-1); }
.log-arrow { transition: transform .2s; font-size: 8px; }
.log-count { color: var(--accent); margin-left: 2px; }
.log-panel {
  display: none; max-height: 200px; overflow-y: auto;
  padding: 0 20px 10px;
}
.log-panel.open { display: block; }
.log-entry { font-family: var(--mono); font-size: 11px; line-height: 1.7; }

/* ═══════════════════════════════════════════════════════════════
   BUTTONS
   ═══════════════════════════════════════════════════════════════ */
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 6px; min-height: 44px; padding: 0 20px;
  font-family: var(--sans); font-size: 13px; font-weight: 600;
  border: 1px solid transparent; border-radius: var(--radius);
  cursor: pointer; transition: all .15s; white-space: nowrap;
}
.btn:disabled { opacity: .35; cursor: not-allowed; }

.btn-accent {
  background: var(--accent-dim); color: var(--accent);
  border-color: rgba(56,189,248,.2);
}
.btn-accent:hover:not(:disabled) { background: var(--accent-mid); }

.btn-ok {
  background: var(--ok-dim); color: var(--ok);
  border-color: rgba(52,211,153,.2);
}
.btn-ok:hover:not(:disabled) { background: var(--ok-mid); }

.btn-ghost {
  background: var(--bg-2); color: var(--text-1);
  border-color: var(--border-0);
}
.btn-ghost:hover:not(:disabled) { background: var(--bg-3); border-color: var(--border-1); }

.btn-sm { min-height: 36px; padding: 0 14px; font-size: 12px; }

/* ═══════════════════════════════════════════════════════════════
   MESSAGES
   ═══════════════════════════════════════════════════════════════ */
.msg { display: flex; }
.msg-user { justify-content: flex-end; }
.msg-agent { justify-content: flex-start; }

.bubble {
  max-width: min(520px, 85%); border-radius: var(--radius);
  padding: 12px 16px; font-size: 14px; line-height: 1.6;
}
.bubble-user {
  background: var(--accent-dim); border: 1px solid rgba(56,189,248,.15);
  color: var(--text-0);
}
.bubble-agent {
  background: var(--bg-1); border: 1px solid var(--border-0);
  color: var(--text-1);
}
.bubble-agent strong { color: var(--text-0); }
.bubble-agent em { font-style: italic; }
.bubble-agent code {
  font-family: var(--mono); font-size: 12px;
  background: var(--bg-0); border: 1px solid var(--border-0);
  padding: 1px 5px; border-radius: 4px;
}
.bubble-agent ul { margin: 6px 0 6px 16px; padding: 0; list-style: disc; }
.bubble-agent li { margin: 2px 0; font-size: 13px; }

/* Status indicator */
.status-line {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--mono); font-size: 12px; padding: 2px 0;
}
.status-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent); flex-shrink: 0;
}

/* ═══════════════════════════════════════════════════════════════
   STEP CARDS
   ═══════════════════════════════════════════════════════════════ */
.step-card {
  border: 1px solid var(--border-0); border-radius: var(--radius);
  overflow: hidden; margin-bottom: 8px;
}
.step-header {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px; background: var(--bg-2);
  border-bottom: 1px solid var(--border-0);
}
.step-num {
  font-family: var(--mono); font-size: 10px; font-weight: 700;
  background: var(--accent-dim); color: var(--accent);
  padding: 2px 7px; border-radius: 4px; letter-spacing: .3px;
}
.step-action { font-size: 13px; font-weight: 600; color: var(--text-0); }
.step-body { padding: 10px 12px; }
.step-desc { font-size: 13px; color: var(--text-1); margin-bottom: 6px; }
.step-args { display: flex; flex-wrap: wrap; gap: 4px; }
.arg-chip {
  font-family: var(--mono); font-size: 11px;
  background: var(--bg-0); border: 1px solid var(--border-0);
  padding: 2px 8px; border-radius: 4px;
}
.arg-key { color: var(--text-2); }
.arg-val { color: var(--warn); }

/* Dependency badge */
.dep-badge {
  font-family: var(--mono); font-size: 10px;
  background: var(--purple-dim); color: var(--purple);
  padding: 2px 7px; border-radius: 4px; letter-spacing: .3px;
  margin-left: auto;
}

/* Goal execution states */
.goal-status {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--text-2);
  margin-top: 8px; min-height: 18px;
}
.goal-status:empty { display: none; }
.goal-status .tx-link {
  font-family: var(--mono); font-size: 11px;
  color: var(--accent); text-decoration: none;
}
.goal-status .tx-link:hover { text-decoration: underline; }

.step-card.goal-building { border-color: var(--accent); }
.step-card.goal-observing { border-color: var(--purple); }
.step-card.goal-signing { border-color: var(--warn); }
.step-card.goal-confirmed { border-color: var(--ok); background: var(--ok-dim); }
.step-card.goal-failed { border-color: var(--err); background: var(--err-dim); }

/* Transaction summary */
.tx-summary {
  display: flex; align-items: center; gap: 12px;
  padding-top: 10px; margin-top: 10px;
  border-top: 1px solid var(--border-0);
  font-family: var(--mono); font-size: 12px;
}

/* ═══════════════════════════════════════════════════════════════
   TX CARDS
   ═══════════════════════════════════════════════════════════════ */
.tx-card {
  border: 1px solid var(--border-0); border-radius: var(--radius-sm);
  padding: 10px 12px; margin-bottom: 6px;
  display: flex; align-items: center; gap: 8px;
  transition: border-color .2s, background .2s;
}
.tx-card[data-status="pending"] { border-color: var(--border-0); }
.tx-card[data-status="signing"] { border-color: var(--accent); background: var(--accent-dim); }
.tx-card[data-status="confirmed"] { border-color: var(--ok); background: var(--ok-dim); }
.tx-card[data-status="failed"] { border-color: var(--err); background: var(--err-dim); }

.tx-icon { width: 18px; height: 18px; flex-shrink: 0; display: grid; place-items: center; font-size: 12px; }
.tx-label { font-family: var(--mono); font-size: 12px; font-weight: 500; color: var(--text-0); flex: 1; }
.tx-status { font-family: var(--mono); font-size: 11px; color: var(--text-2); }
.tx-link {
  font-family: var(--mono); font-size: 11px; color: var(--accent);
  margin-top: 4px; display: block;
}

/* ═══════════════════════════════════════════════════════════════
   WELCOME / ONBOARDING
   ═══════════════════════════════════════════════════════════════ */
.welcome {
  background: var(--bg-1); border: 1px solid var(--border-0);
  border-radius: var(--radius); padding: 20px;
  max-width: min(520px, 85%);
}
.welcome h2 { font-size: 16px; font-weight: 700; color: var(--text-0); margin-bottom: 6px; }
.welcome p { font-size: 13px; color: var(--text-1); margin-bottom: 12px; }
.prompt-chips { display: flex; flex-wrap: wrap; gap: 6px; }
.prompt-chip {
  font-size: 12px; color: var(--text-1); background: var(--bg-2);
  border: 1px solid var(--border-0); padding: 6px 12px;
  border-radius: 20px; cursor: pointer; transition: all .15s;
}
.prompt-chip:hover { color: var(--text-0); border-color: var(--accent); background: var(--accent-dim); }

/* ═══════════════════════════════════════════════════════════════
   RESPONSIVE
   ═══════════════════════════════════════════════════════════════ */
@media (max-width: 640px) {
  .header-inner { padding: 0 12px; }
  .logo-badge { display: none; }
  .chat { padding: 16px 12px 12px; }
  .input-bar { padding: 10px 12px; }
  .bubble { max-width: 92%; }
  .portfolio-inner { padding: 8px 12px; }
}
</style>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.4/dist/purify.min.js"></script>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<header class="header">
  <div class="header-inner">
    <div class="logo">
      <div class="logo-mark">aw</div>
      <span class="logo-text">DefiSkills</span>

    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <select id="chain-select" class="btn btn-ghost btn-sm" style="font-family:var(--mono);font-size:12px;background:var(--bg-2);color:var(--text-1);border:1px solid var(--border-0);border-radius:var(--radius-sm);padding:4px 8px;cursor:pointer;" onchange="handleChainSwitch(this.value)">

<!-- ═══ PORTFOLIO ═══ -->
<div id="portfolio" class="portfolio scr" role="region" aria-label="Portfolio balances">

<div id="chat-scroll" class="chat-wrap scr" role="log" aria-live="polite" aria-label="Conversation">

    <!-- Welcome -->
    <div class="msg msg-agent anim-enter">
      <div class="welcome">
        <h2>What would you like to do?</h2>

        <div class="prompt-chips" id="prompt-chips">
          <button class="prompt-chip" onclick="fillPrompt(this)">What protocols do you support?</button>
          <button class="prompt-chip" onclick="fillPrompt(this)">Swap 500 USDC for WETH</button>
          <button class="prompt-chip" onclick="fillPrompt(this)">Supply 1000 DAI to Aave</button>
        </div>
      </div>

  </div>
</div>

<!-- ═══ INPUT ═══ -->
<div class="input-bar">
  <form id="input-form" onsubmit="handleSend(event)" class="input-inner">

      placeholder="Connect wallet to start..."
      autocomplete="off" disabled

      Send

</div>

<!-- ═══ ACTIVITY LOG ═══ -->
<div class="log-bar">
  <button class="log-toggle" onclick="toggleLog()" aria-expanded="false" aria-controls="log-panel">

    Activity Log
    <span class="log-count" id="log-count">0</span>
  </button>
  <div id="log-panel" class="log-panel scr" role="log">
    <div id="log-entries"></div>
  </div>
</div>

<!-- ═══ SCRIPTS ═══ -->
<script src="agent.js?v=3"></script>
<script>
// ── State ──
const $ = id => document.getElementById(id);
const agent = new DeFiAgent('');
let isProcessing = false;
const chatEl = $('chat');
const chatScroll = $('chat-scroll');
const CHAIN_NAMES = { 1: 'mainnet', 42161: 'arbitrum', 8453: 'base', 10: 'optimism', 137: 'polygon', 11155111: 'sepolia' };
const SUPPORTED_CHAINS = { 1: 'Mainnet', 42161: 'Arbitrum', 8453: 'Base', 10: 'Optimism', 137: 'Polygon', 11155111: 'Sepolia' };

// ── Helpers ──
function scrollDown() { requestAnimationFrame(() => { chatScroll.scrollTop = chatScroll.scrollHeight; }); }

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function renderMd(text) {
  let h = esc(text);
  h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  h = h.replace(/\*(.+?)\*/g, '<em>$1</em>');
  h = h.replace(/`([^`]+)`/g, '<code>$1</code>');
  h = h.replace(/^[ ]*[-] (.+)$/gm, '<li>$1</li>');
  h = h.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');
  h = h.replace(/\n\n+/g, '<br><br>');
  h = h.replace(/\n/g, '<br>');
  return DOMPurify.sanitize(h);
}


function addMsg(content, type) {
  const row = document.createElement('div');
  row.className = 'msg msg-' + type + ' anim-enter';
  const bubble = document.createElement('div');
  bubble.className = 'bubble bubble-' + type;
  if (type === 'user') {
    bubble.textContent = content;
  } else {
    bubble.innerHTML = DOMPurify.sanitize(content);
  }
  row.appendChild(bubble);
  chatEl.appendChild(row);
  scrollDown();
  return bubble;
}

function addStatus(text) {
  const row = document.createElement('div');
  row.className = 'status-line anim-enter';
  const dot = document.createElement('span');
  dot.className = 'status-dot anim-pulse';
  const label = document.createElement('span');
  label.style.color = 'var(--text-2)';
  label.textContent = text;
  row.appendChild(dot);
  row.appendChild(label);
  chatEl.appendChild(row);
  scrollDown();
  return row;
}

function removeEl(el) { if (el && el.parentNode) el.parentNode.removeChild(el); }

function addToolLog(log) {
  const entries = $('log-entries');
  const count = $('log-count');
  for (const entry of log) {
    const div = document.createElement('div');
    div.className = 'log-entry';
    const icon = entry.status === 'ok' ? '\u2713' : '\u2717';
    const color = entry.status === 'ok' ? 'var(--ok)' : 'var(--err)';
    const span1 = document.createElement('span');
    span1.style.color = color;
    span1.textContent = icon + ' ';
    const strong = document.createElement('strong');
    strong.textContent = entry.tool;
    const span2 = document.createTextNode(' ' + (entry.summary || ''));
    div.appendChild(span1);
    div.appendChild(strong);
    div.appendChild(span2);
    entries.appendChild(div);
  }
  count.textContent = entries.children.length;
}

function updatePortfolioUI() {
  const cards = $('balance-cards');
  if (!cards) return;
  cards.textContent = '';
  for (const [token, amount] of Object.entries(agent.balances)) {
    const chip = document.createElement('div');
    chip.className = 'bal-chip';
    const valSpan = document.createElement('span');
    valSpan.className = 'bal-val';
    valSpan.textContent = amount;
    const symSpan = document.createElement('span');
    symSpan.className = 'bal-sym';
    symSpan.textContent = token;
    chip.appendChild(valSpan);
    chip.appendChild(symSpan);
    cards.appendChild(chip);
  }
}

// ── Transaction Cards ──

function renderTxCards(transactions) {
  const container = document.createElement('div');
  container.style.margin = '8px 0';
  transactions.forEach(function(tx, i) {
    const card = document.createElement('div');
    card.className = 'tx-card';
    card.dataset.status = 'pending';
    const icon = document.createElement('span');
    icon.className = 'tx-icon';
    icon.textContent = tx.type === 'approval' ? '\uD83D\uDD13' : '\u26A1';
    const label = document.createElement('span');
    label.className = 'tx-label';
    label.textContent = tx.label || tx.action || tx.type;
    const status = document.createElement('span');
    status.className = 'tx-status';
    status.textContent = 'pending';
    card.appendChild(icon);
    card.appendChild(label);
    card.appendChild(status);
    container.appendChild(card);
  });
  return container;
}

function updateTxCard(container, index, status, detail) {
  const card = container.children[index];
  if (!card) return;
  card.dataset.status = status;
  const statusEl = card.querySelector('.tx-status');
  if (status === 'signing') { statusEl.textContent = 'signing...'; }
  else if (status === 'confirmed') {
    statusEl.textContent = '';
    const link = document.createElement('a');
    link.className = 'tx-link';
    link.href = getExplorerUrl(detail);
    link.target = '_blank';
    link.rel = 'noopener';
    link.textContent = detail.slice(0, 10) + '...';
    statusEl.appendChild(link);
  }
  else if (status === 'rejected') { statusEl.textContent = 'rejected'; }
  else if (status === 'failed') { statusEl.textContent = 'failed'; }
}

function getExplorerUrl(txHash) {
  const explorers = {
    1: 'https://etherscan.io',
    42161: 'https://arbiscan.io',
    8453: 'https://basescan.org',
    10: 'https://optimistic.etherscan.io',
    137: 'https://polygonscan.com',
    11155111: 'https://sepolia.etherscan.io',
  };
  const base = explorers[agent.chainId] || 'https://etherscan.io';
  return base + '/tx/' + txHash;
}

// ── Sign Flow ──

async function handleSign(transactions, txContainer) {
  const results = await agent.signAll(transactions, function(i, status, detail) {
    updateTxCard(txContainer, i, status, detail);
  });

  const allOk = results.every(function(r) { return r.success; });
  const rejected = results.some(function(r) { return r.rejected; });

  await agent.readBalances();
  updatePortfolioUI();

  if (allOk) {
    const hashes = results.map(function(r) { return r.txHash; }).join(', ');
    await handleAgentMessage('Transactions confirmed: ' + hashes);
  } else if (rejected) {
    await handleAgentMessage('Transaction was rejected by user.');
  } else {
    var failed = results.find(function(r) { return !r.success; });
    await handleAgentMessage('Transaction failed: ' + (failed ? failed.error : 'unknown error'));
  }
}

// ── Core Message Flow ──

async function handleAgentMessage(message) {
  const statusEl = addStatus('Thinking...');
  try {
    const resp = await agent.sendMessage(message);
    removeEl(statusEl);

    if (resp.tool_log && resp.tool_log.length) addToolLog(resp.tool_log);
    if (resp.reply) addMsg(renderMd(resp.reply), 'agent');

    if (resp.transactions && resp.transactions.length) {
      const txContainer = renderTxCards(resp.transactions);
      const bubble = addMsg('', 'agent');
      bubble.appendChild(txContainer);

      const signBtn = document.createElement('button');
      signBtn.className = 'btn btn-ok btn-sm';
      signBtn.style.marginTop = '8px';
      signBtn.textContent = 'Sign ' + resp.transactions.length + ' transaction' + (resp.transactions.length > 1 ? 's' : '');
      signBtn.onclick = async function() {
        signBtn.disabled = true;
        signBtn.textContent = 'Signing...';
        await handleSign(resp.transactions, txContainer);
        signBtn.remove();
      };
      bubble.appendChild(signBtn);
    }
  } catch (err) {
    removeEl(statusEl);
    addMsg('<span style="color:var(--err)">' + esc(err.message) + '</span>', 'agent');
  }
}

// ── Connect Wallet ──

async function handleConnect() {
  const btn = $('btn-connect');
  try {
    btn.textContent = 'Connecting...';
    btn.disabled = true;

    const info = await agent.connectWallet();
    btn.textContent = info.address.slice(0, 6) + '...' + info.address.slice(-4);
    btn.className = 'btn btn-ghost btn-sm';
    btn.style.fontFamily = 'var(--mono)';
    btn.style.fontSize = '12px';
    btn.onclick = null;

    if (!SUPPORTED_CHAINS[info.chainId]) {
      addMsg('<span style="color:var(--warn)">Unsupported network. Switch to Mainnet or Sepolia.</span>', 'agent');
    } else {
      $('chain-select').value = String(info.chainId);
      $('chain-badge').textContent = CHAIN_NAMES[info.chainId] || 'unknown';
    }

    const balStatus = addStatus('Reading balances...');
    await agent.readBalances();
    removeEl(balStatus);

    $('portfolio').classList.add('show');
    updatePortfolioUI();

    const sessStatus = addStatus('Starting agent...');
    await agent.createSession();
    removeEl(sessStatus);

    $('msg-input').disabled = false;
    $('msg-input').placeholder = 'What would you like to do?';
    $('btn-send').disabled = false;
    $('msg-input').focus();
  } catch (err) {
    btn.textContent = 'Connect Wallet';
    btn.disabled = false;
    addMsg('<span style="color:var(--err)">' + esc(err.message) + '</span>', 'agent');
  }
}

// ── Chain Switch ──

async function handleChainSwitch(chainIdStr) {
  var chainId = parseInt(chainIdStr);
  $('chain-badge').textContent = CHAIN_NAMES[chainId] || 'unknown';

  if (agent.wallet) {
    try {
      await agent.switchChain(chainId);
      await agent.readBalances();
      updatePortfolioUI();
      agent.sessionId = null;
      await agent.createSession();
      addMsg('<span style="color:var(--ok)">Switched to ' + esc(SUPPORTED_CHAINS[chainId]) + '. New session started.</span>', 'agent');
    } catch (err) {
      addMsg('<span style="color:var(--warn)">Chain switch failed: ' + esc(err.message) + '</span>', 'agent');
    }
  }
}

// ── Send Message ──

async function handleSend(e) {
  e.preventDefault();
  var input = $('msg-input');
  var msg = input.value.trim();
  if (!msg || isProcessing || input.disabled) return;

  input.value = '';
  isProcessing = true;
  $('btn-send').disabled = true;

  addMsg(msg, 'user');

  if (!agent.sessionId) {
    try { await agent.createSession(); }
    catch (err) {
      addMsg('<span style="color:var(--err)">Failed to start session.</span>', 'agent');
      isProcessing = false;
      $('btn-send').disabled = false;
      return;
    }
  }

  await handleAgentMessage(msg);
  isProcessing = false;
  $('btn-send').disabled = false;
  input.focus();
}

function fillPrompt(btn) {
  var input = $('msg-input');
  input.value = btn.textContent;
  input.focus();
}

function toggleLog() {
  var panel = $('log-panel');
  var arrow = $('log-arrow');
  panel.classList.toggle('open');
  arrow.style.transform = panel.classList.contains('open') ? 'rotate(90deg)' : '';
}

// ── Init: allow chatting without wallet ──
$('msg-input').disabled = false;
$('msg-input').placeholder = 'Ask anything or connect wallet to build transactions...';
$('btn-send').disabled = false;
</script>
</body>
