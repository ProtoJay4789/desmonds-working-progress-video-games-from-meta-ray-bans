# Pipecat + Hermes Bridge Configuration
# Place in vault: 02-Labs/voice-agents/hermes-voice.yaml
# Reference: local-multimodal-agent skill

agent:
  name: HermesVoice
  # STT: Speech-to-Text (local Whisper.cpp)
  stt:
    provider: whisper_cpp
    model: base.en
    path: /models/whisper-base.en.bin  # Download from whisper.cpp releases
    language: en
    sample_rate: 16000

  # LLM: Language model (local Ollama)
  llm:
    provider: ollama
    model: llama3.1:8b
    endpoint: http://localhost:11434  # Ollama default
    temperature: 0.7
    max_tokens: 256

  # TTS: Text-to-Speech (local Piper)
  tts:
    provider: piper
    model: en_US-lessac-medium  #voices/en_US-lessac-medium.onnx
    model_path: /models/piper/
    sample_rate: 22050

# Transport: WebSocket server (Pattern A — daemon)
transport:
  type: websocket
  host: 0.0.0.0
  port: 7860
  path: /ws

# Vault logging
logging:
  vault_path: 02-Labs/voice-logs/
  format: markdown
  include_metadata: true
  rotate_after_days: 30

# Tool calling: enable Composio integration
tools:
  enabled:
    - composio_weather
    - composio_crypto_price
    - vault_read
  composio:
    base_url: http://localhost:8080  # Composio server if self-hosted
    # Alternatively use Composio Cloud with API key in vault

# Audio processing
audio:
  input_sample_rate: 16000
  output_sample_rate: 22050
  channels: 1
  chunk_size: 320  # 20ms @ 16kHz

# Performance (tune for 32GB RAM)
concurrency:
  max_calls: 2  # run 2 simultaneous conversations on 32GB RAM
