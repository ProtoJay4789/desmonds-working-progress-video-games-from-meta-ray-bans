<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bags Agent — AI Token Analyzer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
    }
    header {
      padding: 20px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #1a1a1a;
    }
    .logo { font-size: 22px; font-weight: 700; color: #ff6b35; }
    .logo span { color: #666; font-weight: 400; }
    .status { font-size: 13px; color: #888; }
    .status .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
    .status .dot.green { background: #00ff88; }
    .status .dot.red { background: #ff4444; }
    .main { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }
    h1 { font-size: 28px; margin-bottom: 8px; }
    h1 em { color: #ff6b35; font-style: normal; }
    .subtitle { color: #888; margin-bottom: 32px; }
    .tabs { display: flex; gap: 8px; margin-bottom: 24px; }
    .tab {
      padding: 10px 20px;
      border-radius: 8px;
      border: 1px solid #333;
      background: transparent;
      color: #888;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }
    .tab:hover { border-color: #ff6b3555; color: #ccc; }
    .tab.active { border-color: #ff6b35; color: #ff6b35; background: #1a1008; }
    .grid { display: grid; gap: 16px; }
    .card {
      background: #111;
      border: 1px solid #222;
      border-radius: 12px;
      padding: 20px;
      transition: border-color 0.2s;
    }
    .card:hover { border-color: #333; }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .card-title { font-size: 16px; font-weight: 600; }
    .score {
      font-size: 20px;
      font-weight: 700;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
    }
    .score.high { background: #0a2a15; color: #00ff88; border: 1px solid #00ff8833; }
    .score.mid { background: #2a2a0a; color: #ffaa00; border: 1px solid #ffaa0033; }
    .score.low { background: #2a0a0a; color: #ff4444; border: 1px solid #ff444433; }
    .token-addr { font-family: monospace; font-size: 12px; color: #666; margin-bottom: 8px; }
    .token-addr a { color: #ff6b35; text-decoration: none; }
    .verdict { font-size: 14px; color: #ccc; margin-bottom: 8px; }
    .reasoning { font-size: 13px; color: #888; line-height: 1.5; }
    .signals { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
    .signal {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 12px;
      background: #1a1a2e;
      color: #00d4ff;
      border: 1px solid #00d4ff22;
    }
    .risk-badge {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 10px;
      text-transform: uppercase;
      font-weight: 600;
    }
    .risk-low { background: #0a2a15; color: #00ff88; }
    .risk-medium { background: #2a2a0a; color: #ffaa00; }
    .risk-high { background: #2a0a0a; color: #ff4444; }
    .loading { text-align: center; padding: 40px; color: #666; }
    .loading .spinner {
      width: 32px; height: 32px;
      border: 3px solid #333;
      border-top-color: #ff6b35;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty { text-align: center; padding: 60px 20px; color: #666; }
    .empty h3 { color: #888; margin-bottom: 8px; }
    .btn {
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      background: #ff6b35;
      color: white;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.2s;
    }
    .btn:hover { background: #ff8855; }
    .btn:disabled { background: #333; color: #666; cursor: not-allowed; }
    .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    @media (max-width: 768px) { .cols { grid-template-columns: 1fr; } }
    footer {
      text-align: center;
      padding: 20px;
      color: #444;
      font-size: 12px;
      border-top: 1px solid #1a1a1a;
      margin-top: 40px;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">🎒 Bags <span>Agent</span></div>
    <div class="status" id="status"><span class="dot red"></span>Connecting...</div>
  </header>

  <div class="main">
    <h1>AI-Powered <em>Token Analysis</em></h1>
    <p class="subtitle">Real-time token launches from Bags.fm, analyzed by AI. Find the next gem before everyone else.</p>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('feed')">🎯 Token Feed</button>
      <button class="tab" onclick="switchTab('analyzed')">🤖 AI Ranked</button>
      <button class="tab" onclick="switchTab('pools')">💧 Pools</button>
    </div>

    <div id="content">
      <div class="loading"><div class="spinner"></div>Loading token feed...</div>
    </div>
  </div>

  <footer>
    🎒 Bags Agent — GenTech Labs — Bags Hackathon 2026 — AI Agents Track
  </footer>

  <script>
    let currentTab = 'feed';
    let feedData = [];
    let analyzedData = [];
    let poolData = [];

    // ── Health Check ────────────────────────────────────────────────
    async function checkHealth() {
      try {
        const res = await fetch('/api/health');
        const data = await res.json();
        const statusEl = document.getElementById('status');
        const ai = data.ai_enabled;
        const trading = data.trading_enabled;
        statusEl.innerHTML = `<span class="dot green"></span>AI: ${ai ? '✅' : '❌'} | Trading: ${trading ? '✅' : '❌'}`;
      } catch (e) {
        document.getElementById('status').innerHTML = '<span class="dot red"></span>Offline';
      }
    }

    // ── Tab Switching ───────────────────────────────────────────────
    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab').forEach((t, i) => {
        t.classList.toggle('active', ['feed', 'analyzed', 'pools'][i] === tab);
      });
      if (tab === 'feed') loadFeed();
      else if (tab === 'analyzed') loadAnalyzed();
      else if (tab === 'pools') loadPools();
    }

    // ── Feed ────────────────────────────────────────────────────────
    async function loadFeed() {
      const content = document.getElementById('content');
      content.innerHTML = '<div class="loading"><div class="spinner"></div>Loading token feed...</div>';

      try {
        const res = await fetch('/api/feed?limit=20');
        const data = await res.json();

        const items = Array.isArray(data) ? data : (data.tokens || data.data || []);

        if (!items.length) {
          content.innerHTML = '<div class="empty"><h3>No tokens yet</h3><p>Waiting for new launches on Bags...</p></div>';
          return;
        }

        feedData = items;
        renderFeed(items);
      } catch (e) {
        content.innerHTML = `<div class="empty"><h3>Feed unavailable</h3><p>${e.message}</p></div>`;
      }
    }

    function renderFeed(items) {
      const content = document.getElementById('content');
      content.innerHTML = `<div class="grid">${items.map(token => {
        const name = token.name || token.tokenName || 'Unknown Token';
        const symbol = token.symbol || token.ticker || '???';
        const address = token.tokenMint || token.address || token.mint || '';
        const shortAddr = address ? address.slice(0, 8) + '...' + address.slice(-4) : '';
        const created = token.createdAt || token.launchedAt || '';

        return `
          <div class="card">
            <div class="card-header">
              <div>
                <div class="card-title">${name} <span style="color:#666">($${symbol})</span></div>
                <div class="token-addr"><a href="https://solscan.io/token/${address}" target="_blank">${shortAddr}</a></div>
              </div>
              <button class="btn" onclick="analyzeToken('${address}')">🤖 Analyze</button>
            </div>
            ${created ? `<div style="font-size:12px;color:#666">Launched: ${new Date(created).toLocaleString()}</div>` : ''}
          </div>`;
      }).join('')}</div>`;
    }

    // ── Analyzed Feed ───────────────────────────────────────────────
    async function loadAnalyzed() {
      const content = document.getElementById('content');
      content.innerHTML = '<div class="loading"><div class="spinner"></div>AI is analyzing tokens...</div>';

      try {
        const res = await fetch('/api/analyze-feed?limit=10');
        const data = await res.json();
        analyzedData = data.tokens || [];
        renderAnalyzed(analyzedData);
      } catch (e) {
        content.innerHTML = `<div class="empty"><h3>Analysis failed</h3><p>${e.message}</p></div>`;
      }
    }

    function renderAnalyzed(items) {
      const content = document.getElementById('content');

      if (!items.length) {
        content.innerHTML = '<div class="empty"><h3>No tokens to analyze</h3><p>Feed may be empty. Try the Token Feed tab.</p></div>';
        return;
      }

      content.innerHTML = items.map(item => {
        const a = item.analysis || {};
        const t = item.token || {};
        const name = t.name || t.tokenName || 'Unknown';
        const address = item.address || '';
        const shortAddr = address ? address.slice(0, 8) + '...' + address.slice(-4) : '';
        const score = a.score || 0;
        const scoreClass = score >= 7 ? 'high' : score >= 4 ? 'mid' : 'low';
        const risk = a.risk || 'unknown';
        const signals = a.signals || [];

        return `
          <div class="card">
            <div class="card-header">
              <div>
                <div class="card-title">${name}</div>
                <div class="token-addr"><a href="https://solscan.io/token/${address}" target="_blank">${shortAddr}</a></div>
              </div>
              <div style="display:flex;align-items:center;gap:10px">
                <span class="risk-badge risk-${risk}">${risk}</span>
                <div class="score ${scoreClass}">${score}</div>
              </div>
            </div>
            <div class="verdict">${a.verdict || 'No verdict'}</div>
            <div class="reasoning">${a.reasoning || ''}</div>
            ${signals.length ? `<div class="signals">${signals.map(s => `<span class="signal">${s}</span>`).join('')}</div>` : ''}
          </div>`;
      }).join('');
    }

    // ── Single Token Analysis ───────────────────────────────────────
    async function analyzeToken(address) {
      const content = document.getElementById('content');
      content.innerHTML = `<div class="loading"><div class="spinner"></div>Analyzing ${address.slice(0,8)}...</div>`;

      try {
        const res = await fetch(`/api/analyze/${address}`);
        const data = await res.json();
        const a = data.analysis || {};
        const score = a.score || 0;
        const scoreClass = score >= 7 ? 'high' : score >= 4 ? 'mid' : 'low';

        content.innerHTML = `
          <div class="card">
            <div class="card-header">
              <div>
                <div class="card-title">Analysis: ${address.slice(0,12)}...</div>
                <div class="token-addr"><a href="https://solscan.io/token/${address}" target="_blank">${address}</a></div>
              </div>
              <div class="score ${scoreClass}">${score}</div>
            </div>
            <div class="verdict">${a.verdict || 'No verdict'}</div>
            <div class="reasoning">${a.reasoning || data.raw || 'No analysis available'}</div>
            ${(a.signals||[]).length ? `<div class="signals">${(a.signals||[]).map(s => `<span class="signal">${s}</span>`).join('')}</div>` : ''}
          </div>
          <div style="margin-top:16px"><button class="btn" onclick="switchTab('feed')">← Back to Feed</button></div>`;
      } catch (e) {
        content.innerHTML = `<div class="empty"><h3>Analysis failed</h3><p>${e.message}</p></div>`;
      }
    }

    // ── Pools ───────────────────────────────────────────────────────
    async function loadPools() {
      const content = document.getElementById('content');
      content.innerHTML = '<div class="loading"><div class="spinner"></div>Loading pools...</div>';

      try {
        const res = await fetch('/api/pools');
        const data = await res.json();
        const pools = Array.isArray(data) ? data : (data.pools || data.data || []);

        if (!pools.length) {
          content.innerHTML = '<div class="empty"><h3>No pools found</h3></div>';
          return;
        }

        content.innerHTML = `<div class="grid">${pools.map(p => `
          <div class="card">
            <div class="card-header">
              <div class="card-title">${p.name || p.tokenName || 'Pool'}</div>
            </div>
            <div style="font-size:13px;color:#888">
              TVL: $${(p.tvl || 0).toLocaleString()}<br>
              Volume: $${(p.volume || 0).toLocaleString()}
            </div>
          </div>
        `).join('')}</div>`;
      } catch (e) {
        content.innerHTML = `<div class="empty"><h3>Pools unavailable</h3><p>${e.message}</p></div>`;
      }
    }

    // ── Init ────────────────────────────────────────────────────────
    checkHealth();
    loadFeed();
  </script>
</body>
</html>
