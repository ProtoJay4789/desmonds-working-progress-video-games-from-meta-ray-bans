<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meta Ray-Ban Neural Fighter</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="hud" class="hud-container">
    <div class="game-main">
      <!-- Header -->
      <div class="header">
        <div class="level-indicator">Level: <span id="level">1</span></div>
        <div id="turn-indicator" class="turn-indicator player-turn">Your turn</div>
      </div>

      <!-- Combat Area -->
      <div class="combat-area">
        <!-- Enemy Panel -->
        <div class="enemy-panel">
          <div class="character-display">
            <div id="enemy-sprite-container" class="character-sprite"></div>
          </div>
          <div class="enemy-name" id="enemy-name">Skeleton</div>
          <div class="hp-bar">
            <div class="hp-fill enemy-hp" id="enemy-hp" style="width: 100%">40/40</div>
          </div>
        </div>
      </div>

      <!-- Party Panel -->
      <div class="party-panel">
        <div class="panel-title">⚔️ Your Party</div>
        <div id="party-container" class="party-container">
          <!-- Party members rendered here -->
        </div>
        <div class="potions-row">
          <div class="potions-label">🧪 Potions: <span id="potions">3</span></div>
          <button id="potion-btn" class="potion-btn">Use Potion</button>
        </div>
      </div>

      <!-- Combat Log -->
      <div class="combat-log" id="combat-log">
        <div class="log-entry">Combat log initialized...</div>
      </div>
    </div>

    <!-- Right Sidebar -->
    <div class="game-sidebar">
      <div class="panel-title">📜 Abilities</div>
      <div id="abilities-container" class="abilities-container">
        <!-- Abilities rendered here -->
      </div>
    </div>
  </div>

  <!-- Game Over Screen -->
  <div id="game-over" class="overlay hidden">
    <div class="overlay-content">
      <h1>💀 YOUR PARTY FELL</h1>
      <p>The dungeon claims another soul.</p>
      <button id="restart-btn" class="restart-btn">Start Over</button>
    </div>
  </div>

  <!-- Victory Screen -->
  <div id="game-won" class="overlay hidden">
    <div class="overlay-content">
      <h1>🏆 VICTORY!</h1>
      <p>Your party conquered the dungeon!</p>
      <button id="restart-btn" class="restart-btn">New Run</button>
    </div>
  </div>

  <script type="module" src="src/app.js"></script>
</body>
</html>
