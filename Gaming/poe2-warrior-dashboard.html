<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GenTech Dashboard — POE2</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c9a84c;
            --gold-dim: #8b6914;
            --gold-glow: rgba(201, 168, 76, 0.4);
            --fire: #ff6b35;
            --fire-glow: rgba(255, 107, 53, 0.35);
            --magma: #cc4400;
            --ember: #ff8c42;
            --physical: #e05555;
            --physical-glow: rgba(224, 85, 85, 0.35);
            --utility: #c9a84c;
            --utility-glow: rgba(201, 168, 76, 0.35);
            --dark-bg: #0a0a0f;
            --panel-bg: #12121a;
            --panel-border: #1e1e2e;
            --text: #d4d4d4;
            --text-dim: #6b6b7b;
            --danger: #ff4444;
            --success: #44ff88;
            --mana-blue: #3b82f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--dark-bg);
            color: var(--text);
            font-family: 'Crimson Text', serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(ellipse at 20% 20%, rgba(255, 107, 53, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(204, 68, 0, 0.02) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* ── Header ── */
        .header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 1px solid var(--panel-border);
            margin-bottom: 20px;
            position: relative;
        }

        .header::after {
            content: '🔥';
            position: absolute;
            bottom: -12px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--dark-bg);
            padding: 0 15px;
            font-size: 20px;
        }

        .header h1 {
            font-family: 'Cinzel', serif;
            font-size: 2.5em;
            font-weight: 900;
            color: var(--gold);
            text-shadow: 0 0 30px rgba(201, 168, 76, 0.3);
            letter-spacing: 3px;
        }

        .header .subtitle {
            color: var(--text-dim);
            font-size: 1.1em;
            margin-top: 8px;
            font-style: italic;
        }

        .header .patch-badge {
            display: inline-block;
            background: rgba(255, 107, 53, 0.1);
            border: 1px solid rgba(255, 107, 53, 0.3);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            color: var(--fire);
            margin-top: 10px;
        }

        .header .last-updated {
            color: var(--text-dim);
            font-size: 0.8em;
            margin-top: 8px;
        }

        /* ── Character Switcher ── */
        .char-switcher {
            text-align: center;
            margin-bottom: 20px;
        }
        .char-switcher a {
            display: inline-block;
            font-family: 'Cinzel', serif;
            font-size: 0.85em;
            padding: 6px 18px;
            border: 1px solid rgba(126, 184, 255, 0.25);
            border-radius: 20px;
            background: rgba(126, 184, 255, 0.06);
            color: #7eb8ff;
            text-decoration: none;
            letter-spacing: 1px;
            transition: all 0.3s;
        }
        .char-switcher a:hover {
            background: rgba(126, 184, 255, 0.12);
            border-color: rgba(126, 184, 255, 0.45);
            box-shadow: 0 0 12px rgba(126, 184, 255, 0.15);
        }
        .char-switcher button {
            display: inline-block;
            font-family: 'Cinzel', serif;
            font-size: 0.85em;
            padding: 6px 18px;
            border: 1px solid rgba(126, 184, 255, 0.25);
            border-radius: 20px;
            background: rgba(126, 184, 255, 0.06);
            color: #7eb8ff;
            text-decoration: none;
            letter-spacing: 1px;
            transition: all 0.3s;
            cursor: pointer;
            margin: 0 4px;
        }
        .char-switcher button:hover {
            background: rgba(126, 184, 255, 0.12);
            border-color: rgba(126, 184, 255, 0.45);
            box-shadow: 0 0 12px rgba(126, 184, 255, 0.15);
        }
        .char-switcher button.active {
            background: rgba(126, 184, 255, 0.2);
            border-color: rgba(126, 184, 255, 0.6);
            box-shadow: 0 0 14px rgba(126, 184, 255, 0.3);
            color: #fff;
        }

        /* ── Main Tab Bar ── */
        .main-tab-bar {
            display: flex;
            justify-content: center;
            gap: 4px;
            margin-bottom: 30px;
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            padding: 5px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }
        .main-tab-btn {
            font-family: 'Cinzel', serif;
            font-size: 0.95em;
            padding: 10px 32px;
            border: none;
            border-radius: 9px;
            cursor: pointer;
            background: transparent;
            color: var(--text-dim);
            transition: all 0.3s;
            letter-spacing: 1px;
            position: relative;
        }
        .main-tab-btn:hover { color: var(--text); background: rgba(255,255,255,0.04); }
        .main-tab-btn.active {
            background: rgba(201, 168, 76, 0.12);
            color: var(--gold);
            border: 1px solid rgba(201, 168, 76, 0.25);
            text-shadow: 0 0 12px rgba(201, 168, 76, 0.2);
        }

        /* ── Main Tab Panels ── */
        .main-panel { display: none; }
        .main-panel.active { display: block; }

        /* ── Character Card ── */
        .character-card {
            background: linear-gradient(135deg, var(--panel-bg) 0%, #151520 100%);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
            position: relative;
            overflow: hidden;
        }

        .character-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--fire), transparent);
            opacity: 0.6;
        }

        .character-name {
            font-family: 'Cinzel', serif;
            font-size: 1.8em;
            color: var(--gold);
            margin-bottom: 5px;
        }

        .character-class {
            color: var(--fire);
            font-size: 1.1em;
            margin-bottom: 15px;
        }

        .character-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .stat-box {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            padding: 12px;
            text-align: center;
        }

        .stat-box .label {
            color: var(--text-dim);
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-box .value {
            font-family: 'Cinzel', serif;
            font-size: 1.4em;
            color: var(--fire);
            margin-top: 4px;
        }

        .stat-box .value.gold { color: var(--gold); }

        /* ── Progress Section ── */
        .progress-section {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
        }

        .progress-section h2 {
            font-family: 'Cinzel', serif;
            font-size: 1.3em;
            color: var(--gold);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .progress-bar-container {
            margin-bottom: 18px;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-size: 0.95em;
        }

        .progress-label .name { color: var(--text); }
        .progress-label .percent { color: var(--fire); font-family: 'Cinzel', serif; }

        .progress-bar {
            height: 20px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--panel-border);
        }

        .progress-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 1.5s ease-out;
            position: relative;
        }

        .progress-fill.campaign { background: linear-gradient(90deg, var(--magma), var(--fire)); box-shadow: 0 0 15px rgba(255, 107, 53, 0.3); }
        .progress-fill.level { background: linear-gradient(90deg, #b45309, var(--ember)); box-shadow: 0 0 15px rgba(255, 140, 66, 0.3); }
        .progress-fill.build { background: linear-gradient(90deg, #7c3aed, #a855f7); box-shadow: 0 0 15px rgba(168, 85, 247, 0.3); }
        .progress-fill.gems { background: linear-gradient(90deg, #059669, #34d399); box-shadow: 0 0 15px rgba(52, 211, 153, 0.3); }

        /* ── Skills Section ── */
        .skills-section {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
        }

        .skills-section h2 {
            font-family: 'Cinzel', serif;
            font-size: 1.3em;
            color: var(--gold);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .skill-set-label {
            font-family: 'Cinzel', serif;
            font-size: 1em;
            color: var(--ember);
            margin: 15px 0 10px;
            padding-bottom: 6px;
            border-bottom: 1px solid rgba(255, 107, 53, 0.2);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .skill-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
        }

        .skill-card {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--panel-border);
            border-radius: 10px;
            padding: 18px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .skill-card:hover {
            border-color: var(--fire);
            box-shadow: 0 0 20px rgba(255, 107, 53, 0.1);
            transform: translateY(-2px);
        }

        .skill-card.primary { border-color: var(--magma); }

        .skill-card.primary::before {
            content: '⚔️ PRIMARY';
            position: absolute;
            top: 8px;
            right: 8px;
            font-size: 0.65em;
            color: var(--fire);
            background: rgba(255, 107, 53, 0.1);
            padding: 2px 8px;
            border-radius: 10px;
            font-family: 'Cinzel', serif;
            letter-spacing: 1px;
        }

        .skill-name {
            font-family: 'Cinzel', serif;
            font-size: 1.15em;
            color: var(--ember);
            margin-bottom: 8px;
        }

        .skill-type {
            color: var(--text-dim);
            font-size: 0.8em;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .support-gems {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .support-tag {
            background: rgba(255, 107, 53, 0.1);
            border: 1px solid rgba(255, 107, 53, 0.2);
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 0.8em;
            color: var(--ember);
        }

        .support-tag.empty {
            background: rgba(255, 255, 255, 0.03);
            border: 1px dashed rgba(255, 255, 255, 0.1);
            color: var(--text-dim);
            font-style: italic;
        }

        /* ── Meta Alert ── */
        .meta-alert {
            background: linear-gradient(135deg, rgba(255, 107, 53, 0.05) 0%, rgba(204, 68, 0, 0.05) 100%);
            border: 1px solid rgba(255, 107, 53, 0.2);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .meta-alert h3 {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .meta-alert .alert-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 8px;
            padding: 8px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 6px;
        }

        .meta-alert .priority {
            color: var(--fire);
            font-weight: bold;
            min-width: 20px;
        }

        .meta-alert .suggestion {
            color: var(--text);
            line-height: 1.5;
        }

        .meta-alert .suggestion strong { color: var(--gold); }

        /* ═══════════════════════════════════════════════════════════
           SKILL TREE TAB STYLES
           ═══════════════════════════════════════════════════════════ */

        /* ── Legend ── */
        .legend {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 0.88em;
            color: var(--text-dim);
        }
        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px solid;
        }
        .legend-dot.fire     { background: rgba(255,107,53,0.2); border-color: var(--fire); }
        .legend-dot.physical { background: rgba(224,85,85,0.2);  border-color: var(--physical); }
        .legend-dot.utility  { background: rgba(201,168,76,0.2); border-color: var(--utility); }
        .legend-dot.support  { background: transparent; border-color: var(--text-dim); border-style: dashed; }
        .legend-line {
            width: 30px;
            height: 3px;
            border-radius: 2px;
        }
        .legend-line.active   { background: var(--gold); box-shadow: 0 0 6px var(--gold-glow); }
        .legend-line.passive  { background: var(--text-dim); opacity: 0.5; }

        /* ── Tree Canvas ── */
        .tree-panel {
            background: linear-gradient(135deg, var(--panel-bg) 0%, #0e0e16 100%);
            border: 1px solid var(--panel-border);
            border-radius: 14px;
            padding: 15px;
            margin-bottom: 25px;
            position: relative;
            overflow: hidden;
        }
        .tree-panel::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
            opacity: 0.6;
        }
        .tree-panel h2 {
            font-family: 'Cinzel', serif;
            font-size: 1.2em;
            color: var(--gold);
            text-align: center;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .tree-svg {
            width: 100%;
            display: block;
        }

        /* ── SVG Node Styles ── */
        .node-group { cursor: pointer; }
        .node-group:hover .node-ring { opacity: 1; }

        .node-ring {
            fill: none;
            stroke-width: 2;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .node-bg {
            fill: rgba(10, 10, 15, 0.85);
            stroke-width: 2;
            transition: all 0.3s;
        }
        .node-group:hover .node-bg {
            filter: brightness(1.3);
        }

        .node-icon {
            font-size: 18px;
            text-anchor: middle;
            dominant-baseline: central;
            pointer-events: none;
        }

        .node-label {
            font-family: 'Cinzel', serif;
            font-size: 10px;
            fill: var(--text);
            text-anchor: middle;
            pointer-events: none;
            letter-spacing: 0.5px;
        }
        .node-label-shadow {
            font-family: 'Cinzel', serif;
            font-size: 10px;
            fill: none;
            stroke: var(--dark-bg);
            stroke-width: 3;
            text-anchor: middle;
            pointer-events: none;
        }

        .support-node-bg {
            fill: rgba(10, 10, 15, 0.7);
            stroke: var(--text-dim);
            stroke-width: 1;
            stroke-dasharray: 3 2;
        }
        .support-label {
            font-family: 'Crimson Text', serif;
            font-size: 8px;
            fill: var(--text-dim);
            text-anchor: middle;
            pointer-events: none;
        }

        .connection-line {
            stroke-width: 2.5;
            fill: none;
            opacity: 0.6;
            transition: opacity 0.3s;
        }
        .connection-line.synergy {
            stroke-width: 3;
            opacity: 0.85;
        }
        .connection-line.recommended {
            stroke-dasharray: 8 4;
            stroke-width: 2.5;
            opacity: 0.7;
        }

        .support-link {
            stroke: var(--text-dim);
            stroke-width: 1;
            stroke-dasharray: 3 2;
            opacity: 0.5;
        }

        /* ── Tooltip ── */
        .tooltip {
            position: fixed;
            background: rgba(18, 18, 26, 0.96);
            border: 1px solid var(--panel-border);
            border-radius: 10px;
            padding: 14px 18px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 100;
            max-width: 320px;
            backdrop-filter: blur(8px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
        }
        .tooltip.visible { opacity: 1; }
        .tooltip-name {
            font-family: 'Cinzel', serif;
            font-size: 1.05em;
            margin-bottom: 4px;
        }
        .tooltip-type {
            font-size: 0.8em;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .tooltip-role {
            font-size: 0.9em;
            line-height: 1.4;
            color: var(--text);
            margin-bottom: 8px;
        }
        .tooltip-supports {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }
        .tooltip-support-tag {
            background: rgba(255, 107, 53, 0.1);
            border: 1px solid rgba(255, 107, 53, 0.2);
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.75em;
            color: var(--ember);
        }
        .tooltip-support-tag.physical {
            background: rgba(224, 85, 85, 0.1);
            border-color: rgba(224, 85, 85, 0.2);
            color: var(--physical);
        }
        .tooltip-support-tag.gold {
            background: rgba(201, 168, 76, 0.1);
            border-color: rgba(201, 168, 76, 0.2);
            color: var(--gold);
        }

        /* ── Info Cards ── */
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }
        .info-card {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            padding: 20px;
        }
        .info-card h3 {
            font-family: 'Cinzel', serif;
            font-size: 1.05em;
            color: var(--gold);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .synergy-chain {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 6px;
            font-size: 0.92em;
            line-height: 1.6;
        }
        .synergy-step {
            background: rgba(255, 107, 53, 0.08);
            border: 1px solid rgba(255, 107, 53, 0.15);
            padding: 3px 10px;
            border-radius: 14px;
            color: var(--ember);
            white-space: nowrap;
        }
        .synergy-step.physical {
            background: rgba(224, 85, 85, 0.08);
            border-color: rgba(224, 85, 85, 0.15);
            color: var(--physical);
        }
        .synergy-step.gold {
            background: rgba(201, 168, 76, 0.08);
            border-color: rgba(201, 168, 76, 0.15);
            color: var(--gold);
        }
        .synergy-arrow { color: var(--text-dim); font-size: 1.1em; }

        .rec-list {
            list-style: none;
        }
        .rec-list li {
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            font-size: 0.9em;
            line-height: 1.5;
        }
        .rec-list li:last-child { border-bottom: none; }
        .rec-priority {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-weight: 700;
            margin-right: 6px;
        }
        .rec-skill { color: var(--fire); font-weight: 700; }
        .rec-arrow { color: var(--text-dim); margin: 0 4px; }
        .rec-suggested { color: var(--gold); font-weight: 700; }

        /* ── Pulse animation ── */
        @keyframes pulse-glow {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }
        .node-primary-pulse {
            animation: pulse-glow 3s ease-in-out infinite;
        }

        /* ── Footer ── */
        .footer {
            text-align: center;
            padding: 30px 0;
            border-top: 1px solid var(--panel-border);
            margin-top: 30px;
        }

        .footer .brand {
            font-family: 'Cinzel', serif;
            color: var(--gold-dim);
            font-size: 0.9em;
            letter-spacing: 2px;
        }

        .footer .powered {
            color: var(--text-dim);
            font-size: 0.8em;
            margin-top: 5px;
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: var(--text-dim);
            font-style: italic;
        }

        /* ── Responsive ── */
        @media (max-width: 900px) {
            .info-grid { grid-template-columns: 1fr; }
            .header h1 { font-size: 1.8em; }
        }
        @media (max-width: 768px) {
            .character-stats { grid-template-columns: repeat(2, 1fr); }
            .skill-grid { grid-template-columns: 1fr; }
        }
        @media (max-width: 600px) {
            .container { padding: 10px; }
            .legend { gap: 12px; }
            .main-tab-btn { padding: 8px 18px; font-size: 0.85em; }
        }
    </style>
</head>
<body>

    <div class="container" id="app">
        <div class="header">
            <a href="../hub-vanito.html" style="position:absolute;top:16px;left:16px;text-decoration:none;color:var(--text-dim);font-size:0.85em;padding:6px 12px;border:1px solid var(--panel-border);border-radius:6px;transition:all 0.2s;" onmouseover="this.style.borderColor='var(--gold)';this.style.color='var(--gold)'" onmouseout="this.style.borderColor='var(--panel-border)';this.style.color='var(--text-dim)'">⚔️ Vanito's Hub</a>
            <h1>GENTECH DASHBOARD</h1>
            <div class="subtitle" id="header-subtitle">GenTech Dashboard — Wyvern Warrior</div>
        </div>

        <!-- Character Switcher -->
        <div class="char-switcher" id="char-switcher">
            <button class="active" onclick="switchCharacter(0)">⚔️ Vanito — Wyvern Warrior</button>
            <button onclick="switchCharacter(1)">🏹 Vanito — Witch Hunter Mercenary</button>
        </div>

        <!-- Main Tab Bar -->
        <div class="main-tab-bar" id="main-tab-bar">
            <button class="main-tab-btn active" onclick="switchMainTab('build')">📊 Build</button>
            <button class="main-tab-btn" onclick="switchMainTab('skilltree')">🌳 Skill Tree</button>
        </div>

        <!-- ═══ BUILD TAB PANEL ═══ -->
        <div class="main-panel active" id="panel-build">
            <div class="loading" id="build-loading">🔥 Loading build data...</div>
            <div id="build-content" style="display:none;"></div>
        </div>

        <!-- ═══ SKILL TREE TAB PANEL ═══ -->
        <div class="main-panel" id="panel-skilltree">
            <div class="loading" id="skilltree-loading" style="display:none;">🌳 Loading skill tree...</div>
            <div id="skilltree-content" style="display:none;"></div>
        </div>

        <div class="footer">
            <div class="brand">GENTECH DASHBOARD</div>
            <div class="powered">GenTech Dashboard v0.1 — Vanito's Warrior</div>
        </div>
    </div>

    <!-- Tooltip (shared by build tab and skill tree) -->
    <div class="tooltip" id="tooltip"></div>

    <script>
        // ═══════════════════════════════════════════════════════════
        //  MAIN TAB SWITCHING
        // ═══════════════════════════════════════════════════════════
        let skillTreeInitialized = false;

        function switchMainTab(tab) {
            document.querySelectorAll('.main-tab-btn').forEach(btn => btn.classList.remove('active'));
            const buttons = document.querySelectorAll('.main-tab-btn');
            if (tab === 'build') buttons[0].classList.add('active');
            else buttons[1].classList.add('active');

            document.querySelectorAll('.main-panel').forEach(p => p.classList.remove('active'));
            document.getElementById('panel-' + tab).classList.add('active');

            if (tab === 'skilltree' && !skillTreeInitialized) {
                initSkillTree();
            }
        }

        // ═══════════════════════════════════════════════════════════
        //  BUILD TAB — DATA LOADING
        // ═══════════════════════════════════════════════════════════
        const DATA_URL = 'poe2-warrior.json?v=' + Date.now();
        let currentBuildData = null;
        let currentCharIndex = 0;
        let allCharsData = null;

        async function loadBuild(charIndex) {
            if (charIndex !== undefined) currentCharIndex = charIndex;
            try {
                const res = await fetch(DATA_URL);
                const raw = await res.json();
                allCharsData = raw.characters || [raw];
                const data = allCharsData[currentCharIndex];
                currentBuildData = data;
                document.getElementById('header-subtitle').textContent =
                    'GenTech Dashboard — ' + data.class + ' ' + data.alias;
                document.getElementById('build-loading').textContent =
                    '🔥 Loading ' + (data.alias || data.class) + '\'s build...';
                renderDashboard(data);
                updateCharSwitcher();
            } catch (err) {
                document.getElementById('build-loading').innerHTML =
                    '⚠️ Could not load build data. Make sure ' + DATA_URL + ' exists.';
            }
        }

        function renderDashboard(data) {
            const { id, player, alias, class: charClass, build, ascendancy, weapon,
                    talisman, act, mission, patch, progress, skills, suggestions,
                    synergyLoop, lastUpdated } = data;

            // ── Generic skill-set rendering ──
            let allSkillSetsHTML = '';
            const skillSetKeys = Object.keys(skills);
            const skillSetLabels = {
                warrior: '🛡️ Warrior Set (Primary)',
                wyvern: '🐉 Wyvern Set (Secondary)',
                mercenary: '🏹 Mercenary Set'
            };
            const skillSetIcons = {
                warrior: '🛡️',
                wyvern: '🐉',
                mercenary: '🏹'
            };
            for (const [setName, skillList] of Object.entries(skills)) {
                const label = skillSetLabels[setName]
                    || (skillSetIcons[setName] + ' ' + setName.charAt(0).toUpperCase() + setName.slice(1) + ' Set');
                const skillHTML = skillList.map(skill => {
                    const noteHTML = skill.note
                        ? `<div class="skill-note" style="font-size:0.8em;color:#aaa;margin-top:4px;font-style:italic;">${skill.note}</div>`
                        : '';
                    return `<div class="skill-card ${skill.primary ? 'primary' : ''}">
                        <div class="skill-name">${skill.name}</div>
                        <div class="skill-type">${skill.type}</div>
                        ${noteHTML}
                        <div class="support-gems">
                            ${skill.supports.length > 0
                                ? skill.supports.map(s => `<span class="support-tag">${s}</span>`).join('')
                                : '<span class="support-tag empty">No supports yet</span>'
                            }
                        </div>
                    </div>`;
                }).join('');
                allSkillSetsHTML += `
                    <div class="skill-set-label">${label}</div>
                    <div class="skill-grid">${skillHTML}</div>`;
            }

            const suggestionsHTML = suggestions.map(s =>
                `<div class="alert-item">
                    <span class="priority">${s.priority}.</span>
                    <span class="suggestion">
                        <strong>${s.skill}:</strong> ${s.current} → <strong>${s.suggested}</strong> — ${s.reason}
                    </span>
                </div>`
            ).join('');

            const synergySteps = synergyLoop.split(' → ');
            const synergyHTML = synergySteps.map((step, i) => {
                const cls = step.match(/Mace|Rolling Slam|Bone Shatter|Infernal|Warrior|Rend|Shield|Gemini|Witch|Crossbow|Load|Surge|Reload|Siege|Ballista|Mirage|Wind|Hail|Tornado/i) ? ''
                          : 'gold';
                return i < synergySteps.length - 1
                    ? `<span class="synergy-step ${cls}">${step}</span><span class="synergy-arrow">→</span>`
                    : `<span class="synergy-step ${cls}">${step}</span>`;
            }).join('');

            // Character card stats — build dynamically from available fields
            const displayName = alias || player;
            const displayClass = charClass || 'Unknown';
            const displayBuild = build || 'Unknown';
            const displayWeapon = weapon || 'Unknown';

            let statBoxesHTML = `
                <div class="stat-box">
                    <div class="label">Class</div>
                    <div class="value">${displayClass}</div>
                </div>
                <div class="stat-box">
                    <div class="label">Build</div>
                    <div class="value">${displayBuild}</div>
                </div>
                <div class="stat-box">
                    <div class="label">Weapon</div>
                    <div class="value gold">${displayWeapon}</div>
                </div>`;
            if (talisman) {
                statBoxesHTML += `
                <div class="stat-box">
                    <div class="label">Talisman</div>
                    <div class="value gold">${talisman}</div>
                </div>`;
            }
            if (ascendancy) {
                statBoxesHTML += `
                <div class="stat-box">
                    <div class="label">Ascendancy</div>
                    <div class="value">${ascendancy}</div>
                </div>`;
            }

            document.getElementById('build-content').innerHTML = `
                <div class="patch-badge" style="display:inline-block;margin-bottom:20px;">
                    Patch ${patch} — Return of the Ancients
                </div>

                <div class="character-card">
                    <div class="character-name">${displayName}</div>
                    <div class="character-class">${displayClass} — ${displayBuild} — ${displayWeapon}</div>
                    <div class="character-stats">
                        ${statBoxesHTML}
                    </div>
                </div>

                <div class="meta-alert">
                    <h3>🔄 Synergy Loop</h3>
                    <div class="synergy-chain">${synergyHTML}</div>
                </div>

                <div class="progress-section">
                    <h2>📊 Progress</h2>
                    <div class="progress-bar-container">
                        <div class="progress-label">
                            <span class="name">Campaign</span>
                            <span class="percent">${progress.campaign}%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill campaign" style="width: 0%" data-target="${progress.campaign}"></div>
                        </div>
                    </div>
                    <div class="progress-bar-container">
                        <div class="progress-label">
                            <span class="name">Build Completion</span>
                            <span class="percent">${progress.buildCompletion}%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill build" style="width: 0%" data-target="${progress.buildCompletion}"></div>
                        </div>
                    </div>
                    <div class="progress-bar-container">
                        <div class="progress-label">
                            <span class="name">Gem Collection</span>
                            <span class="percent">${progress.gemCollection}%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill gems" style="width: 0%" data-target="${progress.gemCollection}"></div>
                        </div>
                    </div>
                    <div class="progress-bar-container">
                        <div class="progress-label">
                            <span class="name">Meta Alignment</span>
                            <span class="percent">${progress.metaAlignment}%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill level" style="width: 0%" data-target="${progress.metaAlignment}"></div>
                        </div>
                    </div>
                </div>

                <div class="skills-section">
                    <h2>⚔️ Skill Setup</h2>
                    ${allSkillSetsHTML}
                </div>

                <div class="meta-alert">
                    <h3>🎯 Build Optimization Suggestions</h3>
                    ${suggestionsHTML}
                </div>
            `;

            document.getElementById('build-loading').style.display = 'none';
            document.getElementById('build-content').style.display = 'block';

            // Animate progress bars
            setTimeout(() => {
                document.querySelectorAll('.progress-fill').forEach(bar => {
                    bar.style.width = bar.getAttribute('data-target') + '%';
                });
            }, 300);
        }

        // ═══════════════════════════════════════════════════════════
        //  CHARACTER SWITCHING
        // ═══════════════════════════════════════════════════════════
        function switchCharacter(index) {
            if (!allCharsData || index === currentCharIndex) return;
            currentCharIndex = index;
            const data = allCharsData[index];
            currentBuildData = data;

            // Update header
            document.getElementById('header-subtitle').textContent =
                'GenTech Dashboard — ' + data.class + ' ' + data.alias;
            document.getElementById('build-loading').textContent =
                '🔥 Loading ' + (data.alias || data.class) + '\'s build...';
            document.getElementById('build-loading').style.display = '';
            document.getElementById('build-content').style.display = 'none';

            // Render new dashboard
            renderDashboard(data);
            updateCharSwitcher();
        }

        function updateCharSwitcher() {
            document.querySelectorAll('#char-switcher button').forEach((btn, i) => {
                btn.classList.toggle('active', i === currentCharIndex);
            });
        }

        // ═══════════════════════════════════════════════════════════
        //  SKILL TREE TAB (lazy-loaded)
        // ═══════════════════════════════════════════════════════════
        function initSkillTree() {
            skillTreeInitialized = true;

            const container = document.getElementById('skilltree-content');
            container.innerHTML = buildSkillTreeHTML();

            document.getElementById('skilltree-loading').style.display = 'none';
            container.style.display = 'block';

            initSkillTreeTooltips();
            initSkillTreeAnimations();
        }

        function buildSkillTreeHTML() {
            return `

                    <div class="legend-item"><div class="legend-dot fire"></div> Elemental / Fire</div>
                    <div class="legend-item"><div class="legend-dot utility"></div> Utility</div>
                    <div class="legend-item"><div class="legend-line active"></div> Active Synergy</div>
                    <div class="legend-item"><div class="legend-line passive"></div> Connection</div>
                    <div class="legend-item"><div class="legend-dot support"></div> Support Gem</div>
                </div>

                <div class="tree-panel">
                    <h2>🔥 Vanito — Vibrant Warrior · Skill Synergy Map</h2>

                                <polygon points="0 0, 10 3.5, 0 7" fill="var(--fire)" opacity="0.6"/>
                            </marker>
                            <marker id="arrow-red" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
                                <polygon points="0 0, 10 3.5, 0 7" fill="var(--physical)" opacity="0.6"/>
                            </marker>
                        </defs>

                        <!-- Set divider labels -->
                        <text x="350" y="32" text-anchor="middle" font-family="Cinzel" font-size="11" fill="var(--physical)" letter-spacing="2" opacity="0.7">🛡️ WARRIOR SET</text>
                        <text x="820" y="32" text-anchor="middle" font-family="Cinzel" font-size="11" fill="var(--fire)" letter-spacing="2" opacity="0.7">🐉 WYVERN SET</text>

                            <line x1="250" y1="130" x2="150" y2="260" class="connection-line synergy" stroke="var(--physical)" marker-end="url(#arrow-red)" filter="url(#glow-red-v)"/>
                            <line x1="350" y1="250" x2="190" y2="290" class="connection-line" stroke="var(--physical)" opacity="0.4"/>
                            <line x1="150" y1="300" x2="250" y2="400" class="connection-line synergy" stroke="var(--physical)" marker-end="url(#arrow-red)"/>
                            <line x1="370" y1="250" x2="280" y2="390" class="connection-line" stroke="var(--physical)" opacity="0.35"/>
                            <line x1="420" y1="220" x2="390" y2="220" class="connection-line" stroke="var(--text-dim)" opacity="0.3"/>
                            <line x1="420" y1="140" x2="390" y2="200" class="connection-line" stroke="var(--physical)" opacity="0.35"/>
                        </g>

                        <!-- ═══ WYVERN SET CONNECTIONS ═══ -->
                        <g id="vanito-wyvern-links">
                            <line x1="820" y1="140" x2="920" y2="240" class="connection-line synergy" stroke="var(--fire)" filter="url(#glow-fire-v)"/>
                            <line x1="940" y1="280" x2="830" y2="380" class="connection-line synergy" stroke="var(--fire)" filter="url(#glow-fire-v)"/>

                            <line x1="720" y1="530" x2="830" y2="560" class="connection-line" stroke="var(--fire)" opacity="0.5"/>
                            <line x1="940" y1="280" x2="850" y2="540" class="connection-line" stroke="var(--text-dim)" opacity="0.25"/>
                        </g>

                        <!-- ═══ CROSS-SET LINKS ═══ -->
                        <g id="vanito-cross-links">
                            <line x1="470" y1="500" x2="680" y2="400" class="connection-line recommended" stroke="var(--gold)" stroke-dasharray="8 4" opacity="0.5"/>
                            <text x="565" y="440" text-anchor="middle" font-size="7" fill="var(--gold)" font-family="Cinzel" opacity="0.7" letter-spacing="1">SHARED SKILL</text>
                            <line x1="780" y1="140" x2="300" y2="100" class="connection-line recommended" stroke="var(--gold)" stroke-dasharray="6 3" opacity="0.35"/>
                            <text x="540" y="108" text-anchor="middle" font-size="7" fill="var(--gold-dim)" font-family="Cinzel" letter-spacing="1">CHARGE GEN → BUFF</text>
                        </g>

                        <!-- ═══ WARRIOR SET NODES ═══ -->
                        <g class="node-group" data-skill="infernal-cry" transform="translate(250, 110)">

                        <g class="node-group" data-skill="mace-strike" transform="translate(350, 220)">

                            <text y="36" text-anchor="middle" font-size="7" fill="var(--gold)" font-family="Cinzel">PRIMARY</text>
                        </g>
                        <g class="node-group" data-skill="rolling-slam" transform="translate(150, 280)">
                            <circle class="node-ring" r="30" stroke="var(--physical)" filter="url(#glow-red-v)"/>

                            <circle class="node-bg" r="24" stroke="var(--physical)"/>

                            <text class="node-label-shadow" y="-32">Rolling Slam</text>

                        </g>
                        <g class="node-group" data-skill="bone-shatter" transform="translate(250, 400)">

                            <text class="node-label-shadow" y="-28">Bone Shatter</text>

                        <g class="node-group" data-skill="raise-shield" transform="translate(430, 200)">

                            <text class="node-icon" dy="1">🛡️</text>
                            <text class="node-label-shadow" y="-26">Raise Shield</text>
                            <text class="node-label" y="-26" fill="var(--text-dim)">Raise Shield</text>
                        </g>
                        <g class="node-group" data-skill="rend" transform="translate(420, 120)">
                            <circle class="node-ring" r="24" stroke="var(--physical)"/>
                            <circle class="node-bg" r="18" stroke="var(--physical)"/>
                            <text class="node-icon" dy="1">🩸</text>
                            <text class="node-label-shadow" y="-26">Rend</text>
                            <text class="node-label" y="-26">Rend</text>
                        </g>

                        <!-- ═══ WYVERN SET NODES ═══ -->
                        <g class="node-group" data-skill="wing-blast" transform="translate(820, 120)">

                        <g class="node-group" data-skill="savage-fury" transform="translate(940, 250)">
                            <circle class="node-ring" r="26" stroke="var(--fire)"/>

                            <text class="node-icon" dy="1">🌋</text>
                            <text class="node-label-shadow" y="-28">Rolling Magma</text>

                        <g class="node-group" data-skill="pounds" transform="translate(950, 500)">
                            <circle class="node-ring" r="22" stroke="var(--text-dim)"/>

            "infernal-cry": { name: "Infernal Cry", type: "Buff — Warcry", role: "Warcry that buffs Mace Strike and Rolling Slam for massive physical hits.", supports: ["Tireless", "Armor Explosion"], color: "physical" },

            "rolling-slam": { name: "Rolling Slam", type: "Burst — AoE Slam", role: "AoE slam. Uses Rage built by Mace Strike for big AoE physical burst.", supports: ["Fist of War", "Magnified Area"], color: "physical" },
            "bone-shatter": { name: "Bone Shatter", type: "Burst — Stun/Physical", role: "Stun damage. Needs Stun + Brutality supports to realize its potential.", supports: [], color: "physical" },
            "raise-shield":  { name: "Raise Shield", type: "Defensive — Block", role: "Block stance. Defensive backbone of the Mace+Shield build.", supports: ["Vanguard"], color: "utility" },
            "rend":         { name: "Rend", type: "DoT — Physical Bleed", role: "Bleed damage over time. Stacks physical pressure.", supports: ["Rage"], color: "physical" },
            "wing-blast":   { name: "Wing Blast", type: "Utility — Charge", role: "Charge generation utility. Feeds into Infernal Cry and Savage Fury.", supports: ["Magnified Area", "Charge Profusion"], color: "utility" },
            "savage-fury":  { name: "Savage Fury", type: "Buff — Duration", role: "Duration buff. Sustains the Wyvern set's elemental onslaught.", supports: ["Prolonged Duration", "Efficacy"], color: "fire" },
            "thunderstorm": { name: "Thunderstorm", type: "AoE — Lightning", role: "AoE lightning. Shared between sets. Needs Lightning Penetration.", supports: ["Magnified Area"], color: "fire" },
            "the-vower":    { name: "The Vower", type: "Sustained — Spark", role: "Sustained spark damage. Empowered Sparks + Thrill of the Kill.", supports: ["Empowered Sparks", "Thrill of the Kill"], color: "fire" },
            "rolling-magma": { name: "Rolling Magma", type: "AoE — Fire", role: "AoE fire. Ignite Proliferation turns every hit into AoE clear.", supports: ["Magnified Area", "Multi Shot"], color: "fire" },
            "pounds":       { name: "Pounds", type: "Attack — Physical", role: "Physical attack. Utility filler.", supports: [], color: "utility" }
        };

        const colorMap = { physical: 'var(--physical)', utility: 'var(--utility)', fire: 'var(--fire)' };
        const tagClass = { physical: 'physical', utility: 'gold', fire: '' };

        function initSkillTreeTooltips() {
            const tooltip = document.getElementById('tooltip');

            document.querySelectorAll('#svg-vanito .node-group[data-skill]').forEach(node => {
                const key = node.getAttribute('data-skill');
                const skill = vanitoSkills[key];
                if (!skill) return;

                node.addEventListener('mouseenter', e => {
                    const supportTags = skill.supports.length > 0
                        ? skill.supports.map(s => `<span class="tooltip-support-tag ${tagClass[skill.color] || ''}">${s}</span>`).join('')
                        : '<span style="color:var(--text-dim); font-size:0.8em; font-style:italic;">No supports yet</span>';
                    tooltip.innerHTML = `
                        <div class="tooltip-name" style="color:${colorMap[skill.color]}">${skill.name}</div>
                        <div class="tooltip-type">${skill.type}</div>
                        <div class="tooltip-role">${skill.role}</div>
                        <div style="font-size:0.75em; color:var(--text-dim); margin-bottom:4px;">SUPPORT GEMS:</div>
                        <div class="tooltip-supports">${supportTags}</div>
                    `;
                    tooltip.classList.add('visible');
                });
                node.addEventListener('mousemove', e => {
                    tooltip.style.left = (e.clientX + 16) + 'px';
                    tooltip.style.top = (e.clientY - 10) + 'px';
                });
                node.addEventListener('mouseleave', () => tooltip.classList.remove('visible'));
            });
        }

        // ═══════════════════════════════════════════════════════════
        //  SKILL TREE ANIMATIONS
        // ═══════════════════════════════════════════════════════════
        function initSkillTreeAnimations() {
            requestAnimationFrame(() => {
                document.querySelectorAll('.node-group').forEach((node, i) => {
                    node.style.opacity = '0';
                    node.style.transition = `opacity 0.4s ease ${i * 0.05}s`;
                    requestAnimationFrame(() => { node.style.opacity = '1'; });
                });
            });
        }

        // ═══════════════════════════════════════════════════════════
        //  INIT
        // ═══════════════════════════════════════════════════════════
        loadBuild();
        setInterval(loadBuild, 30000);
    </script>
