                {id:"asc3",name:"Tempest Soul",type:"ascendancy",x:1210,y:360,radius:14,description:"Gain +1% Lightning Damage per Level",stats:{dmgPerLevel:1},connections:["asc1"],allocated:false},
                {id:"asc4",name:"Monk of the Storm",type:"ascendancy",x:1140,y:180,radius:16,description:"Channeling lightning spells generates mana",stats:{manaOnChannel:true},connections:["asc2"],allocated:false},
                {id:"asc5",name:"Divine Lightning",type:"ascendancy",x:1280,y:300,radius:18,description:"Lightning skills ignore enemy Lightning Resistance",stats:{ignoreLightningRes:true},connections:["asc2","asc3"],allocated:false},
                {id:"n38",name:"Elemental Touch",type:"basic",x:700,y:260,radius:10,description:"+8% Elemental Damage",stats:{elemDmg:8},connections:["n2","n12"],allocated:false},
                {id:"n39",name:"Spell Power",type:"basic",x:500,y:260,radius:10,description:"+10% Spell Damage",stats:{spellDmg:10},connections:["n26","n43"],allocated:false},
                {id:"n40",name:"Deep Wounds",type:"basic",x:650,y:520,radius:10,description:"+8% Physical Damage",stats:{physDmg:8},connections:["n14","n24"],allocated:false},
                {id:"n41",name:"Mystic Edge",type:"basic",x:580,y:290,radius:10,description:"+8% Weapon Damage",stats:{weaponDmg:8},connections:["n25","n39"],allocated:false},
                {id:"n42",name:"Endurance Charge",type:"basic",x:580,y:510,radius:10,description:"Grants 1 Endurance Charge on Kill",stats:{endCharge:1},connections:["n14","n40"],allocated:false},
                {id:"n43",name:"Mana Flow",type:"notable",x:440,y:200,radius:14,description:"+20% Mana Regen, +30 Mana",stats:{manaRegen:20,flatMana:30},connections:["n12","n39"],allocated:false},
                {id:"n44",name:"Arcane Surge",type:"basic",x:460,y:560,radius:10,description:"+8% Spell Damage when leeching",stats:{spellDmgOnLeech:8},connections:["n36","n42"],allocated:false},
                {id:"n45",name:"Energized",type:"basic",x:350,y:620,radius:10,description:"+10% Energy Shield",stats:{energyShield:10},connections:["n44"],allocated:false}
            ];

            // State
            let ppTotalPoints = 123;
            let ppZoom = 1;
            let ppPanX = 0, ppPanY = 0;
            let ppIsDragging = false;
            let ppDragStartX = 0, ppDragStartY = 0;
            let ppPanStartX = 0, ppPanStartY = 0;
            let ppHoveredNode = null;
            let ppAnimTime = 0;
            let ppNeedsRedraw = true;
            let ppMouseDown = false;
            let ppMouseMoved = false;
            let ppRenderLoopId = null;

            // Adjacency map
            const ppAdjMap = {};
            ppNodes.forEach(n => { ppAdjMap[n.id] = new Set(n.connections); });

            // Canvas sizing
            function ppResizeCanvas() {
                const dpr = window.devicePixelRatio || 1;
                const rect = ppCanvasWrap.getBoundingClientRect();
                ppCanvas.width = rect.width * dpr;
                ppCanvas.height = rect.height * dpr;
                ppCanvas.style.width = rect.width + 'px';
                ppCanvas.style.height = rect.height + 'px';
                ppCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
                ppNeedsRedraw = true;
            }

            // Coordinate transforms
            function ppWorldToScreen(wx, wy) {
                const cw = ppCanvas.width / (window.devicePixelRatio || 1);
                const ch = ppCanvas.height / (window.devicePixelRatio || 1);
                return { x: (wx - ppPanX) * ppZoom + cw / 2, y: (wy - ppPanY) * ppZoom + ch / 2 };
            }
            function ppScreenToWorld(sx, sy) {
                const cw = ppCanvas.width / (window.devicePixelRatio || 1);
                const ch = ppCanvas.height / (window.devicePixelRatio || 1);
                return { x: (sx - cw / 2) / ppZoom + ppPanX, y: (sy - ch / 2) / ppZoom + ppPanY };
            }

            // Tree logic
            function ppGetAllocated() {
                return new Set(ppNodes.filter(n => n.allocated).map(n => n.id));
            }

            function ppCanAllocate(nodeId) {
                const allocated = ppGetAllocated();
                const adj = ppAdjMap[nodeId];
                if (!adj) return false;
                for (const neighbor of adj) {
                    if (allocated.has(neighbor)) return true;
                }
                return false;
            }

            function ppAllocateNode(nodeId) {
                const node = ppNodes.find(n => n.id === nodeId);
                if (!node || node.allocated) return false;
                if (!ppCanAllocate(nodeId)) return false;
                const allocated = ppGetAllocated();
                const currentPts = allocated.size - 1;
                if (currentPts >= ppTotalPoints) {
                    ppShowToast('⚠️ No points available!');
                    return false;
                }
                node.allocated = true;
                ppNeedsRedraw = true;
                ppUpdateUI();
                return true;
            }

            function ppDeallocateNode(nodeId) {
                if (nodeId === 'start') return false;
                const node = ppNodes.find(n => n.id === nodeId);
                if (!node || !node.allocated) return false;
                node.allocated = false;
                const stillConnected = new Set(['start']);
                const queue = ['start'];
                while (queue.length > 0) {
                    const current = queue.shift();
                    for (const neighbor of ppAdjMap[current] || []) {
                        const n = ppNodes.find(nd => nd.id === neighbor);
                        if (n && n.allocated && !stillConnected.has(neighbor)) {
                            stillConnected.add(neighbor);
                            queue.push(neighbor);
                        }
                    }
                }
                ppNodes.forEach(n => {
                    if (n.allocated && n.id !== 'start' && !stillConnected.has(n.id)) {
                        n.allocated = false;
                    }
                });
                ppNeedsRedraw = true;
                ppUpdateUI();
                return true;
            }

            // Rendering
            function ppDrawNode(node) {
                const pos = ppWorldToScreen(node.x, node.y);
                const r = node.radius * ppZoom;
                const allocated = node.allocated;
                const isHovered = ppHoveredNode && ppHoveredNode.id === node.id;
                const candidate = !allocated && ppCanAllocate(node.id);

                if (allocated) {
                    let glowColor;
                    if (node.type === 'keystone') glowColor = ppCOLORS.keystoneGlow;
                    else if (node.type === 'ascendancy') glowColor = ppCOLORS.ascendGlow;
                    else if (node.type === 'start') glowColor = ppCOLORS.startGlow;
                    else glowColor = 'rgba(201,168,76,0.3)';
                    const grad = ppCtx.createRadialGradient(pos.x, pos.y, r, pos.x, pos.y, r * 2.5);
                    grad.addColorStop(0, glowColor);
                    grad.addColorStop(1, 'transparent');
                    ppCtx.fillStyle = grad;
                    ppCtx.beginPath();
                    ppCtx.arc(pos.x, pos.y, r * 2.5, 0, Math.PI * 2);
                    ppCtx.fill();
                } else if (candidate) {
                    const pulse = 0.15 + 0.1 * Math.sin(ppAnimTime * 3);
                    const grad = ppCtx.createRadialGradient(pos.x, pos.y, r, pos.x, pos.y, r * 2.2);
                    grad.addColorStop(0, `rgba(201,168,76,${pulse})`);
                    grad.addColorStop(1, 'transparent');
                    ppCtx.fillStyle = grad;
                    ppCtx.beginPath();
                    ppCtx.arc(pos.x, pos.y, r * 2.2, 0, Math.PI * 2);
                    ppCtx.fill();
                }

                if (isHovered) {
                    const grad = ppCtx.createRadialGradient(pos.x, pos.y, r, pos.x, pos.y, r * 2);
                    grad.addColorStop(0, ppCOLORS.hoverGlow);
                    grad.addColorStop(1, 'transparent');
                    ppCtx.fillStyle = grad;
                    ppCtx.beginPath();
                    ppCtx.arc(pos.x, pos.y, r * 2, 0, Math.PI * 2);
                    ppCtx.fill();
                }

                ppCtx.beginPath();
                ppCtx.arc(pos.x, pos.y, r, 0, Math.PI * 2);

                if (node.type === 'start') {
                    ppCtx.fillStyle = allocated ? ppCOLORS.startFill : '#0a0a12';
                    ppCtx.fill();
                    ppCtx.strokeStyle = ppCOLORS.startStroke;
                    ppCtx.lineWidth = allocated ? 3 : 1.5;
                    ppCtx.stroke();
                    if (allocated) {
                        const ig = ppCtx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, r);
                        ig.addColorStop(0, 'rgba(126,184,255,0.3)');
                        ig.addColorStop(1, 'transparent');
                        ppCtx.fillStyle = ig;
                        ppCtx.fill();
                    }
                } else if (node.type === 'keystone') {
                    ppCtx.fillStyle = allocated ? 'rgba(255,107,107,0.15)' : ppCOLORS.keystoneFill;
                    ppCtx.fill();
                    ppCtx.strokeStyle = allocated ? ppCOLORS.keystoneStroke : '#6a3a3a';
                    ppCtx.lineWidth = allocated ? 3 : 2;
                    ppCtx.stroke();
                    if (allocated) {
                        const ig = ppCtx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, r);
                        ig.addColorStop(0, 'rgba(255,107,107,0.4)');
                        ig.addColorStop(1, 'transparent');
                        ppCtx.fillStyle = ig;
                        ppCtx.fill();
                    }
                } else if (node.type === 'notable') {
                    ppCtx.fillStyle = allocated ? ppCOLORS.notableFillAlloc : ppCOLORS.notableFill;
                    ppCtx.fill();
                    ppCtx.strokeStyle = allocated ? ppCOLORS.notableStroke : '#6a5a3a';
                    ppCtx.lineWidth = allocated ? 2.5 : 1.5;
                    ppCtx.stroke();
                } else if (node.type === 'ascendancy') {
                    ppCtx.fillStyle = allocated ? 'rgba(192,132,252,0.15)' : ppCOLORS.ascendFill;
                    ppCtx.fill();
                    ppCtx.strokeStyle = allocated ? ppCOLORS.ascendStroke : '#6a4a8a';
                    ppCtx.lineWidth = allocated ? 2.5 : 1.5;
                    ppCtx.stroke();
                    if (allocated) {
                        const ig = ppCtx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, r);
                        ig.addColorStop(0, 'rgba(192,132,252,0.35)');
                        ig.addColorStop(1, 'transparent');
                        ppCtx.fillStyle = ig;
                        ppCtx.fill();
                    }
                } else {
                    ppCtx.fillStyle = allocated ? ppCOLORS.basicFillAlloc : ppCOLORS.basicFill;
                    ppCtx.fill();
                    ppCtx.strokeStyle = allocated ? ppCOLORS.basicStrokeAlloc : ppCOLORS.basicStroke;
                    ppCtx.lineWidth = allocated ? 2 : 1;
                    ppCtx.stroke();
                }

                if (allocated && node.type !== 'start' && r > 6) {
                    ppCtx.strokeStyle = '#fff';
                    ppCtx.lineWidth = Math.max(1.5, r * 0.15);
                    ppCtx.lineCap = 'round';
                    ppCtx.lineJoin = 'round';
                    ppCtx.beginPath();
                    ppCtx.moveTo(pos.x - r * 0.35, pos.y);
                    ppCtx.lineTo(pos.x - r * 0.05, pos.y + r * 0.3);
                    ppCtx.lineTo(pos.x + r * 0.4, pos.y - r * 0.25);
                    ppCtx.stroke();
                }
            }

            function ppDrawConnections() {
                const drawnPairs = new Set();
                ppNodes.forEach(node => {
                    node.connections.forEach(connId => {
                        const pairKey = [node.id, connId].sort().join('-');
                        if (drawnPairs.has(pairKey)) return;
                        drawnPairs.add(pairKey);
                        const other = ppNodes.find(n => n.id === connId);
                        if (!other) return;
                        const p1 = ppWorldToScreen(node.x, node.y);
                        const p2 = ppWorldToScreen(other.x, other.y);
                        const bothAlloc = node.allocated && other.allocated;
                        const eitherHover = (ppHoveredNode && (ppHoveredNode.id === node.id || ppHoveredNode.id === connId) && (node.allocated || other.allocated));
                        ppCtx.beginPath();
                        ppCtx.moveTo(p1.x, p1.y);
                        ppCtx.lineTo(p2.x, p2.y);
                        if (bothAlloc) {
                            ppCtx.strokeStyle = ppCOLORS.lineAlloc;
                            ppCtx.lineWidth = 2.5 * ppZoom;
                        } else if (eitherHover) {
                            ppCtx.strokeStyle = ppCOLORS.lineHover;
                            ppCtx.lineWidth = 2 * ppZoom;
                        } else {
                            ppCtx.strokeStyle = ppCOLORS.line;
                            ppCtx.lineWidth = 1 * ppZoom;
                        }
                        ppCtx.stroke();
                    });
                });
            }

            function ppDrawNodeLabel(node) {
                if (!node.allocated && node.type !== 'start') return;
                if (ppZoom < 0.5 && node.type === 'basic') return;
                const pos = ppWorldToScreen(node.x, node.y);
                const r = node.radius * ppZoom;
                ppCtx.font = `${Math.max(9, Math.min(11, 11 * ppZoom))}px 'Segoe UI', system-ui, sans-serif`;
                ppCtx.textAlign = 'center';
                ppCtx.fillStyle = node.type === 'start' ? ppCOLORS.startStroke : ppCOLORS.text;
                ppCtx.globalAlpha = Math.min(1, (ppZoom - 0.3) / 0.3);
                ppCtx.fillText(node.name, pos.x, pos.y + r + 12 * ppZoom);
                ppCtx.globalAlpha = 1;
            }

            function ppDrawGrid() {
                const cw = ppCanvas.width / (window.devicePixelRatio || 1);
                const ch = ppCanvas.height / (window.devicePixelRatio || 1);
                const gridSize = 60 * ppZoom;
                if (gridSize < 15) return;
                const tl = ppScreenToWorld(0, 0);
                const br = ppScreenToWorld(cw, ch);
                const startX = Math.floor(tl.x / 60) * 60;
                const startY = Math.floor(tl.y / 60) * 60;
                ppCtx.strokeStyle = ppCOLORS.grid;
                ppCtx.lineWidth = 1;
                for (let x = startX; x <= br.x; x += 60) {
                    const sx = ppWorldToScreen(x, 0).x;
                    ppCtx.beginPath(); ppCtx.moveTo(sx, 0); ppCtx.lineTo(sx, ch); ppCtx.stroke();
                }
                for (let y = startY; y <= br.y; y += 60) {
                    const sy = ppWorldToScreen(0, y).y;
                    ppCtx.beginPath(); ppCtx.moveTo(0, sy); ppCtx.lineTo(cw, sy); ppCtx.stroke();
                }
            }

            function ppRender(timestamp) {
                ppAnimTime = timestamp / 1000;
                const cw = ppCanvas.width / (window.devicePixelRatio || 1);
                const ch = ppCanvas.height / (window.devicePixelRatio || 1);
                ppCtx.fillStyle = ppCOLORS.bg;
                ppCtx.fillRect(0, 0, cw, ch);
                ppDrawGrid();
                ppDrawConnections();
                const startNode = ppNodes.find(n => n.id === 'start');
                ppNodes.filter(n => n.id !== 'start').forEach(ppDrawNode);
                if (startNode) ppDrawNode(startNode);
                ppNodes.forEach(ppDrawNodeLabel);
                if (ppZoom > 0.4) {
                    const ascLabelPos = ppWorldToScreen(1210, 145);
                    ppCtx.font = `bold ${Math.max(10, 12 * ppZoom)}px 'Cinzel', serif`;
                    ppCtx.textAlign = 'center';
                    ppCtx.fillStyle = ppCOLORS.ascendStroke;
                    ppCtx.globalAlpha = 0.7;
                    ppCtx.fillText('⚡ ASCENDANCY ⚡', ascLabelPos.x, ascLabelPos.y);
                    ppCtx.globalAlpha = 1;
                }
                ppRenderLoopId = requestAnimationFrame(ppRender);
            }

            // Interaction
            function ppGetNodeAt(sx, sy) {
                const world = ppScreenToWorld(sx, sy);
                let closest = null;
                let closestDist = Infinity;
                for (const node of ppNodes) {
                    const dx = node.x - world.x;
                    const dy = node.y - world.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const hitRadius = Math.max(node.radius + 5, node.radius * 1.5);
                    if (dist < hitRadius && dist < closestDist) {
                        closest = node;
                        closestDist = dist;
                    }
                }
                return closest;
            }

            ppCanvas.addEventListener('mousedown', e => {
                ppMouseDown = true;
                ppMouseMoved = false;
                ppIsDragging = false;
                ppDragStartX = e.clientX;
                ppDragStartY = e.clientY;
                ppPanStartX = ppPanX;
                ppPanStartY = ppPanY;
            });

            ppCanvas.addEventListener('mousemove', e => {
                const rect = ppCanvas.getBoundingClientRect();
                const sx = e.clientX - rect.left;
                const sy = e.clientY - rect.top;
                if (ppMouseDown) {
                    const dx = e.clientX - ppDragStartX;
                    const dy = e.clientY - ppDragStartY;
                    if (Math.abs(dx) > 3 || Math.abs(dy) > 3) {
                        ppMouseMoved = true;
                        ppIsDragging = true;
                        ppCanvas.classList.add('dragging');
                    }
                    if (ppIsDragging) {
                        ppPanX = ppPanStartX - dx / ppZoom;
                        ppPanY = ppPanStartY - dy / ppZoom;
                        ppNeedsRedraw = true;
                    }
                } else {
                    const node = ppGetNodeAt(sx, sy);
                    if (node !== ppHoveredNode) {
                        ppHoveredNode = node;
                        ppNeedsRedraw = true;
                        ppUpdateNodeInfo(node);
                    }
                }
            });

            ppCanvas.addEventListener('mouseup', e => {
                const wasDown = ppMouseDown;
                const wasDrag = ppIsDragging;
                ppMouseDown = false;
                ppIsDragging = false;
                ppCanvas.classList.remove('dragging');
                if (wasDown && !wasDrag && !ppMouseMoved) {
                    const rect = ppCanvas.getBoundingClientRect();
                    const sx = e.clientX - rect.left;
                    const sy = e.clientY - rect.top;
                    const node = ppGetNodeAt(sx, sy);
                    if (node) {
                        if (node.allocated) ppDeallocateNode(node.id);
                        else ppAllocateNode(node.id);
                    }
                }
            });

            ppCanvas.addEventListener('mouseleave', () => {
                ppMouseDown = false;
                ppIsDragging = false;
                ppCanvas.classList.remove('dragging');
            });

            ppCanvas.addEventListener('dblclick', e => {
                const rect = ppCanvas.getBoundingClientRect();
                const sx = e.clientX - rect.left;
                const sy = e.clientY - rect.top;
                const node = ppGetNodeAt(sx, sy);
                if (node) {
                    ppPanX = node.x;
                    ppPanY = node.y;
                    ppZoom = Math.min(ppZoom * 2, 3);
                } else {
                    const world = ppScreenToWorld(sx, sy);
                    ppPanX = world.x;
                    ppPanY = world.y;
                    ppZoom = Math.min(ppZoom * 2, 3);
                }
                ppNeedsRedraw = true;
            });

            ppCanvas.addEventListener('wheel', e => {
                e.preventDefault();
                const rect = ppCanvas.getBoundingClientRect();
                const sx = e.clientX - rect.left;
                const sy = e.clientY - rect.top;
                const worldBefore = ppScreenToWorld(sx, sy);
                const factor = e.deltaY > 0 ? 0.9 : 1.1;
                ppZoom = Math.max(0.15, Math.min(5, ppZoom * factor));
                const screenAfter = ppWorldToScreen(worldBefore.x, worldBefore.y);
                ppPanX -= (screenAfter.x - sx) / ppZoom;
                ppPanY -= (screenAfter.y - sy) / ppZoom;
                ppNeedsRedraw = true;
            }, { passive: false });

            // Touch support
            let ppLastTouchDist = 0;
            ppCanvas.addEventListener('touchstart', e => {
                if (e.touches.length === 1) {
                    ppMouseDown = true;
                    ppMouseMoved = false;
                    ppIsDragging = false;
                    ppDragStartX = e.touches[0].clientX;
                    ppDragStartY = e.touches[0].clientY;
                    ppPanStartX = ppPanX;
                    ppPanStartY = ppPanY;
                } else if (e.touches.length === 2) {
                    const dx = e.touches[0].clientX - e.touches[1].clientX;
                    const dy = e.touches[0].clientY - e.touches[1].clientY;
                    ppLastTouchDist = Math.sqrt(dx*dx + dy*dy);
                }
            }, {passive:false});

            ppCanvas.addEventListener('touchmove', e => {
                e.preventDefault();
                if (e.touches.length === 1 && ppMouseDown) {
                    const dx = e.touches[0].clientX - ppDragStartX;
                    const dy = e.touches[0].clientY - ppDragStartY;
                    if (Math.abs(dx) > 3 || Math.abs(dy) > 3) {
                        ppMouseMoved = true;
                        ppIsDragging = true;
                    }
                    if (ppIsDragging) {
                        ppPanX = ppPanStartX - dx / ppZoom;
                        ppPanY = ppPanStartY - dy / ppZoom;
                        ppNeedsRedraw = true;
                    }
                } else if (e.touches.length === 2) {
                    const dx = e.touches[0].clientX - e.touches[1].clientX;
                    const dy = e.touches[0].clientY - e.touches[1].clientY;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (ppLastTouchDist > 0) {
                        ppZoom = Math.max(0.15, Math.min(5, ppZoom * (dist / ppLastTouchDist)));
                        ppNeedsRedraw = true;
                    }
                    ppLastTouchDist = dist;
                }
            }, {passive:false});

            ppCanvas.addEventListener('touchend', e => {
                if (e.touches.length === 0) {
                    if (ppMouseDown && !ppIsDragging && !ppMouseMoved) {
                        const rect = ppCanvas.getBoundingClientRect();
                        const sx = ppDragStartX - rect.left;
                        const sy = ppDragStartY - rect.top;
                        const node = ppGetNodeAt(sx, sy);
                        if (node) {
                            if (node.allocated) ppDeallocateNode(node.id);
                            else ppAllocateNode(node.id);
                        }
                    }
                    ppMouseDown = false;
                    ppIsDragging = false;
                    ppLastTouchDist = 0;
                }
            });

            // UI updates
            function ppUpdateUI() {
                const allocated = ppGetAllocated();
                const ptsUsed = allocated.size - 1;
                const ptsAvail = ppTotalPoints;
                document.getElementById('pp-pts-count').textContent = ptsUsed;
                document.getElementById('pp-pts-count').className = 'pp-pts-count' + (ptsUsed >= ptsAvail ? ' warn' : '');
                const pct = Math.min(100, (ptsUsed / ptsAvail) * 100);
                document.getElementById('pp-progress-bar').style.width = pct + '%';
            }

            function ppUpdateNodeInfo(node) {
                const detail = document.getElementById('pp-node-detail');
                if (!node) {
                    detail.innerHTML = '<div class="nd-empty">Hover over a node to see details</div>';
                    return;
                }
                const typeLabel = {start:'Start',basic:'Basic',notable:'Notable',keystone:'Keystone',ascendancy:'Ascendancy'}[node.type] || node.type;
                const typeColor = {
                    start: ppCOLORS.startStroke,
                    basic: '#aaa',
                    notable: ppCOLORS.notableStroke,
                    keystone: ppCOLORS.keystoneStroke,
                    ascendancy: ppCOLORS.ascendStroke
                }[node.type] || '#aaa';
                let statsHTML = '';
                if (node.stats && Object.keys(node.stats).length > 0) {
                    statsHTML = Object.entries(node.stats).map(([k, v]) => {
                        const label = k.replace(/([A-Z])/g, ' $1').replace(/^./, s => s.toUpperCase());
                        return `<span style="color:var(--lightning)">${label}: ${v}${typeof v === 'number' && k !== 'flatLife' && k !== 'flatMana' ? '%' : ''}</span>`;
                    }).join(' &nbsp;|&nbsp; ');
                }
                detail.innerHTML = `
                    <div class="nd-name">${node.name} ${node.allocated ? '✅' : ''}</div>
                    <div class="nd-type" style="color:${typeColor}">${typeLabel}</div>
                    <div class="nd-desc">${node.description}</div>
                    ${statsHTML ? '<div style="margin-top:4px;font-size:12px">' + statsHTML + '</div>' : ''}
                `;
            }

            // Zoom controls
            window.ppZoomBy = function(factor) {
                ppZoom = Math.max(0.15, Math.min(5, ppZoom * factor));
                ppNeedsRedraw = true;
            };

            window.ppFitTree = function() {
                let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
                ppNodes.forEach(n => {
                    if (n.x < minX) minX = n.x;
                    if (n.y < minY) minY = n.y;
                    if (n.x > maxX) maxX = n.x;
                    if (n.y > maxY) maxY = n.y;
                });
                const cw = ppCanvas.width / (window.devicePixelRatio || 1);
                const ch = ppCanvas.height / (window.devicePixelRatio || 1);
                const treeW = maxX - minX + 100;
                const treeH = maxY - minY + 100;
                const scaleX = cw / treeW;
                const scaleY = ch / treeH;
                ppZoom = Math.min(scaleX, scaleY) * 0.85;
                ppZoom = Math.max(0.15, Math.min(5, ppZoom));
                ppPanX = (minX + maxX) / 2;
                ppPanY = (minY + maxY) / 2;
                ppNeedsRedraw = true;
            };

            // Build management
            window.ppExportBuild = function() {
                const allocated = ppNodes.filter(n => n.allocated).map(n => n.id);
                const text = 'Lightning Monk Build\n' +
                    `Points Used: ${allocated.length - 1}\n` +
                    `Nodes: ${allocated.join(', ')}`;
                navigator.clipboard.writeText(text).then(() => {
                    ppShowToast('Build copied to clipboard!');
                }).catch(() => {
                    const ta = document.createElement('textarea');
                    ta.value = text;
                    document.body.appendChild(ta);
                    ta.select();
                    document.execCommand('copy');
                    document.body.removeChild(ta);
                    ppShowToast('Build copied to clipboard!');
                });
            };

            window.ppOpenImport = function() {
                document.getElementById('pp-import-overlay').classList.add('open');
                document.getElementById('pp-import-text').value = '';
                document.getElementById('pp-import-text').focus();
            };

            window.ppCloseImport = function() {
                document.getElementById('pp-import-overlay').classList.remove('open');
            };

            window.ppDoImport = function() {
                const raw = document.getElementById('pp-import-text').value.trim();
                if (!raw) return;
                const ids = raw.split(',').map(s => s.trim()).filter(Boolean);
                ppNodes.forEach(n => { n.allocated = (n.id === 'start'); });
                let successCount = 0;
                for (const id of ids) {
                    if (ppAllocateNode(id)) successCount++;
                }
                ppCloseImport();
                ppShowToast(`Imported ${successCount} nodes!`);
            };

            window.ppSaveToStorage = function() {
                const data = ppNodes.map(n => n.allocated);
                localStorage.setItem('poe2_passive_build', JSON.stringify(data));
                localStorage.setItem('poe2_passive_pts', ppTotalPoints);
                ppShowToast('Build saved to localStorage!');
            };

            window.ppResetBuild = function() {
                ppNodes.forEach(n => { n.allocated = (n.id === 'start'); });
                ppNeedsRedraw = true;
                ppUpdateUI();
                ppShowToast('Tree reset!');
            };

            // Toast
            function ppShowToast(msg) {
                const toast = document.getElementById('pp-toast');
                toast.textContent = msg;
                toast.classList.add('show');
                clearTimeout(toast._timeout);
                toast._timeout = setTimeout(() => toast.classList.remove('show'), 2000);
            }

            // Points input
            document.getElementById('pp-pts-input').addEventListener('change', e => {
                ppTotalPoints = Math.max(0, parseInt(e.target.value) || 0);
                ppUpdateUI();
            });

            // Keyboard shortcuts
            document.addEventListener('keydown', e => {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
                const passiveTab = document.getElementById('panel-passive');
                if (!passiveTab.classList.contains('active')) return;
                if (e.key === 'r' || e.key === 'R') ppResetBuild();
                if (e.key === 'f' || e.key === 'F') ppFitTree();
                if (e.key === 'Escape') ppCloseImport();
            });

            // Expose resize for tab switching
            window.ppResizeCanvas = ppResizeCanvas;

            // Init
            ppResizeCanvas();
            ppLoadFromStorage();
            ppUpdateUI();
            ppFitTree();
            ppRenderLoopId = requestAnimationFrame(ppRender);

            function ppLoadFromStorage() {
                try {
                    const data = localStorage.getItem('poe2_passive_build');
                    const pts = localStorage.getItem('poe2_passive_pts');
                    if (data) {
                        const allocs = JSON.parse(data);
                        ppNodes.forEach((n, i) => { n.allocated = allocs[i] || false; });
                    }
                    if (pts) {
                        ppTotalPoints = parseInt(pts) || 123;
                        document.getElementById('pp-pts-input').value = ppTotalPoints;
                    }
                } catch (e) {}
            }
        }

        // ═══════════════════════════════════════════════════════════
        //  INIT
        // ═══════════════════════════════════════════════════════════
        loadBuild();
        setInterval(loadBuild, 30000);
    </script>
</body>
</html>
