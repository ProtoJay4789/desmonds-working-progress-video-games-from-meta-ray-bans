<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GenTech Dashboard — Data Visualization Platform</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c9a84c;
            --gold-dim: #8b6914;
            --gold-glow: rgba(201, 168, 76, 0.4);
            --lightning: #7eb8ff;
            --lightning-glow: rgba(126, 184, 255, 0.35);
            --physical: #e05555;
            --physical-glow: rgba(224, 85, 85, 0.35);
            --utility: #c9a84c;
            --utility-glow: rgba(201, 168, 76, 0.35);
            --fire: #ff6b35;
            --fire-glow: rgba(255, 107, 53, 0.35);
            --dark-bg: #0a0a0f;
            --panel-bg: #12121a;
            --panel-border: #1e1e2e;
            --text: #d4d4d4;
            --text-dim: #6b6b7b;
            --danger: #ff4444;
            --success: #44ff88;
            --mana-blue: #3b82f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--dark-bg);
            color: var(--text);
            font-family: 'Crimson Text', serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(ellipse at 20% 20%, rgba(126, 184, 255, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(126, 184, 255, 0.02) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* ── Header ── */
        .header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 1px solid var(--panel-border);
            margin-bottom: 20px;
            position: relative;
        }

        .header::after {
            content: '⚡';
            position: absolute;
            bottom: -12px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--dark-bg);
            padding: 0 15px;
            font-size: 20px;
        }

        .header h1 {
            font-family: 'Cinzel', serif;
            font-size: 2.5em;
            font-weight: 900;
            color: var(--gold);
            text-shadow: 0 0 30px rgba(201, 168, 76, 0.3);
            letter-spacing: 3px;
        }

        .header .subtitle {
            color: var(--text-dim);
            font-size: 1.1em;
            margin-top: 8px;
            font-style: italic;
        }

        .header .patch-badge {
            display: inline-block;
            background: rgba(126, 184, 255, 0.1);
            border: 1px solid rgba(126, 184, 255, 0.3);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            color: var(--lightning);
            margin-top: 10px;
        }

        .header .last-updated {
            color: var(--text-dim);
            font-size: 0.8em;
            margin-top: 8px;
        }

        /* ── Character Card ── */
        .character-card {
            background: linear-gradient(135deg, var(--panel-bg) 0%, #151520 100%);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
            position: relative;
            overflow: hidden;
        }

        /* Character selector tabs */
        .char-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            padding: 4px;
            background: rgba(255,255,255,0.04);
            border-radius: 10px;
        }
        .char-btn {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            background: transparent;
            color: var(--text-dim);
            font-family: 'Cinzel', serif;
            font-size: 0.85em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .char-btn:hover {
            border-color: var(--gold-dim);
            color: var(--gold);
        }
        .char-btn.active {
            background: rgba(201, 168, 76, 0.12);
            border-color: var(--gold);
            color: var(--gold);
            box-shadow: 0 0 12px rgba(201, 168, 76, 0.2);
        }

        .character-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--lightning), transparent);
            opacity: 0.6;
        }

        .character-name {
            font-family: 'Cinzel', serif;
            font-size: 1.8em;
            color: var(--gold);
            margin-bottom: 5px;
        }

        .character-class {
            color: var(--lightning);
            font-size: 1.1em;
            margin-bottom: 15px;
        }

        .character-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .stat-box {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            padding: 12px;
            text-align: center;
        }

        .stat-box .label {
            color: var(--text-dim);
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-box .value {
            font-family: 'Cinzel', serif;
            font-size: 1.4em;
            color: var(--gold);
            margin-top: 4px;
        }

        .stat-box .value.lightning { color: var(--lightning); }
        .stat-box .value.mana { color: var(--mana-blue); }

        /* ── Progress Section ── */
        .progress-section {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
        }

        .progress-section h2 {
            font-family: 'Cinzel', serif;
            font-size: 1.3em;
            color: var(--gold);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .progress-bar-container {
            margin-bottom: 18px;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-size: 0.95em;
        }

        .progress-label .name { color: var(--text); }
        .progress-label .percent { color: var(--gold); font-family: 'Cinzel', serif; }

        .progress-bar {
            height: 20px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--panel-border);
        }

        .progress-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 1.5s ease-out;
            position: relative;
        }

        .progress-fill.campaign { background: linear-gradient(90deg, var(--gold-dim), var(--gold)); box-shadow: 0 0 15px rgba(201, 168, 76, 0.3); }
        .progress-fill.level { background: linear-gradient(90deg, #2563eb, var(--lightning)); box-shadow: 0 0 15px rgba(126, 184, 255, 0.3); }
        .progress-fill.build { background: linear-gradient(90deg, #7c3aed, #a855f7); box-shadow: 0 0 15px rgba(168, 85, 247, 0.3); }
        .progress-fill.gems { background: linear-gradient(90deg, #059669, #34d399); box-shadow: 0 0 15px rgba(52, 211, 153, 0.3); }

        /* ── Skills Section ── */
        .skills-section {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
        }

        .skills-section h2 {
            font-family: 'Cinzel', serif;
            font-size: 1.3em;
            color: var(--gold);
            margin-bottom: 20px;
        }

        .skill-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
        }

        .skill-card {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--panel-border);
            border-radius: 10px;
            padding: 18px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .skill-card:hover {
            border-color: var(--lightning);
            box-shadow: 0 0 20px rgba(126, 184, 255, 0.1);
            transform: translateY(-2px);
        }

        .skill-card.primary { border-color: var(--gold-dim); }

        .skill-card.primary::before {
            content: '⚡ PRIMARY';
            position: absolute;
            top: 8px;
            right: 8px;
            font-size: 0.65em;
            color: var(--gold);
            background: rgba(201, 168, 76, 0.1);
            padding: 2px 8px;
            border-radius: 10px;
            font-family: 'Cinzel', serif;
            letter-spacing: 1px;
        }

        .skill-name {
            font-family: 'Cinzel', serif;
            font-size: 1.15em;
            color: var(--lightning);
            margin-bottom: 8px;
        }

        .skill-type {
            color: var(--text-dim);
            font-size: 0.8em;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .support-gems {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .support-tag {
            background: rgba(126, 184, 255, 0.1);
            border: 1px solid rgba(126, 184, 255, 0.2);
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 0.8em;
            color: var(--lightning);
        }

        .support-tag.empty {
            background: rgba(255, 255, 255, 0.03);
            border: 1px dashed rgba(255, 255, 255, 0.1);
            color: var(--text-dim);
            font-style: italic;
        }

        /* ── Meta Alert ── */
        .meta-alert {
            background: linear-gradient(135deg, rgba(201, 168, 76, 0.05) 0%, rgba(126, 184, 255, 0.05) 100%);
            border: 1px solid rgba(201, 168, 76, 0.2);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .meta-alert h3 {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .meta-alert .alert-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 8px;
            padding: 8px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 6px;
        }

        .meta-alert .priority {
            color: var(--lightning);
            font-weight: bold;
            min-width: 20px;
        }

        .meta-alert .suggestion {
            color: var(--text);
            line-height: 1.5;
        }

        .meta-alert .suggestion strong { color: var(--gold); }

        /* ═══════════════════════════════════════════════════════════
           SKILL TREE / SYNERGY MAP STYLES
           ═══════════════════════════════════════════════════════════ */

        /* ── Legend ── */
        .legend {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 0.88em;
            color: var(--text-dim);
        }
        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px solid;
        }
        .legend-dot.lightning { background: rgba(126,184,255,0.2); border-color: var(--lightning); }
        .legend-dot.physical  { background: rgba(224,85,85,0.2); border-color: var(--physical); }
        .legend-dot.utility   { background: rgba(201,168,76,0.2); border-color: var(--utility); }
        .legend-dot.support   { background: transparent; border-color: var(--text-dim); border-style: dashed; }
        .legend-line {
            width: 30px;
            height: 3px;
            border-radius: 2px;
        }
        .legend-line.active   { background: var(--gold); box-shadow: 0 0 6px var(--gold-glow); }
        .legend-line.passive  { background: var(--text-dim); opacity: 0.5; }

        /* ── Tree Canvas ── */
        .tree-panel {
            background: linear-gradient(135deg, var(--panel-bg) 0%, #0e0e16 100%);
            border: 1px solid var(--panel-border);
            border-radius: 14px;
            padding: 15px;
            margin-bottom: 25px;
            position: relative;
            overflow: hidden;
        }
        .tree-panel::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
            opacity: 0.6;
        }
        .tree-panel h2 {
            font-family: 'Cinzel', serif;
            font-size: 1.2em;
            color: var(--gold);
            text-align: center;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .tree-svg {
            width: 100%;
            display: block;
        }

        /* ── SVG Node Styles ── */
        .node-group { cursor: pointer; }
        .node-group:hover .node-ring { opacity: 1; }

        .node-ring {
            fill: none;
            stroke-width: 2;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .node-bg {
            fill: rgba(10, 10, 15, 0.85);
            stroke-width: 2;
            transition: all 0.3s;
        }
        .node-group:hover .node-bg {
            filter: brightness(1.3);
        }

        .node-icon {
            font-size: 18px;
            text-anchor: middle;
            dominant-baseline: central;
            pointer-events: none;
        }

        .node-label {
            font-family: 'Cinzel', serif;
            font-size: 10px;
            fill: var(--text);
            text-anchor: middle;
            pointer-events: none;
            letter-spacing: 0.5px;
        }
        .node-label-shadow {
            font-family: 'Cinzel', serif;
            font-size: 10px;
            fill: none;
            stroke: var(--dark-bg);
            stroke-width: 3;
            text-anchor: middle;
            pointer-events: none;
        }

        .support-node-bg {
            fill: rgba(10, 10, 15, 0.7);
            stroke: var(--text-dim);
            stroke-width: 1;
            stroke-dasharray: 3 2;
        }
        .support-label {
            font-family: 'Crimson Text', serif;
            font-size: 8px;
            fill: var(--text-dim);
            text-anchor: middle;
            pointer-events: none;
        }

        .connection-line {
            stroke-width: 2.5;
            fill: none;
            opacity: 0.6;
            transition: opacity 0.3s;
        }
        .connection-line.synergy {
            stroke-width: 3;
            opacity: 0.85;
        }
        .connection-line.recommended {
            stroke-dasharray: 8 4;
            stroke-width: 2.5;
            opacity: 0.7;
        }

        .support-link {
            stroke: var(--text-dim);
            stroke-width: 1;
            stroke-dasharray: 3 2;
            opacity: 0.5;
        }

        /* ── Tooltip ── */
        .tooltip {
            position: fixed;
            background: rgba(18, 18, 26, 0.96);
            border: 1px solid var(--panel-border);
            border-radius: 10px;
            padding: 14px 18px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 100;
            max-width: 320px;
            backdrop-filter: blur(8px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
        }
        .tooltip.visible { opacity: 1; }
        .tooltip-name {
            font-family: 'Cinzel', serif;
            font-size: 1.05em;
            margin-bottom: 4px;
        }
        .tooltip-type {
            font-size: 0.8em;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .tooltip-role {
            font-size: 0.9em;
            line-height: 1.4;
            color: var(--text);
            margin-bottom: 8px;
        }
        .tooltip-supports {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }
        .tooltip-support-tag {
            background: rgba(126, 184, 255, 0.1);
            border: 1px solid rgba(126, 184, 255, 0.2);
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.75em;
            color: var(--lightning);
        }
        .tooltip-support-tag.fire {
            background: rgba(255, 107, 53, 0.1);
            border-color: rgba(255, 107, 53, 0.2);
            color: var(--fire);
        }
        .tooltip-support-tag.gold {
            background: rgba(201, 168, 76, 0.1);
            border-color: rgba(201, 168, 76, 0.2);
            color: var(--gold);
        }

        /* ── Info Cards ── */
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }
        .info-card {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            padding: 20px;
        }
        .info-card h3 {
            font-family: 'Cinzel', serif;
            font-size: 1.05em;
            color: var(--gold);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .synergy-chain {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 6px;
            font-size: 0.92em;
            line-height: 1.6;
        }
        .synergy-step {
            background: rgba(126, 184, 255, 0.08);
            border: 1px solid rgba(126, 184, 255, 0.15);
            padding: 3px 10px;
            border-radius: 14px;
            color: var(--lightning);
            white-space: nowrap;
        }
        .synergy-step.fire {
            background: rgba(255, 107, 53, 0.08);
            border-color: rgba(255, 107, 53, 0.15);
            color: var(--fire);
        }
        .synergy-step.physical {
            background: rgba(224, 85, 85, 0.08);
            border-color: rgba(224, 85, 85, 0.15);
            color: var(--physical);
        }
        .synergy-arrow { color: var(--text-dim); font-size: 1.1em; }

        .rec-list {
            list-style: none;
        }
        .rec-list li {
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            font-size: 0.9em;
            line-height: 1.5;
        }
        .rec-list li:last-child { border-bottom: none; }
        .rec-priority {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-weight: 700;
            margin-right: 6px;
        }
        .rec-skill { color: var(--lightning); font-weight: 700; }
        .rec-skill.fire { color: var(--fire); }
        .rec-arrow { color: var(--text-dim); margin: 0 4px; }
        .rec-suggested { color: var(--gold); font-weight: 700; }

        /* ── Passive Skills Section ── */
        .passive-section {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
        }

        .passive-section h2 {
            font-family: 'Cinzel', serif;
            font-size: 1.3em;
            color: var(--gold);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .passive-section h3 {
            font-family: 'Cinzel', serif;
            font-size: 1.05em;
            color: var(--gold);
            margin-bottom: 10px;
            margin-top: 18px;
        }

        .passive-subsection {
            margin-bottom: 12px;
        }

        .passive-progress-bar-container {
            margin-bottom: 20px;
        }

        .tag-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .keystone-tag {
            background: rgba(201, 168, 76, 0.1);
            border: 2px solid var(--gold);
            padding: 6px 16px;
            border-radius: 20px;
            font-family: 'Cinzel', serif;
            font-size: 0.95em;
            color: var(--gold);
            box-shadow: 0 0 12px rgba(201, 168, 76, 0.15);
            letter-spacing: 0.5px;
        }

        .notable-tag {
            background: rgba(201, 168, 76, 0.06);
            border: 1px solid rgba(201, 168, 76, 0.4);
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.85em;
            color: var(--gold);
            letter-spacing: 0.5px;
        }

        .progress-fill.passive-path {
            background: linear-gradient(90deg, #059669, #34d399);
            box-shadow: 0 0 15px rgba(52, 211, 153, 0.3);
        }

        .synergy-section {
            margin-bottom: 25px;
        }

        /* ── Pulse animation ── */
        @keyframes pulse-glow {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }
        .node-primary-pulse {
            animation: pulse-glow 3s ease-in-out infinite;
        }

        /* ── Footer ── */
        .footer {
            text-align: center;
            padding: 30px 0;
            border-top: 1px solid var(--panel-border);
            margin-top: 30px;
        }

        .footer .brand {
            font-family: 'Cinzel', serif;
            color: var(--gold-dim);
            font-size: 0.9em;
            letter-spacing: 2px;
        }

        .footer .powered {
            color: var(--text-dim);
            font-size: 0.8em;
            margin-top: 5px;
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: var(--text-dim);
            font-style: italic;
        }

        /* ── Responsive ── */
        @media (max-width: 900px) {
            .info-grid { grid-template-columns: 1fr; }
            .header h1 { font-size: 1.8em; }
        }
        @media (max-width: 768px) {
            .character-stats { grid-template-columns: repeat(2, 1fr); }
            .skill-grid { grid-template-columns: 1fr; }
        }
        @media (max-width: 600px) {
            .container { padding: 10px; }
            .legend { gap: 12px; }
        }

        /* ── Main Tab Bar ── */
        .main-tab-bar {
            display: flex;
            gap: 4px;
            padding: 6px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .main-tab-btn {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            background: transparent;
            color: var(--text-dim);
            font-family: 'Cinzel', serif;
            font-size: 0.9em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .main-tab-btn:hover {

        #panel-passive .pp-btn {

            border: 1px solid #2a2a3a;

            border-radius: 4px;

            font-size: 12px;

            transition: all .15s;
        }
        #panel-passive .pp-btn:hover {
            background: #24243a;
            border-color: var(--gold);
        }
        #panel-passive .pp-btn.gold {
            border-color: var(--gold);
            color: var(--gold);
        }
        #panel-passive .pp-btn.gold:hover {
            background: rgba(201,168,76,.15);
        }
        #panel-passive .pp-spacer { flex: 1; }

        #panel-passive .pp-main {
            position: relative;
            overflow: hidden;
            border: 1px solid var(--panel-border);
            border-radius: 10px;
            background: #0a0a12;
        }
        #panel-passive .pp-canvas-wrap {
            width: 100%;

        #panel-passive .pp-canvas-wrap canvas {

        #panel-passive .pp-canvas-wrap canvas.dragging {

        #panel-passive .pp-zoom-controls {

        #panel-passive .pp-zoom-btn {

        #panel-passive .pp-zoom-btn:hover {
            border-color: var(--gold);

        #panel-passive .pp-info-panel {
            background: var(--panel-bg);
            border-top: 1px solid #1e1e2e;
            display: flex;
            align-items: center;
            padding: 12px 16px;

            border-radius: 0 0 10px 10px;

        #panel-passive .pp-node-detail { flex: 1; min-width: 0; }
        #panel-passive .pp-node-detail .nd-name {

        #panel-passive .pp-toast {

        #panel-passive .pp-import-overlay {

            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
        }
        #panel-passive .pp-import-overlay.open { display: flex; }
        #panel-passive .pp-import-modal {
            background: var(--panel-bg);
            border: 1px solid #2a2a3a;
            border-radius: 8px;
            padding: 20px;
            width: 420px;
            max-width: 90vw;
        }

            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-size: 15px;
            margin-bottom: 10px;
        }
        #panel-passive .pp-import-modal textarea {
            width: 100%;
            height: 80px;
            background: #1a1a2a;
            border: 1px solid #2a2a3a;
            color: var(--text);
            padding: 8px;
            border-radius: 4px;

            font-size: 13px;

</head>
<body>

    <div class="container" id="app">
        <div class="header">
            <h1>GENTECH DASHBOARD</h1>
            <div class="subtitle">Data Dashboard</div>
        </div>

        <!-- Tab Bar -->
        <div class="main-tab-bar">
            <button class="main-tab-btn active" onclick="switchTab('build')">📊 Build</button>
            <button class="main-tab-btn" onclick="switchTab('passive')">🌳 Passive Tree</button>
        </div>

        <!-- Build Tab -->
        <div class="tab-panel active" id="panel-build">
            <div class="loading" id="main-loading">⚡ Loading data...</div>
            <div id="dashboard-content" style="display:none;"></div>
        </div>

        <!-- Passive Planner Tab -->
        <div class="tab-panel" id="panel-passive" style="display:none;">
            <div id="passive-planner-root">
                <!-- Toolbar -->
                <div class="pp-header">
                    <div class="pp-pts-wrap">
                        <span class="pp-pts-label">Points:</span>
                        <span class="pp-pts-count" id="pp-pts-count">0</span>
                        <span class="pp-pts-label">/</span>
                        <input type="number" class="pp-pts-input" id="pp-pts-input" value="123" min="0" max="999">
                        <span class="pp-pts-label">Available</span>
                    </div>
                    <div class="pp-progress-wrap"><div class="pp-progress-bar" id="pp-progress-bar" style="width:0%"></div></div>
                    <div class="pp-spacer"></div>
                    <button class="pp-btn" onclick="ppOpenImport()">📥 Import</button>
                    <button class="pp-btn gold" onclick="ppExportBuild()">📤 Export</button>
                    <button class="pp-btn" onclick="ppResetBuild()">🔄 Reset</button>
                    <button class="pp-btn" onclick="ppFitTree()">⊞ Fit View</button>
                </div>
                <!-- Canvas -->
                <div class="pp-main">
                    <div class="pp-canvas-wrap" id="pp-canvas-wrap">
                        <canvas id="pp-tree-canvas"></canvas>
                        <div class="pp-zoom-controls">
                            <button class="pp-zoom-btn" onclick="ppZoomBy(1.2)">+</button>
                            <button class="pp-zoom-btn" onclick="ppZoomBy(1/1.2)">−</button>
                        </div>
                    </div>
                    <div class="pp-info-panel">
                        <div class="pp-node-detail" id="pp-node-detail"><div class="nd-empty">Hover over a node to see details</div></div>
                        <div class="pp-info-btns">
                            <button class="pp-btn gold" onclick="ppSaveToStorage()">💾 Save</button>
                        </div>
                    </div>
                </div>
                <!-- Toast -->
                <div class="pp-toast" id="pp-toast"></div>
                <!-- Import Modal -->
                <div class="pp-import-overlay" id="pp-import-overlay">
                    <div class="pp-import-modal">
                        <h2>Import Build</h2>
                        <p style="font-size:12px;color:#888;margin-bottom:8px">Paste a comma-separated list of node IDs to allocate:</p>
                        <textarea id="pp-import-text" placeholder="n1, n2, n5, ..."></textarea>
                        <div class="pp-modal-btns">
                            <button class="pp-btn" onclick="ppCloseImport()">Cancel</button>
                            <button class="pp-btn gold" onclick="ppDoImport()">Import</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="footer">
            <div class="brand">GENTECH DASHBOARD</div>
            <div class="powered">Data Dashboard v0.1</div>
        </div>
    </div>

    <!-- Tooltip (shared by skill tree nodes) -->
    <div class="tooltip" id="tooltip"></div>

    <script>
        // ═══════════════════════════════════════════════════════════
        //  BUILD DATA
        // ═══════════════════════════════════════════════════════════
        const DATA_URLS = {
            monk: 'poe2-monk.json?v=' + Date.now(),
            warrior: 'poe2-warrior.json?v=' + Date.now()
        };
        let currentBuildData = null;
        let allCharacters = [];
        let currentCharIndex = 0;

        async function loadBuild() {
            try {
                const res = await fetch(DATA_URLS.monk);
                const raw = await res.json();
                // Support both old flat format and new characters array format
                if (raw.characters) {
                    allCharacters = raw.characters;
                    currentBuildData = raw.characters[0];
                } else {
                    allCharacters = [raw];
                    currentBuildData = raw;
                }
                renderDashboard(currentBuildData);
            } catch (err) {
                document.getElementById('main-loading').innerHTML = `
                    ⚠️ Could not load build data. Make sure poe2-monk.json exists.
                `;
            }
        }

        function switchCharacter(index) {
            currentCharIndex = index;
            currentBuildData = allCharacters[index];
            renderDashboard(currentBuildData);
        }

        // ═══════════════════════════════════════════════════════════
        //  RENDER DASHBOARD (single scrollable view)
        // ═══════════════════════════════════════════════════════════
        function renderDashboard(data) {
            const { player, progress, skills, upgrades, lastUpdated, alias, class: charClass, build, act, mission, passiveSkills, level, league } = data;
            const suggestions = upgrades || [];
            const playerName = typeof player === 'string' ? player : player.name;

            // ── Character selector ──
            const charSelector = allCharacters.length > 1 ? `
                <div class="char-selector">
                    ${allCharacters.map((c, i) => {
                        const name = typeof c.player === 'string' ? c.player : c.player.name;
                        const isActive = i === currentCharIndex;
                        return `<button class="char-btn ${isActive ? 'active' : ''}" onclick="switchCharacter(${i})">${c.alias || c.class || name}</button>`;
                    }).join('')}
                </div>
            ` : '';

            // ── Skills grid ──
            const skillsHTML = skills.map(skill => `
                <div class="skill-card ${skill.primary ? 'primary' : ''}">
                    <div class="skill-name">${skill.name}</div>
                    <div class="skill-type">${skill.type}</div>
                    <div class="support-gems">
                        ${skill.supports.length > 0
                            ? skill.supports.map(s => `<span class="support-tag">${s}</span>`).join('')
                            : '<span class="support-tag empty">No supports yet</span>'
                        }
                    </div>
                </div>
            `).join('');

            // ── Suggestions ──
            const suggestionsHTML = suggestions.map(s => `
                <div class="alert-item">
                    <span class="priority">${s.priority}.</span>
                    <span class="suggestion">
                        <strong>${s.skill}:</strong> ${s.current} → <strong>${s.suggested}</strong> — ${s.reason}
                    </span>
                </div>
            `).join('');

            const manaSkill = skills.find(s => s.name === 'Mana Drain');

            // ── Passive Skills Section ──
            let passiveHTML = '';
            if (passiveSkills) {
                const ps = passiveSkills;
                const allocatedPercent = Math.round((ps.allocated / ps.total) * 100);

                // Keystone tags (gold-bordered)
                const keystoneTags = ps.keystones.length > 0
                    ? ps.keystones.map(k => `<span class="keystone-tag">${k}</span>`).join('')
                    : '<span style="color:var(--text-dim); font-style:italic; font-size:0.9em;">None allocated yet</span>';

                // Notable tags (smaller gold)
                const notableTags = ps.notableNodes.length > 0
                    ? ps.notableNodes.map(n => `<span class="notable-tag">${n}</span>`).join('')
                    : '<span style="color:var(--text-dim); font-style:italic; font-size:0.9em;">None allocated yet</span>';

                // Core stats
                const statLabels = {
                    lightningDamage: 'Lightning Damage',
                    fireDamage: 'Fire Damage',
                    critChance: 'Crit Chance',
                    attackSpeed: 'Attack Speed',
                    castSpeed: 'Cast Speed',
                    manaRegen: 'Mana Regen'
                };
                const coreStatsHTML = Object.entries(ps.coreStats).map(([key, val]) => `
                    <div class="stat-box">
                        <div class="label">${statLabels[key] || key}</div>
                        <div class="value">${val}%</div>
                    </div>
                `).join('');

                // Pathways
                const pathwaysHTML = ps.pathways.map(pw => {
                    const pct = pw.points > 0 ? Math.round((pw.allocated ? pw.points : 0) / pw.points * 100) : 0;
                    const allocatedPts = pw.allocated ? pw.points : 0;
                    return `
                        <div class="progress-bar-container">
                            <div class="progress-label">
                                <span class="name">${pw.name} ${pw.allocated ? '' : '(planned)'}</span>
                                <span class="percent">${allocatedPts}/${pw.points}</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill passive-path" style="width: 0%" data-target="${pct}"></div>
                            </div>
                        </div>
                    `;
                }).join('');

                passiveHTML = `
                    <div class="passive-section">
                        <h2>🌳 Passive Skills <span style="font-size:0.7em; color:var(--text-dim); font-family:'Crimson Text',serif;">(${ps.allocated}/${ps.total} points)</span></h2>
                        <div class="passive-progress-bar-container">
                            <div class="progress-label">
                                <span class="name">Passive Tree</span>
                                <span class="percent">${allocatedPercent}%</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill passive-path" style="width: 0%" data-target="${allocatedPercent}"></div>
                            </div>
                        </div>
                        <div class="passive-subsection">
                            <h3>⚡ Keystones</h3>
                            <div class="tag-row">${keystoneTags}</div>
                        </div>
                        <div class="passive-subsection">
                            <h3>✨ Notable Nodes</h3>
                            <div class="tag-row">${notableTags}</div>
                        </div>
                        <div class="passive-subsection">
                            <h3>📊 Core Stats</h3>
                            <div class="character-stats">${coreStatsHTML}</div>
                        </div>
                        <div class="passive-subsection">
                            <h3>🛤️ Pathways</h3>
                            ${pathwaysHTML}
                        </div>
                    </div>
                `;
            }

            // ── Skill Synergy Map (embedded inline) ──
            const synergyMapHTML = `
                <div class="synergy-section">
                    <div class="legend">
                        <div class="legend-item"><div class="legend-dot lightning"></div> Lightning</div>
                        <div class="legend-item"><div class="legend-dot physical"></div> Physical</div>
                        <div class="legend-item"><div class="legend-dot utility"></div> Utility / Mana</div>
                        <div class="legend-item"><div class="legend-line active"></div> Active Synergy</div>
                        <div class="legend-item"><div class="legend-line passive"></div> Connection</div>
                        <div class="legend-item"><div class="legend-dot support"></div> Support Gem</div>
                    </div>

                    <div class="tree-panel">
                        <h2>⚡ ${alias || charClass} — ${build} · Skill Synergy Map</h2>
                        <svg class="tree-svg" viewBox="0 0 1100 620" xmlns="http://www.w3.org/2000/svg" id="skill-tree-svg">
                            <defs>
                                <filter id="glow-blue">
                                    <feGaussianBlur stdDeviation="4" result="blur"/>
                                    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                                </filter>
                                <filter id="glow-gold">
                                    <feGaussianBlur stdDeviation="4" result="blur"/>
                                    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                                </filter>
                                <filter id="glow-red">
                                    <feGaussianBlur stdDeviation="3" result="blur"/>
                                    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                                </filter>
                                <marker id="arrow-gold" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
                                    <polygon points="0 0, 10 3.5, 0 7" fill="var(--gold)" opacity="0.6"/>
                                </marker>
                                <marker id="arrow-blue" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
                                    <polygon points="0 0, 10 3.5, 0 7" fill="var(--lightning)" opacity="0.5"/>
                                </marker>
                            </defs>

                            <!-- Connections / Synergy Lines -->
                            <g id="synergy-links">
                                <line x1="550" y1="140" x2="350" y2="260" class="connection-line synergy" stroke="var(--lightning)" marker-end="url(#arrow-blue)" filter="url(#glow-blue)"/>
                                <line x1="350" y1="260" x2="550" y2="350" class="connection-line synergy" stroke="var(--lightning)" marker-end="url(#arrow-blue)" filter="url(#glow-blue)"/>
                                <line x1="590" y1="140" x2="800" y2="260" class="connection-line synergy" stroke="var(--lightning)" marker-end="url(#arrow-blue)" filter="url(#glow-blue)"/>
                                <line x1="590" y1="350" x2="780" y2="370" class="connection-line" stroke="var(--lightning)" opacity="0.5"/>
                                <line x1="820" y1="410" x2="820" y2="490" class="connection-line" stroke="var(--utility)" opacity="0.5"/>
                                <line x1="190" y1="440" x2="190" y2="530" class="connection-line synergy" stroke="var(--utility)" stroke-dasharray="6 3" opacity="0.7"/>
                                <line x1="350" y1="490" x2="510" y2="170" class="connection-line recommended" stroke="var(--gold)" opacity="0.5"/>
                                <line x1="310" y1="490" x2="390" y2="490" class="connection-line" stroke="var(--text-dim)" opacity="0.35"/>
                                <line x1="550" y1="95" x2="350" y2="195" class="connection-line recommended" stroke="var(--gold)" opacity="0.4" stroke-dasharray="5 4" marker-end="url(#arrow-gold)"/>
                            </g>

                            <!-- ─── NODES ─── -->
                            <g class="node-group" data-skill="0" transform="translate(550, 125)">
                                <circle class="node-ring" r="32" stroke="var(--lightning)" filter="url(#glow-blue)"/>
                                <circle class="node-primary-pulse" r="28" fill="none" stroke="var(--lightning)" stroke-width="1.5" opacity="0.4"/>
                                <circle class="node-bg" r="24" stroke="var(--lightning)"/>
                                <text class="node-icon" dy="1">⚡</text>
                                <text class="node-label-shadow" y="-32">Tempest Flurry</text>
                                <text class="node-label" y="-32" fill="var(--lightning)">Tempest Flurry</text>
                                <text y="36" text-anchor="middle" font-size="8" fill="var(--gold)" font-family="Cinzel">PRIMARY</text>
                            </g>
                            <g class="node-group" data-skill="1" transform="translate(350, 260)">
                                <circle class="node-ring" r="28" stroke="var(--lightning)" filter="url(#glow-blue)"/>
                                <circle class="node-bg" r="22" stroke="var(--lightning)"/>
                                <text class="node-icon" dy="1">🌩️</text>
                                <text class="node-label-shadow" y="-30">Falling Thunder</text>
                                <text class="node-label" y="-30">Falling Thunder</text>
                            </g>
                            <g class="node-group" data-skill="2" transform="translate(550, 350)">
                                <circle class="node-ring" r="28" stroke="var(--lightning)" filter="url(#glow-blue)"/>
                                <circle class="node-primary-pulse" r="24" fill="none" stroke="var(--lightning)" stroke-width="1.5" opacity="0.4"/>
                                <circle class="node-bg" r="22" stroke="var(--lightning)"/>
                                <text class="node-icon" dy="1">⛈️</text>
                                <text class="node-label-shadow" y="-30">Thunderstorm</text>
                                <text class="node-label" y="-30">Thunderstorm</text>
                            </g>
                            <g class="node-group" data-skill="3" transform="translate(800, 370)">
                                <circle class="node-ring" r="28" stroke="var(--lightning)" filter="url(#glow-blue)"/>
                                <circle class="node-bg" r="22" stroke="var(--lightning)"/>
                                <text class="node-icon" dy="1">🌀</text>
                                <text class="node-label-shadow" y="-30">Orb of Storms</text>
                                <text class="node-label" y="-30">Orb of Storms</text>
                            </g>
                            <g class="node-group" data-skill="4" transform="translate(820, 500)">
                                <circle class="node-ring" r="26" stroke="var(--utility)"/>
                                <circle class="node-bg" r="20" stroke="var(--utility)"/>
                                <text class="node-icon" dy="1">🔔</text>
                                <text class="node-label-shadow" y="-28">Tempest Bell</text>
                                <text class="node-label" y="-28">Tempest Bell</text>
                            </g>
                            <g class="node-group" data-skill="5" transform="translate(190, 440)">
                                <circle class="node-ring" r="26" stroke="var(--utility)"/>
                                <circle class="node-bg" r="20" stroke="var(--utility)"/>
                                <text class="node-icon" dy="1">💧</text>
                                <text class="node-label-shadow" y="-28">Mana Drain</text>
                                <text class="node-label" y="-28">Mana Drain</text>
                            </g>
                            <g class="node-group" data-skill="6" transform="translate(350, 490)">
                                <circle class="node-ring" r="26" stroke="var(--utility)"/>
                                <circle class="node-bg" r="20" stroke="var(--utility)"/>
