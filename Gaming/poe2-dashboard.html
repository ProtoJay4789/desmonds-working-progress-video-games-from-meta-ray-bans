<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GenTech Dashboard — Data Visualization Platform</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Text:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c9a84c;
            --gold-dim: #8b6914;
            --gold-glow: rgba(201, 168, 76, 0.4);
            --lightning: #7eb8ff;
            --lightning-glow: rgba(126, 184, 255, 0.35);
            --physical: #e05555;
            --physical-glow: rgba(224, 85, 85, 0.35);
            --utility: #c9a84c;
            --utility-glow: rgba(201, 168, 76, 0.35);
            --fire: #ff6b35;
            --fire-glow: rgba(255, 107, 53, 0.35);
            --dark-bg: #0a0a0f;
            --panel-bg: #12121a;
            --panel-border: #1e1e2e;
            --text: #d4d4d4;
            --text-dim: #6b6b7b;
            --danger: #ff4444;
            --success: #44ff88;
            --mana-blue: #3b82f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--dark-bg);
            color: var(--text);
            font-family: 'Crimson Text', serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(ellipse at 20% 20%, rgba(126, 184, 255, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(126, 184, 255, 0.02) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* ── Header ── */
        .header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 1px solid var(--panel-border);
            margin-bottom: 20px;
            position: relative;
        }

        .header::after {
            content: '⚡';
            position: absolute;
            bottom: -12px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--dark-bg);
            padding: 0 15px;
            font-size: 20px;
        }

        .header h1 {
            font-family: 'Cinzel', serif;
            font-size: 2.5em;
            font-weight: 900;
            color: var(--gold);
            text-shadow: 0 0 30px rgba(201, 168, 76, 0.3);
            letter-spacing: 3px;
        }

        .header .subtitle {
            color: var(--text-dim);
            font-size: 1.1em;
            margin-top: 8px;
            font-style: italic;
        }

        .header .patch-badge {
            display: inline-block;
            background: rgba(126, 184, 255, 0.1);
            border: 1px solid rgba(126, 184, 255, 0.3);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            color: var(--lightning);
            margin-top: 10px;
        }

        .header .last-updated {
            color: var(--text-dim);
            font-size: 0.8em;
            margin-top: 8px;
        }

        /* ── Main Tab Bar ── */
        .main-tab-bar {
            display: flex;
            justify-content: center;
            gap: 4px;
            margin-bottom: 30px;
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            padding: 5px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }
        .main-tab-btn {
            font-family: 'Cinzel', serif;
            font-size: 0.95em;
            padding: 10px 32px;
            border: none;
            border-radius: 9px;
            cursor: pointer;
            background: transparent;
            color: var(--text-dim);
            transition: all 0.3s;
            letter-spacing: 1px;
            position: relative;
        }
        .main-tab-btn:hover { color: var(--text); background: rgba(255,255,255,0.04); }
        .main-tab-btn.active {
            background: rgba(201, 168, 76, 0.12);
            color: var(--gold);
            border: 1px solid rgba(201, 168, 76, 0.25);
            text-shadow: 0 0 12px rgba(201, 168, 76, 0.2);
        }

        /* ── Main Tab Panels ── */
        .main-panel { display: none; }
        .main-panel.active { display: block; }

        /* ── Character Card ── */
        .character-card {
            background: linear-gradient(135deg, var(--panel-bg) 0%, #151520 100%);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
            position: relative;
            overflow: hidden;
        }

        .character-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--lightning), transparent);
            opacity: 0.6;
        }

        .character-name {
            font-family: 'Cinzel', serif;
            font-size: 1.8em;
            color: var(--gold);
            margin-bottom: 5px;
        }

        .character-class {
            color: var(--lightning);
            font-size: 1.1em;
            margin-bottom: 15px;
        }

        .character-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .stat-box {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            padding: 12px;
            text-align: center;
        }

        .stat-box .label {
            color: var(--text-dim);
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-box .value {
            font-family: 'Cinzel', serif;
            font-size: 1.4em;
            color: var(--gold);
            margin-top: 4px;
        }

        .stat-box .value.lightning { color: var(--lightning); }
        .stat-box .value.mana { color: var(--mana-blue); }

        /* ── Progress Section ── */
        .progress-section {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
        }

        .progress-section h2 {
            font-family: 'Cinzel', serif;
            font-size: 1.3em;
            color: var(--gold);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .progress-bar-container {
            margin-bottom: 18px;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-size: 0.95em;
        }

        .progress-label .name { color: var(--text); }
        .progress-label .percent { color: var(--gold); font-family: 'Cinzel', serif; }

        .progress-bar {
            height: 20px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--panel-border);
        }

        .progress-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 1.5s ease-out;
            position: relative;
        }

        .progress-fill.campaign { background: linear-gradient(90deg, var(--gold-dim), var(--gold)); box-shadow: 0 0 15px rgba(201, 168, 76, 0.3); }
        .progress-fill.level { background: linear-gradient(90deg, #2563eb, var(--lightning)); box-shadow: 0 0 15px rgba(126, 184, 255, 0.3); }
        .progress-fill.build { background: linear-gradient(90deg, #7c3aed, #a855f7); box-shadow: 0 0 15px rgba(168, 85, 247, 0.3); }
        .progress-fill.gems { background: linear-gradient(90deg, #059669, #34d399); box-shadow: 0 0 15px rgba(52, 211, 153, 0.3); }

        /* ── Skills Section ── */
        .skills-section {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
        }

        .skills-section h2 {
            font-family: 'Cinzel', serif;
            font-size: 1.3em;
            color: var(--gold);
            margin-bottom: 20px;
        }

        .skill-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
        }

        .skill-card {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--panel-border);
            border-radius: 10px;
            padding: 18px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .skill-card:hover {
            border-color: var(--lightning);
            box-shadow: 0 0 20px rgba(126, 184, 255, 0.1);
            transform: translateY(-2px);
        }

        .skill-card.primary { border-color: var(--gold-dim); }

        .skill-card.primary::before {
            content: '⚡ PRIMARY';
            position: absolute;
            top: 8px;
            right: 8px;
            font-size: 0.65em;
            color: var(--gold);
            background: rgba(201, 168, 76, 0.1);
            padding: 2px 8px;
            border-radius: 10px;
            font-family: 'Cinzel', serif;
            letter-spacing: 1px;
        }

        .skill-name {
            font-family: 'Cinzel', serif;
            font-size: 1.15em;
            color: var(--lightning);
            margin-bottom: 8px;
        }

        .skill-type {
            color: var(--text-dim);
            font-size: 0.8em;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .support-gems {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .support-tag {
            background: rgba(126, 184, 255, 0.1);
            border: 1px solid rgba(126, 184, 255, 0.2);
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 0.8em;
            color: var(--lightning);
        }

        .support-tag.empty {
            background: rgba(255, 255, 255, 0.03);
            border: 1px dashed rgba(255, 255, 255, 0.1);
            color: var(--text-dim);
            font-style: italic;
        }

        /* ── Meta Alert ── */
        .meta-alert {
            background: linear-gradient(135deg, rgba(201, 168, 76, 0.05) 0%, rgba(126, 184, 255, 0.05) 100%);
            border: 1px solid rgba(201, 168, 76, 0.2);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .meta-alert h3 {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .meta-alert .alert-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 8px;
            padding: 8px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 6px;
        }

        .meta-alert .priority {
            color: var(--lightning);
            font-weight: bold;
            min-width: 20px;
        }

        .meta-alert .suggestion {
            color: var(--text);
            line-height: 1.5;
        }

        .meta-alert .suggestion strong { color: var(--gold); }

        /* ═══════════════════════════════════════════════════════════
           SKILL TREE TAB STYLES
           ═══════════════════════════════════════════════════════════ */

        /* (Player sub-tab bar removed — only Jordan remains) */

        /* ── Legend ── */
        .legend {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 0.88em;
            color: var(--text-dim);
        }
        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px solid;
        }
        .legend-dot.lightning { background: rgba(126,184,255,0.2); border-color: var(--lightning); }
        .legend-dot.physical  { background: rgba(224,85,85,0.2); border-color: var(--physical); }
        .legend-dot.utility   { background: rgba(201,168,76,0.2); border-color: var(--utility); }
        .legend-dot.support   { background: transparent; border-color: var(--text-dim); border-style: dashed; }
        .legend-line {
            width: 30px;
            height: 3px;
            border-radius: 2px;
        }
        .legend-line.active   { background: var(--gold); box-shadow: 0 0 6px var(--gold-glow); }
        .legend-line.passive  { background: var(--text-dim); opacity: 0.5; }

        /* ── Tree Canvas ── */
        .tree-panel {
            background: linear-gradient(135deg, var(--panel-bg) 0%, #0e0e16 100%);
            border: 1px solid var(--panel-border);
            border-radius: 14px;
            padding: 15px;
            margin-bottom: 25px;
            position: relative;
            overflow: hidden;
        }
        .tree-panel::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
            opacity: 0.6;
        }
        .tree-panel h2 {
            font-family: 'Cinzel', serif;
            font-size: 1.2em;
            color: var(--gold);
            text-align: center;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .tree-svg {
            width: 100%;
            display: block;
        }

        /* ── SVG Node Styles ── */
        .node-group { cursor: pointer; }
        .node-group:hover .node-ring { opacity: 1; }

        .node-ring {
            fill: none;
            stroke-width: 2;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .node-bg {
            fill: rgba(10, 10, 15, 0.85);
            stroke-width: 2;
            transition: all 0.3s;
        }
        .node-group:hover .node-bg {
            filter: brightness(1.3);
        }

        .node-icon {
            font-size: 18px;
            text-anchor: middle;
            dominant-baseline: central;
            pointer-events: none;
        }

        .node-label {
            font-family: 'Cinzel', serif;
            font-size: 10px;
            fill: var(--text);
            text-anchor: middle;
            pointer-events: none;
            letter-spacing: 0.5px;
        }
        .node-label-shadow {
            font-family: 'Cinzel', serif;
            font-size: 10px;
            fill: none;
            stroke: var(--dark-bg);
            stroke-width: 3;
            text-anchor: middle;
            pointer-events: none;
        }

        .support-node-bg {
            fill: rgba(10, 10, 15, 0.7);
            stroke: var(--text-dim);
            stroke-width: 1;
            stroke-dasharray: 3 2;
        }
        .support-label {
            font-family: 'Crimson Text', serif;
            font-size: 8px;
            fill: var(--text-dim);
            text-anchor: middle;
            pointer-events: none;
        }

        .connection-line {
            stroke-width: 2.5;
            fill: none;
            opacity: 0.6;
            transition: opacity 0.3s;
        }
        .connection-line.synergy {
            stroke-width: 3;
            opacity: 0.85;
        }
        .connection-line.recommended {
            stroke-dasharray: 8 4;
            stroke-width: 2.5;
            opacity: 0.7;
        }

        .support-link {
            stroke: var(--text-dim);
            stroke-width: 1;
            stroke-dasharray: 3 2;
            opacity: 0.5;
        }

        /* ── Tooltip ── */
        .tooltip {
            position: fixed;
            background: rgba(18, 18, 26, 0.96);
            border: 1px solid var(--panel-border);
            border-radius: 10px;
            padding: 14px 18px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 100;
            max-width: 320px;
            backdrop-filter: blur(8px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
        }
        .tooltip.visible { opacity: 1; }
        .tooltip-name {
            font-family: 'Cinzel', serif;
            font-size: 1.05em;
            margin-bottom: 4px;
        }
        .tooltip-type {
            font-size: 0.8em;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .tooltip-role {
            font-size: 0.9em;
            line-height: 1.4;
            color: var(--text);
            margin-bottom: 8px;
        }
        .tooltip-supports {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }
        .tooltip-support-tag {
            background: rgba(126, 184, 255, 0.1);
            border: 1px solid rgba(126, 184, 255, 0.2);
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.75em;
            color: var(--lightning);
        }
        .tooltip-support-tag.fire {
            background: rgba(255, 107, 53, 0.1);
            border-color: rgba(255, 107, 53, 0.2);
            color: var(--fire);
        }
        .tooltip-support-tag.gold {
            background: rgba(201, 168, 76, 0.1);
            border-color: rgba(201, 168, 76, 0.2);
            color: var(--gold);
        }

        /* ── Info Cards ── */
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }
        .info-card {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 12px;
            padding: 20px;
        }
        .info-card h3 {
            font-family: 'Cinzel', serif;
            font-size: 1.05em;
            color: var(--gold);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .synergy-chain {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 6px;
            font-size: 0.92em;
            line-height: 1.6;
        }
        .synergy-step {
            background: rgba(126, 184, 255, 0.08);
            border: 1px solid rgba(126, 184, 255, 0.15);
            padding: 3px 10px;
            border-radius: 14px;
            color: var(--lightning);
            white-space: nowrap;
        }
        .synergy-step.fire {
            background: rgba(255, 107, 53, 0.08);
            border-color: rgba(255, 107, 53, 0.15);
            color: var(--fire);
        }
        .synergy-step.physical {
            background: rgba(224, 85, 85, 0.08);
            border-color: rgba(224, 85, 85, 0.15);
            color: var(--physical);
        }
        .synergy-arrow { color: var(--text-dim); font-size: 1.1em; }

        .rec-list {
            list-style: none;
        }
        .rec-list li {
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            font-size: 0.9em;
            line-height: 1.5;
        }
        .rec-list li:last-child { border-bottom: none; }
        .rec-priority {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-weight: 700;
            margin-right: 6px;
        }
        .rec-skill { color: var(--lightning); font-weight: 700; }
        .rec-skill.fire { color: var(--fire); }
        .rec-arrow { color: var(--text-dim); margin: 0 4px; }
        .rec-suggested { color: var(--gold); font-weight: 700; }

        /* ── Player view visibility ── */
        .player-view { display: none; }
        .player-view.active { display: block; }

        /* ── Pulse animation ── */
        @keyframes pulse-glow {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }
        .node-primary-pulse {
            animation: pulse-glow 3s ease-in-out infinite;
        }

        /* ── Footer ── */
        .footer {
            text-align: center;
            padding: 30px 0;
            border-top: 1px solid var(--panel-border);
            margin-top: 30px;
        }

        .footer .brand {
            font-family: 'Cinzel', serif;
            color: var(--gold-dim);
            font-size: 0.9em;
            letter-spacing: 2px;
        }

        .footer .powered {
            color: var(--text-dim);
            font-size: 0.8em;
            margin-top: 5px;
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: var(--text-dim);
            font-style: italic;
        }

        /* ── Responsive ── */
        @media (max-width: 900px) {
            .info-grid { grid-template-columns: 1fr; }
            .header h1 { font-size: 1.8em; }

        }
        @media (max-width: 768px) {
            .character-stats { grid-template-columns: repeat(2, 1fr); }
            .skill-grid { grid-template-columns: 1fr; }
        }
        @media (max-width: 600px) {
            .container { padding: 10px; }
            .legend { gap: 12px; }
            .main-tab-btn { padding: 8px 18px; font-size: 0.85em; }
        }
    </style>
</head>
<body>

    <div class="container" id="app">
        <div class="header">
            <h1>GENTECH DASHBOARD</h1>
            <div class="subtitle">Data Dashboard</div>
        </div>

        <!-- Main Tab Bar -->
        <div class="main-tab-bar" id="main-tab-bar">
            <button class="main-tab-btn active" onclick="switchMainTab('build')">📊 Build</button>
            <button class="main-tab-btn" onclick="switchMainTab('skilltree')">🌳 Skill Tree</button>
        </div>

        <!-- ═══ BUILD TAB PANEL ═══ -->
        <div class="main-panel active" id="panel-build">
            <div class="loading" id="build-loading">⚡ Loading build data...</div>
            <div id="build-content" style="display:none;"></div>
        </div>

        <!-- ═══ SKILL TREE TAB PANEL ═══ -->
        <div class="main-panel" id="panel-skilltree">
            <div class="loading" id="skilltree-loading" style="display:none;">🌳 Loading skill tree...</div>
            <div id="skilltree-content" style="display:none;"></div>
        </div>

        <div class="footer">
            <div class="brand">GENTECH DASHBOARD</div>
            <div class="powered">Data Dashboard v0.1</div>
        </div>
    </div>

    <!-- Tooltip (shared by build tab and skill tree) -->
    <div class="tooltip" id="tooltip"></div>

    <script>
        // ═══════════════════════════════════════════════════════════
        //  MAIN TAB SWITCHING
        // ═══════════════════════════════════════════════════════════
        let skillTreeInitialized = false;

        function switchMainTab(tab) {
            // Update buttons
            document.querySelectorAll('.main-tab-btn').forEach(btn => btn.classList.remove('active'));
            const buttons = document.querySelectorAll('.main-tab-btn');
            if (tab === 'build') buttons[0].classList.add('active');
            else buttons[1].classList.add('active');

            // Update panels
            document.querySelectorAll('.main-panel').forEach(p => p.classList.remove('active'));
            document.getElementById('panel-' + tab).classList.add('active');

            // Lazy-load skill tree on first visit

            monk: 'poe2-monk.json'

        async function loadBuild() {
            try {
                const res = await fetch(DATA_URLS.monk);
                const raw = await res.json();
                // Support both old flat format and new characters array format
                const data = raw.characters ? raw.characters[0] : raw;
                currentBuildData = data;
                renderDashboard(data);
            } catch (err) {
                document.getElementById('build-loading').innerHTML = `
                    ⚠️ Could not load build data. Make sure poe2-monk.json exists.
                `;
            }
        }

                    tooltip.style.top = (e.clientY - 10) + 'px';
                });
                node.addEventListener('mouseleave', () => tooltip.classList.remove('visible'));
            });
        }

        function hideTooltip() {
            document.getElementById('tooltip').classList.remove('visible');
        }

        // ═══════════════════════════════════════════════════════════
        //  SKILL TREE ANIMATIONS
        // ═══════════════════════════════════════════════════════════
        function initSkillTreeAnimations() {
            requestAnimationFrame(() => {
                document.querySelectorAll('.node-group').forEach((node, i) => {
                    node.style.opacity = '0';
                    node.style.transition = `opacity 0.4s ease ${i * 0.05}s`;
                    requestAnimationFrame(() => { node.style.opacity = '1'; });
                });
            });
        }

        // ═══════════════════════════════════════════════════════════
        //  INIT
        // ═══════════════════════════════════════════════════════════
        loadBuild();
        setInterval(loadBuild, 30000);
    </script>
</body>
</html>
